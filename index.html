      : `<div class="mm-iascore${hasPred?'':' empty'}">${hasPred?`${pal.gols_a} × ${pal.gols_b}`:'– × –'}</div>`;
    preds+=`<div class="pred-cell ${isHuman?'human':'ia'} mm-cell" data-pid="${pid}">
      <div class="mm-cell-top">
        <div class="hum-avwrap"><div class="hum-av" style="background:${p.color}">${avInner(p)}</div><span class="pts-badge on-av mm-pts${pts!=null?' '+(c.finished?ptsClass(pts):'preview'):''}" data-pid="${pid}">${pts!=null?pts:''}</span></div>
        <span class="hum-name">${p.name}</span>
        ${palpiteUI}
      </div>
      <div class="mm-qp" data-pid="${pid}">${mmQuemPassaHTML(c,pid,isHuman)}</div>
    </div>`;
  });
  preds+=`</div>`;
  const tmc=mmTeams(c);
  const cbtn=side=>{const t=side==='A'?tmc.a:tmc.b;return `<button class="mm-qpb${c.classificado===side?' on':''}" data-side="${side}" onclick="mmSetClassificado('${c.id}','${side}')">${t&&t.flag?flagImg(t.flag):''} ${esc((t&&t.name)||side)}</button>`;};
  const classRow=`<div class="mm-class"><span class="mm-class-lbl">Quem passou nos pênaltis (se empatar após a prorrogação):</span><div class="mm-class-btns">${cbtn('A')}${cbtn('B')}</div></div>`;
  const realInp=side=>`<input type="number" min="0" max="99" inputmode="numeric" value="${c['real_'+side]!=null?c['real_'+side]:''}" placeholder="–" oninput="mmSetReal('${c.id}','${side}',this.value)">`;
  const resultRow=`<div class="real-row${c.finished?'':' pending'}">
      <div class="rr-line"><span class="rr-label">PLACAR FINAL${(!c.finished&&hasScore)?' <span class="prev-tag">prévia</span>':''}</span>${realInp('a')}<span class="sep">×</span>${realInp('b')}</div>
      <button class="rr-finish${c.finished?' done':''}" onclick="mmSetFinished('${c.id}')">${c.finished?'Finalizado ✅':'Finalizar <span class="chk-off">✓</span>'}</button>
    </div>`;
  return `<div class="${cls.join(' ')}" data-cid="${c.id}">${head}${mid}${preds}${editing?'':classRow}${editing?'':resultRow}</div>`;
}
// ── ESTRUTURA FIXA DA CHAVE (ligações entre as fases, em código, uma vez só) ──
// Cada vaga referencia o "vencedor/perdedor do jogo X" da fase anterior. O sistema sabe
// sozinho quem enfrenta quem — não precisa reinformar a cada rodada.
const MM_BRACKET=(()=>{
  const b={};
  for(let i=1;i<=16;i++) b['r32_'+i]={phase:'32 avos'};
  for(let i=1;i<=8;i++)  b['r16_'+i]={phase:'Oitavas', feeders:{A:{g:'r32_'+(2*i-1),take:'win'},B:{g:'r32_'+(2*i),take:'win'}}};
  for(let i=1;i<=4;i++)  b['qf_'+i] ={phase:'Quartas', feeders:{A:{g:'r16_'+(2*i-1),take:'win'},B:{g:'r16_'+(2*i),take:'win'}}};
  for(let i=1;i<=2;i++)  b['sf_'+i] ={phase:'Semis',   feeders:{A:{g:'qf_'+(2*i-1),take:'win'},B:{g:'qf_'+(2*i),take:'win'}}};
  b['tp_1'] ={phase:'3º lugar', feeders:{A:{g:'sf_1',take:'lose'},B:{g:'sf_2',take:'lose'}}};   // 3º = perdedores das semis
  b['fin_1']={phase:'Final',    feeders:{A:{g:'sf_1',take:'win'}, B:{g:'sf_2',take:'win'}}};
  return b;
})();
// Colunas da esquerda → direita (3º lugar é coluna própria, logo ANTES da final)
const MM_COLS=[
  {key:'32avos', label:'16 avos', short:'16<sup>av</sup>', ids:Array.from({length:16},(_,i)=>'r32_'+(i+1))},
  {key:'oitavas',label:'Oitavas', short:'8<sup>as</sup>',  ids:Array.from({length:8}, (_,i)=>'r16_'+(i+1))},
  {key:'quartas',label:'Quartas', short:'4<sup>as</sup>',  ids:Array.from({length:4}, (_,i)=>'qf_'+(i+1))},
  {key:'semis',  label:'Semis',   short:'Semis',           ids:['sf_1','sf_2']},
  {key:'3lugar', label:'3º lugar', short:'3º lugar',       ids:['tp_1']},
  {key:'final',  label:'Final',   short:'Final 🏆',        ids:['fin_1']},
];
const mmOpen=new Set();   // confrontos expandidos na lista (preserva estado entre re-renders)
let mmPhaseFilter='32avos';   // filtro de fase da lista (3.1) — padrão 16 avos (key interna '32avos')
let mmBracketOpen=true;            // A1: seção do chaveamento expandida/recolhida
const mmCollapsedCols=new Set();   // A2: fases (colunas) recolhidas na chave
// AGENDA dos 16 avos (data/hora/local) por VAGA (slot). Fica no código (a anon key não cria coluna
// nova no banco). O app lê isto OU os campos dt/tm/venue do confronto, se existirem no banco.
const MM_AGENDA={
  r32_1:{dt:'28/06',tm:'',    ven:'Los Angeles'},
  r32_2:{dt:'29/06',tm:'',    ven:'Houston'},
  r32_3:{dt:'29/06',tm:'17h30',ven:'Boston'},
  r32_4:{dt:'30/06',tm:'14h', ven:'Dallas'},
  r32_5:{dt:'30/06',tm:'18h', ven:'Nova York/Nova Jérsei'},
  r32_6:{dt:'30/06',tm:'22h', ven:'Monterrey (México)'},
  r32_7:{dt:'01/07',tm:'13h', ven:'Atlanta'},
  r32_8:{dt:'01/07',tm:'17h', ven:'Seattle'},
  r32_9:{dt:'01/07',tm:'22h', ven:'Cidade do México'},
  r32_10:{dt:'02/07',tm:'21h',ven:'San Francisco'},
};
// data/hora/local de um confronto: prioriza o banco (dt/tm/venue) e cai pra agenda em código.
function mmInfo(c){const a=MM_AGENDA[c.id]||{};return {dt:c.dt||a.dt||'',tm:c.tm||a.tm||'',ven:c.venue||a.ven||''};}
function mmWeekday(dt){if(!dt)return '';const [dd,mm]=dt.split('/').map(Number);return WD[new Date(2026,mm-1,dd).getDay()];}
// chave cronológica pra ordenar a lista (sem data → fim)
function mmSchedKey(c){const i=mmInfo(c);if(!i.dt)return Number.MAX_SAFE_INTEGER;const [dd,mm]=i.dt.split('/').map(Number);const h=i.tm?parseInt(i.tm)||0:0;const mi=(i.tm&&i.tm.split('h')[1])?parseInt(i.tm.split('h')[1]):0;return (mm*100+dd)*10000+h*100+mi;}
function mmConf(id){return MM_CONFRONTOS.find(c=>c.id===id);}
// Quem AVANÇOU de verdade — pelo PLACAR REAL (empate → pênaltis via classificado). NUNCA por palpite.
function mmRealWinner(c){
  if(!c||c.real_a==null||c.real_b==null)return null;
  if(c.real_a>c.real_b)return 'A';
  if(c.real_b>c.real_a)return 'B';
  return (c.classificado==='A'||c.classificado==='B')?c.classificado:null;
}
// Time resolvido de um lado de uma vaga: {name,flag} ou null ("A definir"). Recursivo pela estrutura.
function mmResolveSide(slotId,side){
  const slot=MM_BRACKET[slotId];
  if(slot&&slot.feeders){const f=slot.feeders[side];return mmOutcome(f.g,f.take);}
  const c=mmConf(slotId); if(!c)return null;
  const nm=side==='A'?c.team_a:c.team_b, fl=side==='A'?c.flag_a:c.flag_b;
  return nm?{name:nm,flag:fl}:null;
}
function mmOutcome(gameId,take){
  const w=mmRealWinner(mmConf(gameId)); if(w==null)return null;   // sem resultado real → vaga indefinida
  const side=take==='win'?w:(w==='A'?'B':'A');
  return mmResolveSide(gameId,side);
}
function mmTeams(c){return {a:mmResolveSide(c.id,'A'),b:mmResolveSide(c.id,'B')};}

// Bloco do confronto (matchup) — mesmo visual da fase de grupos; usa times RESOLVIDOS pela estrutura.
function mmMatchupHTML(c){
  const hasReal=c.finished&&c.real_a!=null&&c.real_b!=null, tm=mmTeams(c);
  const win=side=>{ if(!hasReal||c.real_a===c.real_b)return 'team'; const aw=c.real_a>c.real_b; return side==='A'?(aw?'team win':'team lose'):(aw?'team lose':'team win'); };
  const sd=(s,t)=>`<div class="${win(s)}"><span class="team-flag">${mmFlag(t&&t.flag)}</span><span class="team-name">${esc((t&&t.name)||'A definir')}</span></div>`;
  // Centro: bolinha "×" (ou placar) e, logo abaixo, o local (📍) — omitido quando não há (sem inventar).
  const ven=mmInfo(c).ven;
  const venue=ven?`<div class="venue">📍 ${esc(ven)}</div>`:'';
  return `<div class="matchup mm-matchup">${sd('A',tm.a)}
      <div class="mid">${hasReal?`<div class="score-final">${c.real_a}<small>×</small>${c.real_b}</div>`:`<div class="vs-badge">×</div>`}${venue}</div>
      ${sd('B',tm.b)}</div>`;
}
// Corpo do confronto (palpites dos 8 + quem passa + linha de resultado) — reusa pred-cell/real-row e calcMataPts.
function mmCardBody(c){
  const hasScore=c.real_a!=null&&c.real_b!=null;
  const realDraw=hasScore&&c.real_a===c.real_b;
  const cell=p=>{
    const pid=p.id, isHuman=p.type==='human';
    const pal=(MM_PALPITES[c.id]||{})[pid]||{};
    const hasPred=pal.gols_a!=null;
    const pts=hasScore&&hasPred?calcMataPts(pal,c):null;
    // Badge só aparece quando há número (2.3): sem dados → classe "empty" (display:none).
    const badge=`<span class="pts-badge on-av mm-pts${pts!=null?' '+(c.finished?ptsClass(pts):'preview'):' empty'}" data-pid="${pid}">${pts!=null?pts:''}</span>`;
    const av=`<div class="hum-avwrap"><div class="hum-av" style="background:${p.color}">${avInner(p)}</div>${badge}</div>`;
    if(isHuman){
      const inp=side=>`<input type="number" min="0" max="99" inputmode="numeric" value="${pal['gols_'+side]!=null?pal['gols_'+side]:''}" placeholder="–" oninput="mmUpdPalpite('${c.id}','${pid}','gols_${side}',this.value)">`;
      // Pênaltis INLINE à direita (4.3): só aparece quando o palpite do humano é empate.
      return `<div class="pred-cell human mm-cell mm-hcell" data-pid="${pid}">
        ${av}<span class="hum-name">${p.name}</span>
        <div class="pc-inputs">${inp('a')}<span class="sep">×</span>${inp('b')}</div>
        <div class="mm-qp mm-qp-inline" data-pid="${pid}">${mmQuemPassaHTML(c,pid,true)}</div>
      </div>`;
    }
    return `<div class="pred-cell ia mm-cell mm-iacell" data-pid="${pid}">
      <div class="mm-iacell-head">${av}<span class="hum-name">${p.name}</span></div>
      <div class="mm-iascore${hasPred?'':' empty'}">${hasPred?`${pal.gols_a} × ${pal.gols_b}`:'– × –'}</div>
      <div class="mm-qp" data-pid="${pid}">${mmQuemPassaHTML(c,pid,false)}</div>
    </div>`;
  };
  const humans=PARTICIPANTS.filter(p=>p.type==='human');   // 4.1 humanos primeiro
  const ias=PARTICIPANTS.filter(p=>p.type==='ia');          // depois as IAs (4.2 em 2×2)
  const preds=`<div class="mm-preds-wrap">
    <div class="mm-humans">${humans.map(cell).join('')}</div>
    <div class="mm-ias">${ias.map(cell).join('')}</div>
  </div>`;
  const tmc=mmTeams(c);
  const cbtn=side=>{const t=side==='A'?tmc.a:tmc.b;return `<button class="mm-qpb${c.classificado===side?' on':''}" data-side="${side}" onclick="mmSetClassificado('${c.id}','${side}')">${t&&t.flag?flagImg(t.flag):''} ${esc((t&&t.name)||side)}</button>`;};
  // "Quem passou nos pênaltis" (classificado REAL) só aparece quando o PLACAR REAL é empate (2.2).
  const classRow=`<div class="mm-class${realDraw?'':' hidden'}"><span class="mm-class-lbl">Quem passou nos pênaltis (empate no tempo normal):</span><div class="mm-class-btns">${cbtn('A')}${cbtn('B')}</div></div>`;
  const realInp=side=>`<input type="number" min="0" max="99" inputmode="numeric" value="${c['real_'+side]!=null?c['real_'+side]:''}" placeholder="–" oninput="mmSetReal('${c.id}','${side}',this.value)">`;
  const resultRow=`<div class="real-row${c.finished?'':' pending'}">
      <div class="rr-line"><span class="rr-label">PLACAR FINAL${(!c.finished&&hasScore)?' <span class="prev-tag">prévia</span>':''}</span>${realInp('a')}<span class="sep">×</span>${realInp('b')}</div>
      <button class="rr-finish${c.finished?' done':''}" onclick="mmSetFinished('${c.id}')">${c.finished?'Finalizado ✅':'Finalizar <span class="chk-off">✓</span>'}</button>
    </div>`;
  return preds+classRow+resultRow;
}

// ── CHAVE (bracket): esqueleto FIXO de todas as fases; vaga sem time resolvido = "A definir" ──
function mmBracketBox(slotId){
  const c=mmConf(slotId), tm={a:mmResolveSide(slotId,'A'),b:mmResolveSide(slotId,'B')};
  const fin=c&&c.finished&&c.real_a!=null&&c.real_b!=null, w=mmRealWinner(c);
  const side=(s,t)=>{
    if(!t)return `<div class="mm-bx-side empty"></div>`;   // vaga futura → caixa VAZIA (sem texto)
    const sc=c?(s==='A'?c.real_a:c.real_b):null;
    const adv=c&&c.real_a===c.real_b&&c.classificado===s;   // passou nos pênaltis
    return `<div class="mm-bx-side${w===s?' win':''}">${mmFlag(t.flag)}<span class="mm-bx-nm">${esc(t.name)}</span><span class="mm-bx-sc">${fin&&sc!=null?sc:''}${adv?' <small>(p)</small>':''}</span></div>`;
  };
  const playable=!!(c&&tm.a&&tm.b);   // tem confronto e os dois times conhecidos → clicável (abre na lista)
  return `<div class="mm-bx${playable?'':' nolink'}"${playable?` onclick="mmGotoConfronto('${slotId}')"`:''} title="${esc(((tm.a&&tm.a.name)||'A definir')+' x '+((tm.b&&tm.b.name)||'A definir'))}">${side('A',tm.a)}${side('B',tm.b)}</div>`;
}
function mmColLabel(id){const col=MM_COLS.find(c=>c.ids.includes(id));return col?col.label:'';}
// Bandeira numa caixa de tamanho FIXO, centralizada, sem distorcer (padroniza quadradas e retangulares).
function mmFlag(em){return em?`<span class="flagbx">${flagImg(em)}</span>`:'';}
// Cabeçalho do card no estilo da fase de grupos: fase + status à esquerda; data/hora à direita (omitida se não houver).
function mmHeadHTML(c){
  const status=c.finished?'<span class="bl-tag fec">FECHADO</span>':'<span class="bl-tag abe">ABERTO</span>';
  const i=mmInfo(c);
  // canto direito: dia da semana + data · hora — igual à fase de grupos; omite se não houver data.
  const dt=i.dt?`<span class="dt-tag">${mmWeekday(i.dt)}, ${esc(i.dt)}${i.tm?' · '+esc(i.tm):''}</span>`:'';
  return `<div class="card-head"><span class="grp-tag">${esc((mmColLabel(c.id)||'MATA-MATA').toUpperCase())} ${status}</span>${dt}</div>`;
}
// Seção do chaveamento com cabeçalho colapsável (A1).
function mmBracketSectionHTML(){
  let h=`<div class="mm-sec-head" onclick="mmToggleBracket()"><span class="mm-sec-title">⚔️ Chaveamento do mata-mata</span><span class="mm-sec-arrow">${mmBracketOpen?'▲':'▼'}</span></div>`;
  if(mmBracketOpen)h+=mmBracketHTML();
  return h;
}
function mmRerenderBracket(){const s=document.getElementById('mm-bracket-section');if(s){s.innerHTML=mmBracketSectionHTML();mmFitBracket();}}
function mmToggleBracket(){mmBracketOpen=!mmBracketOpen;mmRerenderBracket();}
function mmToggleCol(key){if(mmCollapsedCols.has(key))mmCollapsedCols.delete(key);else mmCollapsedCols.add(key);mmRerenderBracket();}
// Chave clássica: caixas posicionadas + conectores SVG em colchete. Fases podem ser recolhidas (A2):
// a coluna expandida mais à esquerda é distribuída uniformemente e as seguintes centralizam entre os
// feeders, então recolher fases antigas reduz altura E largura, deslocando o foco pra esquerda.
function mmBracketHTML(){
  const bw=120, bh=46, gapX=38, gapY=12, titleH=24, colW0=32, padX=6, padR=8, padB=12, padY=titleH+12;
  const colX={}, colWid={}; let x=padX;
  MM_COLS.forEach(col=>{const w=mmCollapsedCols.has(col.key)?colW0:bw;colX[col.key]=x;colWid[col.key]=w;x+=w+gapX;});
  const pos={}; let maxBottom=padY;
  MM_COLS.forEach((col,ci)=>{
    if(mmCollapsedCols.has(col.key))return;
    const prev=ci>0?MM_COLS[ci-1]:null, base=!prev||mmCollapsedCols.has(prev.key);
    col.ids.forEach((id,i)=>{
      let y; if(base){y=padY+i*(bh+gapY);} else {const f=MM_BRACKET[id].feeders;y=(pos[f.A.g].y+pos[f.B.g].y)/2;}
      pos[id]={x:colX[col.key],y};
    });
  });
  if(pos['tp_1']&&pos['sf_2'])pos['tp_1'].y=pos['sf_2'].y+(bh+gapY)*1.4;   // 3º lugar: abaixo da semi de baixo
  Object.keys(pos).forEach(id=>{maxBottom=Math.max(maxBottom,pos[id].y+bh);});
  const totalW=(x-gapX)+padR, totalH=maxBottom+padB;
  // conectores: só quando a caixa E a coluna dos feeders estão expandidas
  let paths='';
  Object.keys(MM_BRACKET).forEach(id=>{
    const slot=MM_BRACKET[id]; if(!slot.feeders||!pos[id])return;
    const feederCol=MM_COLS.find(c=>c.ids.includes(slot.feeders.A.g)).key;
    if(mmCollapsedCols.has(feederCol))return;
    const bx=pos[id].x, bym=pos[id].y+bh/2, is3=(id==='tp_1');
    ['A','B'].forEach(s=>{const f=slot.feeders[s],fp=pos[f.g];if(!fp)return;const fxr=fp.x+bw,fym=fp.y+bh/2,mx=(fxr+bx)/2;paths+=`<path d="M${fxr} ${fym} H${mx} V${bym} H${bx}" class="mm-cn${is3?' c3':''}"/>`;});
  });
  // títulos clicáveis (recolhe/expande a fase); colapsada vira faixa estreita vertical
  let titles='';
  MM_COLS.forEach(col=>{
    const cl=mmCollapsedCols.has(col.key);
    titles+=`<div class="mm-coltitle${cl?' col-collapsed':''}" style="left:${colX[col.key]}px;width:${colWid[col.key]}px${cl?`;height:${totalH-padB}px`:''}" onclick="mmToggleCol('${col.key}')" title="${cl?'Expandir':'Recolher'} esta fase">${col.label}</div>`;
  });
  let boxes='';
  Object.keys(pos).forEach(id=>{boxes+=`<div class="mm-bxpos" style="left:${pos[id].x}px;top:${pos[id].y}px;width:${bw}px;height:${bh}px">${mmBracketBox(id)}</div>`;});
  return `<div class="mm-bracket-wrap">
    <div class="mm-bracket-hint">Toque num confronto definido pra abrir os palpites · toque no título de uma fase pra recolhê-la</div>
    <div class="mm-bracket-scroll"><div class="mm-bracket" data-w="${totalW}" data-h="${totalH}" style="width:${totalW}px;height:${totalH}px">
      <svg class="mm-cn-svg" width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" preserveAspectRatio="xMinYMin meet">${paths}</svg>
      ${titles}${boxes}
    </div></div>
  </div>`;
}
// Desktop (≥760px): escala a chave pra caber na largura SEM rolagem horizontal. Celular: rola.
function mmFitBracket(){
  const el=document.querySelector('#tab-mata .mm-bracket'); if(!el)return;
  const wrap=el.parentElement, W=+el.dataset.w, H=+el.dataset.h;
  if(window.innerWidth>=760){
    const avail=Math.max(320,wrap.clientWidth-16), s=Math.min(1.3,avail/W);
    el.style.transform='scale('+s+')';
    wrap.style.height=(H*s+4)+'px'; wrap.style.overflowX='hidden';
  }else{
    el.style.transform='none'; wrap.style.height=''; wrap.style.overflowX='auto';
  }
}
let _mmResizeBound=false;

// ── LISTA: só fases que já existem; cada confronto é clicável e expande inline ──
function mmListItem(c){
  const open=mmOpen.has(c.id);
  return `<div class="mm-litem${open?' open':''}" data-cid="${c.id}">
    <div class="mm-litem-toggle" onclick="mmToggleItem('${c.id}')">
      ${mmHeadHTML(c)}
      <div class="mm-litem-summary">${mmMatchupHTML(c)}<span class="mm-chev">▾</span></div>
    </div>
    <div class="mm-litem-body">${mmCardBody(c)}</div>
  </div>`;
}
function mmToggleItem(cid){
  const item=document.querySelector(`#tab-mata .mm-litem[data-cid="${cid}"]`);
  if(!item)return;
  if(item.classList.toggle('open'))mmOpen.add(cid); else mmOpen.delete(cid);
}
function mmGotoConfronto(cid){
  const item=document.querySelector(`#tab-mata .mm-litem[data-cid="${cid}"]`);
  if(!item)return;
  if(!item.classList.contains('open')){item.classList.add('open');mmOpen.add(cid);}
  item.scrollIntoView({behavior:'smooth',block:'center'});
  item.classList.add('flash');setTimeout(()=>item.classList.remove('flash'),1400);
}
// Lista de UMA fase (a do filtro). Só confrontos com os dois times definidos; senão, estado vazio.
function mmListHTML(){
  const col=MM_COLS.find(c=>c.key===mmPhaseFilter)||MM_COLS[0];
  const items=col.ids.map(id=>mmConf(id)).filter(c=>c&&mmResolveSide(c.id,'A')&&mmResolveSide(c.id,'B'))
    .sort((a,b)=>mmSchedKey(a)-mmSchedKey(b));   // C3: cronológico; sem data vai pro fim
  if(!items.length)return `<div class="empty-state">Confrontos ainda não definidos.</div>`;
  return items.map(mmListItem).join('');
}
function mmSetPhase(key){
  mmPhaseFilter=key;
  const l=document.getElementById('mm-list'); if(l)l.innerHTML=mmListHTML();
  document.querySelectorAll('#tab-mata .mm-fbtn').forEach(b=>b.classList.toggle('active',b.dataset.key===key));
}
function renderMata(){
  let html=`<div class="mm-intro">⚔️ <b>Fase Mata-Mata</b> — palpite o <b>placar final</b> (inclui prorrogação). Empatou no palpite? Escolha quem passa nos pênaltis. Pontos: 5 resultado · +1 gol A · +1 gol B · +3 exato · <b>+4</b> se cravar quem passa num empate.</div>`;
  html+=`<div id="mm-bracket-section">${mmBracketSectionHTML()}</div>`;   // chave mostra SEMPRE o mapa inteiro (não afetada pelo filtro)
  // Filtro de fases (3.1) — rótulos curtos, cabe numa linha só (B); padrão 16 avos.
  html+=`<div class="mm-filters">${MM_COLS.map(col=>`<button class="mm-fbtn${col.key===mmPhaseFilter?' active':''}" data-key="${col.key}" onclick="mmSetPhase('${col.key}')">${col.short}</button>`).join('')}</div>`;
  html+=`<div id="mm-list">${mmListHTML()}</div>`;
  document.getElementById('tab-mata').innerHTML=html;
  mmFitBracket();
  if(!_mmResizeBound){_mmResizeBound=true;window.addEventListener('resize',()=>{if(activeTab==='mata')mmFitBracket();});}
}

// ─── ESPELHO PROD→DEV (só no ambiente de dev) ─────────────────────────────────
// Lê a PRODUÇÃO (somente leitura) e regrava no banco de DEV (tabelas dev_*). Usa só a anon key.
async function mirrorProdToDev(){
  if(!IS_DEV){showErr('O espelho só funciona no ambiente de dev.');return;}
  if(!confirm('Isso vai apagar todos os dados do dev e copiar os da produção. Continuar?'))return;
  const btn=document.getElementById('mirror-btn'); if(btn){btn.disabled=true;btn.textContent='Espelhando…';}
  try{
    setSyncing(1);
    // 1) lê produção (NÃO escreve nela)
    const pg=await sb.from('bolao_games').select('*');      if(pg.error)throw pg.error;
    const pc=await sb.from('mata_confrontos').select('*');  // podem ainda não existir em produção
    const pp=await sb.from('mata_palpites').select('*');
    // 2) zera o dev (filhos antes dos pais)
    let r;
    r=await sb.from('dev_mata_palpites').delete().not('confronto_id','is',null);  if(r.error)throw r.error;
    r=await sb.from('dev_mata_confrontos').delete().not('id','is',null);          if(r.error)throw r.error;
    r=await sb.from('dev_bolao_games').delete().not('game_id','is',null);         if(r.error)throw r.error;
    // 3) copia produção → dev
    if(pg.data&&pg.data.length){r=await sb.from('dev_bolao_games').insert(pg.data);         if(r.error)throw r.error;}
    if(!pc.error&&pc.data&&pc.data.length){r=await sb.from('dev_mata_confrontos').insert(pc.data); if(r.error)throw r.error;}
    if(!pp.error&&pp.data&&pp.data.length){r=await sb.from('dev_mata_palpites').insert(pp.data);    if(r.error)throw r.error;}
    setSyncing(-1);
    alert(`Pronto! Dev espelhado da produção: ${pg.data?pg.data.length:0} jogos, ${(!pc.error&&pc.data)?pc.data.length:0} confrontos. Recarregando…`);
    location.reload();
  }catch(e){
    setSyncing(-1);
    if(btn){btn.disabled=false;btn.textContent='🪞 Espelhar prod→dev';}
    showErr('Erro ao espelhar (as tabelas dev_* existem? rode supabase_dev_setup.sql): '+(e.message||e));
  }
}

// ─── TAB NAV ──────────────────────────────────────────────────────────────────
function showTab(name){
  activeTab=name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  ['palpites','mata','ranking'].forEach((n,i)=>{
    if(n===name)document.querySelectorAll('nav button')[i].classList.add('active');
  });
  renderAll();
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
if(IS_DEV){   // marca visual + botão de espelho, só no ambiente de dev (canto superior direito)
  document.body.insertAdjacentHTML('afterbegin','<div id="dev-flag">DEV</div><button id="mirror-btn" onclick="mirrorProdToDev()">🪞 Espelhar prod→dev</button>');
}
loadData();
