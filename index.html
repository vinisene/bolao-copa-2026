  const r=ev.currentTarget.getBoundingClientRect();

  left=Math.max(window.scrollX+12,Math.min(left,window.scrollX+window.innerWidth-w-12));
  el.style.left=left+'px';

function versus(title,lName,lMem,lPts,lCol,rName,rMem,rPts,rCol){
  const tot=lPts+rPts;
  const lw=tot>0?(lPts/tot*100):50, rw=tot>0?(rPts/tot*100):50;
  const lt=lCol==='#e8c44a'?'#b8941f':lCol, rt=rCol==='#e8c44a'?'#b8941f':rCol;
  const foot=lPts>rPts?`🏆 ${lName} na frente!`:rPts>lPts?`🏆 ${rName} na frente!`:(tot>0?'🤝 Empate técnico!':'Sem pontos ainda');
  const fc=lPts>rPts?lt:rPts>lPts?rt:'var(--mu)';
  return `<div class="vs2">
    <div class="vs2-title">${title}</div>
    <div class="vs2-row">

    <div class="vs2-foot" style="color:${fc}">${foot}</div>
  </div>`;
}

// Comparativo de vários times (corrida de barras)
function teamRace(title,rows){
  const mx=Math.max(1,...rows.map(r=>r.pts));
  const lead=Math.max(...rows.map(r=>r.pts));
  let h=`<div class="vs2"><div class="vs2-title">${title}</div>`;
  rows.forEach(r=>{
    const tc=r.col==='#e8c44a'?'#b8941f':r.col;
    h+=`<div class="tr-row">
      <div class="tr-avs">
        <div class="tr-av h" style="background:${r.human.color}">${avInner(r.human)}</div>
        <div class="tr-av a" style="background:${r.ia.color}">${avInner(r.ia)}</div>
      </div>
      <div class="tr-info"><div class="tr-nm" style="color:${tc}">${r.name}</div><div class="tr-mem">${r.mem}</div></div>
      <div class="tr-barwrap"><div class="tr-bar" style="width:${(r.pts/mx*100).toFixed(0)}%;background:${r.col}"></div></div>
      <div class="tr-pts" style="color:${tc}">${r.pts}</div>
    </div>`;
  });
  const winners=rows.filter(r=>r.pts===lead&&lead>0);

// ─── HISTÓRICO DE CLASSIFICAÇÃO (Bolão Geral, jogo a jogo) ────────────────────
// Reconta a classificação após cada jogo finalizado (em ordem cronológica),
// usando o mesmo critério de desempate do ranking (total · cravados · ganhador).
function geralHistory(){
  const inRank=g=>sortKey(g)>=CUT;
  const finGames=GT.map(t=>getGame(t.id))
    .filter(g=>!g.removed&&g.finished&&!emptyVal(g.realA)&&!emptyVal(g.realB)&&inRank(g))
    .sort((a,b)=>sortKey(a)-sortKey(b));
  const acc={}; PARTICIPANTS.forEach(p=>acc[p.id]={total:0,eHits:0,rHits:0});
  const steps=[];
  finGames.forEach(g=>{
    PARTICIPANTS.forEach(p=>{
      const pred=g.predictions[p.id];
      if(emptyVal(pred.a))return;
      const pts=ptsOf(g,pred); if(pts===null)return;
      acc[p.id].total+=pts;
      const ra=+g.realA,rb=+g.realB,pa=+pred.a,pb=+pred.b;
      if((pa>pb?'A':pa<pb?'B':'E')===(ra>rb?'A':ra<rb?'B':'E'))acc[p.id].rHits++;
      if(pa===ra&&pb===rb)acc[p.id].eHits++;
    });
    const order=PARTICIPANTS.map(p=>({id:p.id,...acc[p.id]}))
      .sort((a,b)=>b.total-a.total||b.eHits-a.eHits||b.rHits-a.rHits);
    const pos={},tot={};
    order.forEach((o,i)=>{pos[o.id]=i+1;tot[o.id]=o.total;});
    steps.push({g,pos,tot});
  });
  return steps;
}
// Quantas posições cada um subiu(+)/caiu(-) nos últimos 3 jogos
function geralDeltas(steps){
  const out={};
  if(!steps.length)return out;
  const now=steps[steps.length-1].pos;
  const base=steps[Math.max(0,steps.length-4)].pos;   // 3 jogos atrás (ou o início)
  PARTICIPANTS.forEach(p=>{
    if(now[p.id]==null)return;
    const b=(base[p.id]==null)?now[p.id]:base[p.id];
    out[p.id]=b-now[p.id];   // posição menor = melhor → subir dá número positivo
  });
  return out;
}
function deltaBadge(d){
  if(d==null)return '';
  if(d>0)return `<span class="rk-delta up">▲${d}</span>`;
  if(d<0)return `<span class="rk-delta down">▼${-d}</span>`;
  return `<span class="rk-delta flat">=</span>`;
}

// Pontos de UM jogo de grupo por participante: {pid->{pts,rHits,eHits}} (reusa ptsOf, sem reimplementar)
function groupPtsByPid(g){
  const o={};
  PARTICIPANTS.forEach(p=>{
    const pred=g.predictions[p.id]; if(emptyVal(pred.a))return;
    const pts=ptsOf(g,pred); if(pts===null)return;
    const ra=+g.realA,rb=+g.realB,pa=+pred.a,pb=+pred.b;
    o[p.id]={pts,rHits:((pa>pb?'A':pa<pb?'B':'E')===(ra>rb?'A':ra<rb?'B':'E'))?1:0,eHits:(pa===ra&&pb===rb)?1:0};

function mataPtsByPid(c){
  const o={};
  MATA_PARTS.forEach(p=>{

    const pts=calcMataPts(pal,c); if(pts==null)return;
    const ra=+c.real_a,rb=+c.real_b,pa=+pal.gols_a,pb=+pal.gols_b;
    o[p.id]={pts,rHits:((pa>pb?'A':pa<pb?'B':'E')===(ra>rb?'A':ra<rb?'B':'E'))?1:0,eHits:(pa===ra&&pb===rb)?1:0};
  });

function groupGamesFinished(filterFn){   // jogos de grupo finalizados (sem g01-03/removidos), cronológicos
  return GT.map(t=>getGame(t.id))
    .filter(g=>!g.removed&&!GROUP_EXCLUDED.has(g.id)&&g.finished&&!emptyVal(g.realA)&&!emptyVal(g.realB)&&(!filterFn||filterFn(g)))
    .sort((a,b)=>sortKey(a)-sortKey(b));

  return MM_CONFRONTOS.filter(c=>!mmIsTest(c)&&c.finished&&c.real_a!=null&&c.real_b!=null).sort((a,b)=>mmSchedKey(a)-mmSchedKey(b));

function sumPidList(list){               // soma vários {pid->{pts,rHits,eHits}} (agrupar por rodada)
  const o={};
  list.forEach(per=>Object.keys(per).forEach(pid=>{
    if(!o[pid])o[pid]={pts:0,rHits:0,eHits:0};
    o[pid].pts+=per[pid].pts; o[pid].rHits+=per[pid].rHits; o[pid].eHits+=per[pid].eHits;
  }));
  return o;
}
// Unidades do eixo X: cada uma vira um ponto. tab:'geral'|'jxv'|'mata' · unit:'jogos'|'rodada'.
function histUnits(tab,unit){
  const filterFn = tab==='geral' ? (g=>sortKey(g)>=CUT) : null;   // Geral: a partir de 20/06 (CUT); JxV: tudo (g01-03 já fora)
  const grp  = tab==='mata' ? [] : groupGamesFinished(filterFn);
  const mata = mataGamesFinished();
  if(unit==='jogos'){
    const u=[];
    grp.forEach(g=>u.push({perPid:groupPtsByPid(g),label:{fA:g.fA,fB:g.fB}}));
    mata.forEach(c=>u.push({perPid:mataPtsByPid(c),label:{fA:c.flag_a,fB:c.flag_b}}));
    return u;
  }
  // Por Rodada (ordem fixa: 1ª/2ª/3ª grupos · 16 avos · oitavas · quartas · semis · 3º · final)
  const u=[], GRP_SHORT={1:'1ª',2:'2ª',3:'3ª'}, MM_SHORT={'32avos':'16av','oitavas':'8ª','quartas':'4ª','semis':'Semi','3lugar':'3º','final':'Final'};
  if(tab!=='mata'){
    [1,2,3].forEach(r=>{const gs=grp.filter(g=>g.r===r); if(gs.length)u.push({perPid:sumPidList(gs.map(groupPtsByPid)),label:{txt:r+'ª Rodada',short:GRP_SHORT[r]}});});
  }
  MM_COLS.forEach(col=>{const cs=mata.filter(c=>mmPhaseKeyOf(c.id)===col.key); if(cs.length)u.push({perPid:sumPidList(cs.map(mataPtsByPid)),label:{txt:col.label,short:MM_SHORT[col.key]||col.label}});});
  return u;
}
// Steps do gráfico: posição 1..P acumulada após cada unidade (mesmo critério de desempate da tabela).
function buildSteps(units,parts){
  const acc={}; parts.forEach(p=>acc[p.id]={total:0,eHits:0,rHits:0});
  const steps=[];
  units.forEach(unit=>{
    parts.forEach(p=>{const d=unit.perPid[p.id]; if(d){acc[p.id].total+=d.pts;acc[p.id].eHits+=d.eHits;acc[p.id].rHits+=d.rHits;}});
    const order=parts.map(p=>({id:p.id,...acc[p.id]})).sort((a,b)=>b.total-a.total||b.eHits-a.eHits||b.rHits-a.rHits);
    const pos={},tot={}; order.forEach((o,i)=>{pos[o.id]=i+1;tot[o.id]=o.total;});
    steps.push({pos,tot,label:unit.label});
  });
  return steps;
}

// Gráfico de evolução: eixo X = jogos (bandeiras) ou rodadas (texto), eixo Y = posição 1..P
// No desktop preenche a largura (último à direita); no celular cresce e rola pro lado.
// Interativo: passar o mouse (desktop) realça a linha; clicar/tocar fixa o destaque.
let histLocked=null;
function histChart(steps,parts){
  histLocked=null;
  const P=parts.length;   // nº de linhas (participantes) = altura do eixo Y
  if(steps.length<2)return `<div class="hist-empty">O gráfico de evolução aparece a partir de 2 unidades finalizadas nesta visão.</div>`;
  const N=steps.length;
  const host=document.getElementById('tab-ranking');
  const hostW=(host&&host.clientWidth)?host.clientWidth:Math.min(892,(window.innerWidth||375)-28);
  const availW=Math.max(300,hostW-12);
  const big=availW>=560;
  const rowH=big?40:26, endR=big?18:12, nameFont=big?13:10, leftAxis=big?30:24, topPad=big?18:14;
  const flagW=big?22:18, flagH=big?15:12, xGap=big?13:11, lineW=big?2.8:2.4, dotR=big?3:2.4;
  const nameMax=big?130:98;
  const rightPad=2*endR+10+nameMax;
  const bottomPad=2*flagH+xGap+14;
  const innerAvail=availW-leftAxis-rightPad;
  const fillColW=innerAvail/N;
  const minColW=big?34:46;                       // largura mínima por jogo antes de rolar
  const fit=fillColW>=minColW;                   // enche a largura (último jogo na direita)?
  const colW=fit?fillColW:minColW;
  const W=fit?availW:(leftAxis+N*colW+rightPad);
  const H = topPad+(P-1)*rowH+bottomPad;
  const X=i=>leftAxis+i*colW+colW/2;
  const Y=pos=>topPad+(pos-1)*rowH;
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" class="hist-svg" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<rect x="0" y="0" width="${W}" height="${H}" fill="transparent" style="pointer-events:all" onclick="histClick('')"/>`;
  for(let pos=1;pos<=P;pos++){
    const y=Y(pos);
    svg+=`<line x1="${leftAxis}" y1="${y}" x2="${leftAxis+N*colW}" y2="${y}" class="hist-grid"/>`;
    svg+=`<text x="${leftAxis-5}" y="${y+3}" class="hist-ylbl">${pos}</text>`;
  }
  const fy=topPad+(P-1)*rowH+8;
  steps.forEach((s,i)=>{

    if(L.fA!==undefined||L.fB!==undefined){           // visão "Por Jogos": bandeiras dos times
      const ua=flagUrl(L.fA),ub=flagUrl(L.fB);
      if(ua)svg+=`<image href="${ua}" x="${x-flagW/2}" y="${fy}" width="${flagW}" height="${flagH}"/>`;
      svg+=`<text x="${x}" y="${fy+flagH+xGap-3}" class="hist-x">×</text>`;
      if(ub)svg+=`<image href="${ub}" x="${x-flagW/2}" y="${fy+flagH+xGap}" width="${flagW}" height="${flagH}"/>`;
    }else{                                             // visão "Por Rodada": nome curto da rodada
      svg+=`<text x="${x}" y="${fy+flagH+3}" class="hist-x" style="font-size:${big?11:9}px;font-weight:800">${L.short||L.txt||''}</text>`;
    }
  });
  parts.forEach(p=>{
    const pts=steps.map((s,i)=>`${X(i)},${Y(s.pos[p.id])}`).join(' ');
    let g=`<g data-pid="${p.id}" onmouseover="histHover('${p.id}')" onmouseout="histHover('')" onclick="histClick('${p.id}')">`;
    g+=`<polyline points="${pts}" fill="none" stroke="#000" stroke-opacity="0" stroke-width="${big?20:14}" style="pointer-events:stroke"/>`;   // alvo de clique
    g+=`<polyline class="hist-line" points="${pts}" fill="none" stroke="${p.color}" stroke-width="${lineW}" stroke-linejoin="round" stroke-linecap="round"/>`;
    steps.forEach((s,i)=>{g+=`<circle cx="${X(i)}" cy="${Y(s.pos[p.id])}" r="${dotR}" fill="${p.color}"/>`;});
    const lx=X(N-1),ly=Y(steps[N-1].pos[p.id]),pcx=lx+10+endR;
    g+=`<circle cx="${pcx}" cy="${ly}" r="${endR}" fill="${p.color}"/>`;
    if(p.img)g+=`<image href="${p.img}" x="${pcx-endR}" y="${ly-endR}" width="${2*endR}" height="${2*endR}" preserveAspectRatio="xMidYMid slice" style="clip-path:circle(${endR}px at ${endR}px ${endR}px)"/>`;
    g+=`<circle cx="${pcx}" cy="${ly}" r="${endR}" fill="none" stroke="#fff" stroke-width="2"/>`;
    g+=`<text x="${pcx+endR+5}" y="${ly}" class="hist-name" style="font-size:${nameFont}px" fill="${p.color}">${p.name}</text>`;
    g+=`</g>`;
    svg+=g;
  });
  svg+=`</svg>`;
  return `<div class="hist-wrap">
    <div class="hist-scrollhint">${fit?'Toque numa linha para destacar uma pessoa (no PC, passe o mouse).':'↔ deslize para o lado · toque numa linha para destacá-la'}</div>
    <div class="hist-scroll">${svg}</div>
  </div>`;
}

// Recebe um título de seção e a lista de jogos (objetos getGame). NÃO altera pontuação/dados.
function gamesListHTML(title, games){
  const sorted=[...games].sort((a,b)=>sortKey(a)-sortKey(b));
  let html=`<div class="section-title">${title}</div>`;
  if(!sorted.length)return html+`<div class="empty-state">Nenhum jogo nesta lista.</div>`;
  const dates=[...new Set(sorted.map(g=>g.dt))];
  dates.forEach(dt=>{
    html+=`<div class="section-hdr"><span class="section-badge">${dt}</span><div class="section-line"></div></div>`;
    html+=`<div class="games-grid">`;
    sorted.filter(g=>g.dt===dt).forEach(g=>{html+=renderCard(g);});
    html+=`</div>`;
  });
  return html;
}

// ─── MATA-MATA (fase eliminatória) ────────────────────────────────────────────
// Tabelas NOVAS e separadas (MM_TCONF/MM_TPAL = mata_confrontos|dev_mata_confrontos etc.) —
// não tocam na fase de grupos. TODOS os 8 palpitam (humanos editam na UI; IAs entram pela
// criação via Claude Code e aparecem como leitura). Criar/editar/remover confronto NÃO fica
// exposto na UI do usuário final — é feito por fora (admin).
const MM_HUMANS=['jessica','tonius','leo','vinicius'];   // quem é editável pela UI

let MM_PALPITES={};       // { confronto_id → { pid → {gols_a,gols_b,quem_passa} } }
const mmDeb={}, mmRemoveConfirm={}, mmEditing={};

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function mmIsTest(c){return /\[TESTE\]/i.test((c.team_a||'')+' '+(c.team_b||'')+' '+(c.phase||''));}
// Turbos (×2) marcados por fase (flag no código): 16avos=6, oitavas=3, quartas=2, semis=1, 3º=0, final=0.
// Turbos: 16 avos = Brasil×Japão(r32_2) · CostaMarfim×Noruega(r32_5) · França×Suécia(r32_6) ·
// México×Equador(r32_7) · Bélgica×Senegal(r32_9) · EUA×Bósnia(r32_10). Outras fases inalteradas.
const MM_TURBO=new Set(['r32_2','r32_5','r32_6','r32_7','r32_9','r32_10','r16_2','r16_5','r16_8','qf_1','qf_3','sf_2']);
function mmIsTurbo(c){return MM_TURBO.has(c.id);}
// Multiplicador por FASE sobre a base (5+1+1+3). Turbo dobra em cima. Teto: Final (×4) é o maior — o
// maior turbo possível é a semi (×1,75 × 2 = ×3,5 < ×4).
const MM_PHASE_MULT={'32avos':1,'oitavas':1.25,'quartas':1.5,'semis':1.75,'3lugar':1.75,'final':4};
function mmPhaseKeyOf(id){const col=MM_COLS.find(c=>c.ids.includes(id));return col?col.key:'32avos';}
function mmMult(c){return (MM_PHASE_MULT[mmPhaseKeyOf(c.id)]||1)*(mmIsTurbo(c)?2:1);}
// Palpite só conta como DADO com os DOIS gols preenchidos (e, se empate, também o "quem passa") — Parte 7.
function mmHasFullPred(pal){return !!(pal&&pal.gols_a!=null&&pal.gols_b!=null&&(pal.gols_a!==pal.gols_b||pal.quem_passa));}
function mmMissingHuman(c){return MATA_PARTS.some(p=>p.type==='human'&&!mmHasFullPred((MM_PALPITES[c.id]||{})[p.id]));}
const mmCollapsedDays=new Set();   // 10: dias recolhidos na lista
let mmDaysInit=false;

async function loadMata(){
  try{
    const [rc,rp]=await Promise.all([
      sb.from(MM_TCONF).select('*').order('created_at',{ascending:true}),
      sb.from(MM_TPAL).select('*'),
    ]);
    if(rc.error||rp.error){console.warn('Mata-mata sem tabelas ainda?',(rc.error||rp.error).message);MM_CONFRONTOS=[];MM_PALPITES={};return false;}
    MM_CONFRONTOS=rc.data||[];
    MM_PALPITES={};
    (rp.data||[]).forEach(r=>{(MM_PALPITES[r.confronto_id]||(MM_PALPITES[r.confronto_id]={}))[r.pid]={gols_a:r.gols_a,gols_b:r.gols_b,quem_passa:r.quem_passa};});
    return true;
  }catch(e){console.warn('loadMata falhou',e);MM_CONFRONTOS=[];MM_PALPITES={};return false;}
}

// ── Pontuação do MATA-MATA (só mata-mata; a fase de grupos NÃO usa isto e fica congelada) ──
// Sobre o PLACAR FINAL (com prorrogação). Componentes que MULTIPLICAM pela fase×turbo:
//   5 resultado · 1 gols A · 1 gols B · 2 SALDO (só quando há vencedor no real) · 3 placar exato ·
//   4 PÊNALTIS (real empate + palpitou empate + acertou quem passa) — o +4 ENTRA na base e MULTIPLICA.
// Bônus de ZEBRA (FIXO, não multiplica): +3 zebra / +5 zebrão, se a pessoa apontou o azarão pra
// avançar E o azarão avançou de verdade. Total = round(base × fase × turbo) + zebra.
function fmtPts(n){ if(n==null||isNaN(n))return ''; return (''+(Math.round(n*100)/100)).replace('.',','); }
function mmScore(pal,c){
  if(!pal||pal.gols_a==null||pal.gols_b==null)return null;
  if(c.real_a==null||c.real_b==null)return null;
  const pa=+pal.gols_a,pb=+pal.gols_b,ra=+c.real_a,rb=+c.real_b;
  const realDraw=ra===rb, comp=[]; let base=0;
  const pres=pa>pb?'A':pa<pb?'B':'E', rres=ra>rb?'A':ra<rb?'B':'E';
  if(pres===rres){base+=5;comp.push({v:5,lbl:'resultado'});}
  if(pa===ra){base+=1;comp.push({v:1,lbl:'gols '+(c.team_a||'A')});}
  if(pb===rb){base+=1;comp.push({v:1,lbl:'gols '+(c.team_b||'B')});}
  if(!realDraw && (pa-pb)===(ra-rb)){base+=2;comp.push({v:2,lbl:'saldo'});}     // saldo só quando há vencedor
  if(pa===ra&&pb===rb){base+=3;comp.push({v:3,lbl:'placar exato'});}
  if(realDraw && pa===pb && pal.quem_passa && c.classificado && pal.quem_passa===c.classificado){base+=4;comp.push({v:4,lbl:'pênaltis'});}   // +4 ENTRA na base (multiplica)
  const phaseKey=mmPhaseKeyOf(c.id), phaseMult=MM_PHASE_MULT[phaseKey]||1, turbo=mmIsTurbo(c);
  const partida=Math.round(base*phaseMult*(turbo?2:1)*100)/100;   // pontos da partida (já multiplicados)
  let zebra=0, zebraTipo=null; const z=mmZebra(c);   // bônus de zebra: fixo, somado no fim
  if(z){
    const rw=mmRealWinner(c), palAdv=pa>pb?'A':pa<pb?'B':(pal.quem_passa||null);   // quem a pessoa apontou pra avançar
    if(rw && rw===z.azarao && palAdv===z.azarao){zebra=z.tipo==='zebrao'?5:3; zebraTipo=z.tipo;}
  }
  return {total:Math.round((partida+zebra)*100)/100, comp, base, phaseKey, phaseMult, turbo, partida, zebra, zebraTipo};
}
function calcMataPts(pal,c){const s=mmScore(pal,c);return s?s.total:null;}
// Balão "de onde vêm os pontos" (PARTE B): componentes · multiplicadores · zebra (soma fixa) · total.
function mmPtsTipHTML(s){
  const PH={'32avos':'16 avos','oitavas':'oitavas','quartas':'quartas','semis':'semis','3lugar':'3º lugar','final':'final'};
  const comps=s.comp.length?s.comp.map(c=>`+${c.v} ${c.lbl}`).join(' · '):'sem acertos';
  let mult=`× ${fmtPts(s.phaseMult)} (${PH[s.phaseKey]||s.phaseKey})`+(s.turbo?` · × 2 (turbo)`:'');
  let h=`<div class="mm-tip-l1">${comps}</div><div class="mm-tip-l2">${mult}</div>`;

// Estatísticas do mata-mata para o ranking (ignora confrontos de TESTE e não finalizados)
function mataStats(pid){
  let total=0,rHits=0,eHits=0,played=0,cravadas=[];
  MM_CONFRONTOS.forEach(c=>{
    if(mmIsTest(c)||!c.finished||c.real_a==null||c.real_b==null)return;
    const pal=(MM_PALPITES[c.id]||{})[pid];
    const pts=calcMataPts(pal,c); if(pts==null)return;
    total+=pts; played++;
    const ra=+c.real_a,rb=+c.real_b,pa=+pal.gols_a,pb=+pal.gols_b;
    if((pa>pb?'A':pa<pb?'B':'E')===(ra>rb?'A':ra<rb?'B':'E'))rHits++;
    if(pa===ra&&pb===rb){eHits++;cravadas.push({fA:c.flag_a,tA:c.team_a,realA:c.real_a,fB:c.flag_b,tB:c.team_b,realB:c.real_b});}
  });
  return {total,rHits,eHits,played,cravadas};
}

// Empate no palpite → "Pênaltis", clicável (humano escolhe; IA mostra a escolha do Vini, leitura).
function mmQuemPassaHTML(c,pid,editable){
  const p=(MM_PALPITES[c.id]||{})[pid]||{};

  const sel=!complete?null:(draw?p.quem_passa:(p.gols_a>p.gols_b?'A':'B'));   // empate: escolha; vencedor: auto
  const clickable=draw&&editable;
  const opt=s=>{
    const t=s==='A'?tm.a:tm.b, on=sel===s;
    const click=clickable?` onclick="mmSetQuemPassa('${c.id}','${pid}','${s}')"`:'';

function mmZebra(c){return MM_ZEBRA[c&&c.id]||null;}   // leitor (pra próxima etapa); por enquanto não é chamado
// data/hora/local de um confronto: prioriza o banco (dt/tm/venue) e cai pra agenda em código.
function mmInfo(c){const a=MM_AGENDA[c.id]||{};return {dt:c.dt||a.dt||'',tm:c.tm||a.tm||'',ven:c.venue||a.ven||''};}
function mmWeekday(dt){if(!dt)return '';const [dd,mm]=dt.split('/').map(Number);return WD[new Date(2026,mm-1,dd).getDay()];}
// chave cronológica pra ordenar a lista (sem data → fim)
function mmSchedKey(c){const i=mmInfo(c);if(!i.dt)return Number.MAX_SAFE_INTEGER;const [dd,mm]=i.dt.split('/').map(Number);const h=i.tm?parseInt(i.tm)||0:0;const mi=(i.tm&&i.tm.split('h')[1])?parseInt(i.tm.split('h')[1]):0;return (mm*100+dd)*10000+h*100+mi;}
function mmConf(id){return MM_CONFRONTOS.find(c=>c.id===id);}
// Quem AVANÇOU de verdade — pelo PLACAR REAL (empate → pênaltis via classificado). NUNCA por palpite.
function mmRealWinner(c){
  if(!c||c.real_a==null||c.real_b==null)return null;
  if(c.real_a>c.real_b)return 'A';
  if(c.real_b>c.real_a)return 'B';
  return (c.classificado==='A'||c.classificado==='B')?c.classificado:null;
}
// Time resolvido de um lado de uma vaga: {name,flag} ou null ("A definir"). Recursivo pela estrutura.
function mmResolveSide(slotId,side){
  const slot=MM_BRACKET[slotId];
  if(slot&&slot.feeders){const f=slot.feeders[side];return mmOutcome(f.g,f.take);}
  const c=mmConf(slotId); if(!c)return null;
  const nm=side==='A'?c.team_a:c.team_b, fl=side==='A'?c.flag_a:c.flag_b;
  return nm?{name:nm,flag:fl}:null;
}
function mmOutcome(gameId,take){
  const w=mmRealWinner(mmConf(gameId)); if(w==null)return null;   // sem resultado real → vaga indefinida
  const side=take==='win'?w:(w==='A'?'B':'A');
  return mmResolveSide(gameId,side);
}
function mmTeams(c){return {a:mmResolveSide(c.id,'A'),b:mmResolveSide(c.id,'B')};}

// Bloco do confronto (matchup) — mesmo visual da fase de grupos; usa times RESOLVIDOS pela estrutura.
function mmMatchupHTML(c){
  const hasReal=c.finished&&c.real_a!=null&&c.real_b!=null, tm=mmTeams(c);
  const win=side=>{ if(!hasReal||c.real_a===c.real_b)return 'team'; const aw=c.real_a>c.real_b; return side==='A'?(aw?'team win':'team lose'):(aw?'team lose':'team win'); };
  const z=mmZebra(c);   // zebra/zebrão: imagem (com +3/+5 embutido) AO LADO da bandeira do azarão (lado data-driven)
  const sd=(s,t)=>{
    const zimg=(z&&z.azarao===s&&t)?`<img class="mm-zebra-img ${s==='A'?'za':'zb'}" src="Imagens/${z.tipo==='zebrao'?'Zebra_o':'Zebra'}.png" alt="${z.tipo==='zebrao'?'Zebrão +5':'Zebra +3'}" title="${z.tipo==='zebrao'?'Zebrão (+5)':'Zebra (+3)'}">`:'';
    return `<div class="${win(s)}${t?'':' mm-tbd'}"><span class="team-flag">${t?mmFlag(t.flag):'<span class="mm-q">?</span>'}${zimg}</span><span class="team-name">${esc((t&&t.name)||'')}</span></div>`;
  };
  // Centro: bolinha "×" (ou placar) e, logo abaixo, o local (📍) — omitido quando não há (sem inventar).
  const ven=mmInfo(c).ven;
  const venue=ven?`<div class="venue">📍 ${esc(ven)}</div>`:'';
  return `<div class="matchup mm-matchup">${sd('A',tm.a)}
      <div class="mid">${hasReal?`<div class="score-final">${c.real_a}<small>×</small>${c.real_b}</div>`:`<div class="vs-badge">VS</div>`}${venue}</div>
      ${sd('B',tm.b)}</div>`;
}
// Área COLAPSÁVEL: só os palpites (humanos + IAs). Cabeçalho/bandeiras/placar ficam fora (sempre visíveis).

    if(isHuman){

      return `<div class="pred-cell human mm-cell mm-hcell${mmHasFullPred(pal)?'':' mm-miss-cell'}" data-pid="${pid}">

// ── CHAVE (bracket): esqueleto FIXO de todas as fases; vaga sem time resolvido = "A definir" ──
function mmBracketBox(slotId){
  const c=mmConf(slotId), tm={a:mmResolveSide(slotId,'A'),b:mmResolveSide(slotId,'B')};
  const fin=c&&c.finished&&c.real_a!=null&&c.real_b!=null, w=mmRealWinner(c);
  const side=(s,t)=>{
    if(!t)return `<div class="mm-bx-side empty"></div>`;   // vaga futura → caixa VAZIA (sem texto)
    const sc=c?(s==='A'?c.real_a:c.real_b):null;
    const adv=fin&&c.real_a===c.real_b&&c.classificado===s;   // passou nos pênaltis
    const won=fin&&w===s, lost=fin&&w&&w!==s;
    // (p) vira tag ao lado do NOME (não no placar) pra não desalinhar a coluna dos números.
    const z=MM_ZEBRA[slotId];   // zebra/zebrão no chaveamento: imagenzinha ao lado da bandeira do azarão
    const zi=(z&&z.azarao===s)?`<img class="mm-bx-zebra" src="Imagens/${z.tipo==='zebrao'?'Zebra_o':'Zebra'}.png" alt="">`:'';
    return `<div class="mm-bx-side${won?' win':''}${lost?' lost':''}">${mmFlag(t.flag)}${zi}<span class="mm-bx-nm">${esc(t.name)}${adv?'<span class="mm-bx-pen">pên</span>':''}</span><span class="mm-bx-sc">${fin&&sc!=null?sc:''}</span></div>`;
  };
  const playable=!!(c&&tm.a&&tm.b);   // tem confronto e os dois times conhecidos → clicável (abre na lista)
  return `<div class="mm-bx${playable?'':' nolink'}"${playable?` onclick="mmGotoConfronto('${slotId}')"`:''} title="${esc(((tm.a&&tm.a.name)||'A definir')+' x '+((tm.b&&tm.b.name)||'A definir'))}">${side('A',tm.a)}${side('B',tm.b)}</div>`;
}
function mmColLabel(id){const col=MM_COLS.find(c=>c.ids.includes(id));return col?col.label:'';}
// Bandeira numa caixa de tamanho FIXO, centralizada, sem distorcer (padroniza quadradas e retangulares).
function mmFlag(em){return em?`<span class="flagbx">${flagImg(em)}</span>`:'';}
// Cabeçalho do card no estilo da fase de grupos: fase + status à esquerda; data/hora à direita (omitida se não houver).
function mmHeadHTML(c){
  const status=c.finished?'<span class="bl-tag fec">FECHADO</span>':'<span class="bl-tag abe">ABERTO</span>';
  const turbo=mmIsTurbo(c)?'<span class="bl-tag turbo">⚡ TURBO 2×</span>':'';

  return `<div class="card-head"><span class="grp-tag"><span class="ch-dot${c.finished?' closed':''}"></span>${esc((mmColLabel(c.id)||'MATA-MATA').toUpperCase())} ${status}${turbo}${mmZebraSeal(c)}</span>${dt}</div>`;
}
// Seção do chaveamento com cabeçalho colapsável (A1).
function mmBracketSectionHTML(){
  // Card único: cabeçalho (com seta) grudado no topo e a chave logo abaixo, mesma borda/cantos.
  const op=mmBracketOpen;
  let h=`<div class="mm-sec${op?' open':''}"><div class="mm-sec-head" onclick="mmToggleBracket()"><span class="mm-sec-title">⚔️ Chaveamento</span><span class="mm-sec-cta"><span class="mm-sec-cta-lbl">${op?'toque para fechar':'toque para abrir'}</span><span class="mm-sec-arrow">${op?'▴':'▾'}</span></span></div>`;
  if(op)h+=mmBracketHTML();
  return h+`</div>`;
}
function mmRerenderBracket(){const s=document.getElementById('mm-bracket-section');if(s){s.innerHTML=mmBracketSectionHTML();mmFitBracket();}}
function mmToggleBracket(){mmBracketOpen=!mmBracketOpen;mmRerenderBracket();}
function mmToggleCol(key){if(mmCollapsedCols.has(key))mmCollapsedCols.delete(key);else mmCollapsedCols.add(key);mmRerenderBracket();}
// Chave clássica: caixas posicionadas + conectores SVG em colchete. Fases podem ser recolhidas (A2):
// a coluna expandida mais à esquerda é distribuída uniformemente e as seguintes centralizam entre os
// feeders, então recolher fases antigas reduz altura E largura, deslocando o foco pra esquerda.
function mmBracketHTML(){
  const bw=134, bh=46, gapX=38, gapXc=12, gapY=12, titleH=24, colW0=18, padX=6, padR=8, padB=12, padY=titleH+12;   // caixa um pouco mais larga p/ caber nomes inteiros ("Inglaterra")
  const colX={}, colWid={}; let x=padX;
  // Colapsada: faixa mais fina (colW0) e gap menor (gapXc) → sobra espaço pra ver as fases à direita (8.1).
  MM_COLS.forEach(col=>{const cl=mmCollapsedCols.has(col.key);const w=cl?colW0:bw;colX[col.key]=x;colWid[col.key]=w;x+=w+(cl?gapXc:gapX);});
  const pos={}; let maxBottom=padY;
  MM_COLS.forEach((col,ci)=>{
    if(mmCollapsedCols.has(col.key))return;
    const prev=ci>0?MM_COLS[ci-1]:null, base=!prev||mmCollapsedCols.has(prev.key);
    col.ids.forEach((id,i)=>{
      let y; if(base){y=padY+i*(bh+gapY);} else {const f=MM_BRACKET[id].feeders;y=(pos[f.A.g].y+pos[f.B.g].y)/2;}
      pos[id]={x:colX[col.key],y};
    });
  });
  if(pos['tp_1']&&pos['sf_2'])pos['tp_1'].y=pos['sf_2'].y+(bh+gapY)*1.4;   // 3º lugar: abaixo da semi de baixo
  Object.keys(pos).forEach(id=>{maxBottom=Math.max(maxBottom,pos[id].y+bh);});
  const totalW=(x-gapX)+padR, totalH=maxBottom+padB;
  // conectores: só quando a caixa E a coluna dos feeders estão expandidas
  let paths='';
  Object.keys(MM_BRACKET).forEach(id=>{
    const slot=MM_BRACKET[id]; if(!slot.feeders||!pos[id])return;
    const feederCol=MM_COLS.find(c=>c.ids.includes(slot.feeders.A.g)).key;
    if(mmCollapsedCols.has(feederCol))return;
    const bx=pos[id].x, bym=pos[id].y+bh/2, is3=(id==='tp_1');
    ['A','B'].forEach(s=>{const f=slot.feeders[s],fp=pos[f.g];if(!fp)return;const fxr=fp.x+bw,fym=fp.y+bh/2,mx=(fxr+bx)/2;paths+=`<path d="M${fxr} ${fym} H${mx} V${bym} H${bx}" class="mm-cn${is3?' c3':''}"/>`;});
  });
  // títulos clicáveis (recolhe/expande a fase); colapsada vira faixa estreita vertical
  let titles='';
  MM_COLS.forEach(col=>{
    const cl=mmCollapsedCols.has(col.key);
    titles+=`<div class="mm-coltitle${cl?' col-collapsed':''}" style="left:${colX[col.key]}px;width:${colWid[col.key]}px${cl?`;height:${totalH-padB}px`:''}" onclick="mmToggleCol('${col.key}')" title="${cl?'Expandir':'Recolher'} esta fase">${col.label}</div>`;
  });
  let boxes='';
  Object.keys(pos).forEach(id=>{boxes+=`<div class="mm-bxpos" style="left:${pos[id].x}px;top:${pos[id].y}px;width:${bw}px;height:${bh}px">${mmBracketBox(id)}</div>`;});
  return `<div class="mm-bracket-wrap">
    <div class="mm-bracket-hint">Toque num confronto definido pra abrir os palpites · toque no título de uma fase pra recolhê-la</div>
    <div class="mm-bracket-scroll"><div class="mm-bracket" data-w="${totalW}" data-h="${totalH}" style="width:${totalW}px;height:${totalH}px">
      <svg class="mm-cn-svg" width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" preserveAspectRatio="xMinYMin meet">${paths}</svg>
      ${titles}${boxes}
    </div></div>
  </div>`;
}
// Desktop (≥760px): escala a chave pra caber na largura SEM rolagem horizontal. Celular: rola.
function mmFitBracket(){
  const el=document.querySelector('#tab-mata .mm-bracket'); if(!el)return;
  const wrap=el.parentElement, W=+el.dataset.w, H=+el.dataset.h;
  if(window.innerWidth>=760){
    const avail=Math.max(320,wrap.clientWidth-16), s=Math.min(1.3,avail/W);
    el.style.transform='scale('+s+')';
    wrap.style.height=(H*s+4)+'px'; wrap.style.overflowX='hidden';
  }else{
    el.style.transform='none'; wrap.style.height=''; wrap.style.overflowX='auto';
  }
}
let _mmResizeBound=false;

// ── LISTA: só fases que já existem; cada confronto é clicável e expande inline ──
// Selo de zebra (PARTE C): 🦓 +3 (zebra) ou 🦓 +5 dourado (zebrão), no cantinho do card.

// Card-fantasma (3.1): fase ainda sem confronto definido → mostra data/hora/local, sem bandeiras/times.

// Na 1ª vez, recolhe os dias que JÁ PASSARAM (10.3); dias futuros começam abertos.
function mmEnsureDaysInit(){
  if(mmDaysInit)return; mmDaysInit=true;
  const now=new Date(), hoje=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  MM_CONFRONTOS.forEach(c=>{const d=mmGameDate(c);if(d&&new Date(d.getFullYear(),d.getMonth(),d.getDate())<hoje)mmCollapsedDays.add(mmInfo(c).dt);});

function mmToggleDay(dt){if(mmCollapsedDays.has(dt))mmCollapsedDays.delete(dt);else mmCollapsedDays.add(dt);const l=document.getElementById('mm-list');if(l)l.innerHTML=mmListHTML();}
// Lista da fase do filtro: TODOS os jogos (fantasmas pras vagas não definidas), por DATA, dia colapsável (7.1/10).
function mmListHTML(){
  mmEnsureDaysInit();
  const col=MM_COLS.find(c=>c.key===mmPhaseFilter)||MM_COLS[0];
  const cards=col.ids.map(id=>mmConf(id)).filter(Boolean).sort((a,b)=>mmSchedKey(a)-mmSchedKey(b));
  if(!cards.length)return `<div class="empty-state">Confrontos ainda não definidos.</div>`;
  let html='', i=0;
  while(i<cards.length){
    const dt=mmInfo(cards[i]).dt, group=[];
    while(i<cards.length&&mmInfo(cards[i]).dt===dt){group.push(cards[i]);i++;}
    const col2=mmCollapsedDays.has(dt);
    html+=`<div class="section-hdr mm-datehdr${col2?' col':''}" onclick="mmToggleDay('${dt||''}')"><span class="section-badge">${dt?mmWeekday(dt)+', '+esc(dt):'Sem data'} (${group.length})</span><div class="section-line"></div><span class="mm-day-arrow">${col2?'▼':'▲'}</span></div>`;
    if(!col2)group.forEach(c=>{html+=(mmResolveSide(c.id,'A')&&mmResolveSide(c.id,'B'))?mmListItem(c):mmGhostCard(c);});
  }
  return html;
}
function mmSetPhase(key){

// Data/hora de um jogo (pra calcular "próximos" e ordenar).
function mmGameDate(c){const i=mmInfo(c);if(!i.dt)return null;const [dd,mm]=i.dt.split('/').map(Number);const h=i.tm?parseInt(i.tm)||0:0;const mi=(i.tm&&i.tm.split('h')[1])?parseInt(i.tm.split('h')[1]):0;return new Date(2026,mm-1,dd,h,mi);}
// (1) Próximos 3 jogos do mata-mata — MESMO visual do hero "jogos de hoje" da fase de grupos (com contagem).
function mmGotoFromHero(cid){mmSetPhase(mmPhaseKeyOf(cid));mmGotoConfronto(cid);}
function mmNextGamesHTML(){
  const now=Date.now();
  const up=MM_CONFRONTOS.map(c=>({c,d:mmGameDate(c)})).filter(x=>x.d&&x.d.getTime()>now).sort((a,b)=>a.d-b.d).slice(0,3);
  if(!up.length)return '';
  // zebra/zebrão: imagem (com +3/+5) AO LADO da bandeira do azarão (lado pelo dado mmZebra)
  const tnm=(t,c,s)=>{ if(!t)return '<b>?</b>'; const z=mmZebra(c); const zi=(z&&z.azarao===s)?`<img class="dh-zebra-img" src="Imagens/${z.tipo==='zebrao'?'Zebra_o':'Zebra'}.png" alt="${z.tipo==='zebrao'?'Zebrão':'Zebra'}">`:''; return `${t.flag?flagImg(t.flag):''}${zi} <b>${esc(t.name)}</b>`; };
  const row=({c,d})=>{const i=mmInfo(c),tm=mmTeams(c),t=d.getTime(),miss=mmMissingHuman(c);
    return `<div class="dh-row${mmIsTurbo(c)?' dh-turbo':''}" onclick="mmGotoFromHero('${c.id}')">
      <span class="dh-time">${esc(i.tm||'')}</span>
      ${mmIsTurbo(c)?'<span class="dh-turbobadge">⚡2×</span>':''}
      <span class="dh-teams"><span class="dh-scroll">${tnm(tm.a,c,'A')} <i>×</i> ${tnm(tm.b,c,'B')}${miss?' <span class="dh-miss">• falta palpite</span>':''}</span></span>
      <span class="dh-cd" data-t="${t}">${fmtCountdown(t-now)}</span>
    </div>`;};
  return `<div class="day-hero"><div class="dh-head"><span class="nh-live"></span>PRÓXIMOS JOGOS · MATA-MATA</div><div class="dh-list">${up.map(row).join('')}</div></div>`;
}
// (2) Classificação do mata-mata — MESMA barra rolante da classificação geral, filtrando só o mata-mata.
function mmMataRankingHTML(){
  const rows=MATA_PARTS.map(p=>({p,...mataStats(p.id)})).sort((a,b)=>b.total-a.total||b.eHits-a.eHits||b.rHits-a.rHits);
  const medals=['🥇','🥈','🥉'];
  const item=(o,i)=>`<span class="rm-item"><span class="rm-pos">${medals[i]||(i+1)+'º'}</span><span class="rm-av" style="background:${o.p.color};box-shadow:0 0 0 2px var(--surface),0 0 0 3px ${o.p.color}">${avInner(o.p)}</span><span class="rm-nm">${o.p.name}</span><span class="rm-pts">${fmtPts(o.total)} pts</span></span>`;
  const seq=rows.map(item).join('');
  return `<div class="rank-marquee"><div class="rm-head">🏆 CLASSIFICAÇÃO DO MATA-MATA</div><div class="rm-track-wrap"><div class="rm-track" onclick="this.classList.toggle('paused')">${seq}${seq}</div></div></div>`;
}
// (3) Como funciona a pontuação.
function mmHowItWorksHTML(){
  return `<details class="mm-block mm-how"><summary class="mm-block-h">📐 Como funciona a pontuação (só mata-mata)</summary><div class="mm-how-body">
    <p><b>Vale só pro mata-mata</b> — a fase de grupos <b>não muda</b>. Tudo sobre o <b>placar final</b> (com prorrogação).</p>
    <p><b>Pontos da partida</b> (multiplicam pela fase e pelo turbo): <b>5</b> resultado · <b>+1</b> gols do A · <b>+1</b> gols do B · <b>+2</b> saldo de gols <i>(só quando há vencedor; em empate não conta)</i> · <b>+3</b> cravar o placar · <b>+4</b> pênaltis <i>(palpitou empate e acertou quem passou)</i> — <b>o +4 também multiplica</b>.</p>
    <p><b>Multiplicador por fase</b>: 16 avos ×1 · Oitavas ×1,25 · Quartas ×1,5 · Semis ×1,75 · 3º lugar ×1,75 · <b>Final ×4</b>. <b>Turbo ⚡ ×2</b> em cima da fase (ex.: turbo na semi = ×3,5). Nenhum jogo passa da Final (×4).</p>
    <p><b>Bônus de zebra 🦓</b> (soma <b>fixa</b> no fim, <b>não</b> multiplica): <b>+3 zebra</b> · <b>+5 zebrão</b> (dourado). Ganha quem apontou o <b>azarão</b> pra avançar <b>e</b> ele realmente avançou. Azarão com ≤25% de chance de passar = zebra; ≤12% = zebrão.</p>
  </div></details>`;
}
function renderMata(){
  let html=mmNextGamesHTML()+mmMataRankingHTML()+mmHowItWorksHTML();
  html+=`<div id="mm-bracket-section">${mmBracketSectionHTML()}</div>`;   // chave (não afetada pelo filtro)
  html+=`<div class="mm-filters">${MM_COLS.map(col=>`<button class="mm-fbtn${col.key===mmPhaseFilter?' active':''}" data-key="${col.key}" onclick="mmSetPhase('${col.key}')">${col.short}</button>`).join('')}</div>`;
  html+=`<div id="mm-list">${mmListHTML()}</div>`;
  document.getElementById('tab-mata').innerHTML=html;
  mmFitBracket();
  setupMarquees();   // faz o texto dos jogos do hero rolar quando não cabe (igual à fase de grupos)
  if(_cdInterval){clearInterval(_cdInterval);_cdInterval=null;}
  if(document.querySelector('#tab-mata .dh-cd'))_cdInterval=setInterval(tickCountdown,1000);   // contagem regressiva
  if(!_mmResizeBound){_mmResizeBound=true;window.addEventListener('resize',()=>{if(activeTab==='mata')mmFitBracket();});}
}

// ─── ESPELHO PROD→DEV (só no ambiente de dev) ─────────────────────────────────
// Lê a PRODUÇÃO (somente leitura) e regrava no banco de DEV (tabelas dev_*). Usa só a anon key.
async function mirrorProdToDev(){
  if(!IS_DEV){showErr('O espelho só funciona no ambiente de dev.');return;}
  if(!confirm('Isso vai apagar todos os dados do dev e copiar os da produção. Continuar?'))return;
  const btn=document.getElementById('mirror-btn'); if(btn){btn.disabled=true;btn.textContent='Espelhando…';}
  try{
    setSyncing(1);
    // 1) lê produção (NÃO escreve nela)
    const pg=await sb.from('bolao_games').select('*');      if(pg.error)throw pg.error;
    const pc=await sb.from('mata_confrontos').select('*');  // podem ainda não existir em produção
    const pp=await sb.from('mata_palpites').select('*');
    // 2) zera o dev (filhos antes dos pais)
    let r;
    r=await sb.from('dev_mata_palpites').delete().not('confronto_id','is',null);  if(r.error)throw r.error;
    r=await sb.from('dev_mata_confrontos').delete().not('id','is',null);          if(r.error)throw r.error;
    r=await sb.from('dev_bolao_games').delete().not('game_id','is',null);         if(r.error)throw r.error;
    // 3) copia produção → dev
    if(pg.data&&pg.data.length){r=await sb.from('dev_bolao_games').insert(pg.data);         if(r.error)throw r.error;}
    if(!pc.error&&pc.data&&pc.data.length){r=await sb.from('dev_mata_confrontos').insert(pc.data); if(r.error)throw r.error;}
    if(!pp.error&&pp.data&&pp.data.length){r=await sb.from('dev_mata_palpites').insert(pp.data);    if(r.error)throw r.error;}
    setSyncing(-1);
    alert(`Pronto! Dev espelhado da produção: ${pg.data?pg.data.length:0} jogos, ${(!pc.error&&pc.data)?pc.data.length:0} confrontos. Recarregando…`);
    location.reload();
  }catch(e){
    setSyncing(-1);
    if(btn){btn.disabled=false;btn.textContent='🪞 Espelhar prod→dev';}
    showErr('Erro ao espelhar (as tabelas dev_* existem? rode supabase_dev_setup.sql): '+(e.message||e));
  }
}

// ─── TAB NAV ──────────────────────────────────────────────────────────────────
function showTab(name){
  if(name==='palpites')name='ranking';   // "Grupos" foi fundido no Ranking (Bolão Geral) — Tarefa B
  activeTab=name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  const tabEl=document.getElementById('tab-'+name); if(tabEl)tabEl.classList.add('active');
  ['mata','ranking'].forEach((n,i)=>{   // menu com 2 itens: Mata-mata · Ranking
    if(n===name){const b=document.querySelectorAll('nav button')[i]; if(b)b.classList.add('active');}
  });
  renderAll();
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
if(IS_DEV){   // marca visual + botão de espelho, só no ambiente de dev (hostname dev./ratazana.)
  document.title='DEV · Bolão Ratazana Copa 26';   // título da aba só em teste, mesma detecção IS_DEV
  const seal=document.getElementById('dev-seal'); if(seal)seal.style.display='';   // selo DEV no cabeçalho
  document.body.insertAdjacentHTML('afterbegin','<button id="mirror-btn" onclick="mirrorProdToDev()">🪞 Espelhar prod→dev</button>');
}
loadData();   // home padrão = Mata-mata (definido em activeTab e nas classes .active estáticas)
