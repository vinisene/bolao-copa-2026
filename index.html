<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bolão Ratazana Copa 26</title>
<link rel="icon" href="Imagens/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="Imagens/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="Imagens/favicon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="Imagens/favicon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="Imagens/favicon-512.png">
<meta name="theme-color" content="#0C0C0E">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Noto+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,500&display=swap');
/* ── Tokens de design (identidade "Bolão Ratazana Copa 26") ── */
:root{--g:#1a6b3a;--gl:#2d9653;--gd:#0f4424;--gold:#e8c44a;--bg:#f4f7f4;--card:#fff;--txt:#1a1a1a;--mu:#666;--brd:#dde6dd;--je:#e05c8b;--vi:#3d8ef0;--ch:#19c37d;--cl:#cc6b2c;}
:root{
  --frame:#0C0C0E; --card-dark:#15151A; --input-dark:#26262C; --note-dark:#16161B;
  --sheet:#EDEAE3; --surface:#FFFFFF; --surface-2:#F3F1EA; --surface-3:#E7E4DA; --turbo-foot:#FFF3EE;
  --ink:#16161B; --ink-2:#43434B; --muted:#6E6E77; --faint:#A2A2AA; --on-dark:#F6F6F7; --on-dark-muted:#8A8A94;
  --lime:#C2EC00; --lime-deep:#7D9B00; --blue:#2F63F6; --red:#F5314F; --cyan:#0FA3BD; --violet:#6D3BF5;
  --orange:#FF5A1F; --green:#0FAE62; --green-ink:#0A8F4F; --yellow:#D99500; --pink:#EC3C7E; --mint:#10B894;
  --gold:#E0A82E; --silver:#8B95A1; --bronze:#B06D35;
  --line:rgba(20,20,26,.10); --line-2:rgba(20,20,26,.16);
  --font-display:'Archivo',sans-serif; --font-body:'Noto Sans',system-ui,sans-serif;
  --r-card:18px; --r-stat:16px; --r-mini:14px; --r-btn:11px; --r-field:9px; --r-pill:20px;
  --shape-block:5px 1px 5px 1px;
  --shadow-card:0 8px 22px -16px rgba(20,20,26,.5);
  --shadow-turbo:0 12px 28px -16px rgba(255,90,31,.55);
  --shadow-nav:0 -12px 28px -18px rgba(0,0,0,.9);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--sheet);color:var(--txt);min-height:100vh;}
/* identidade Copa 26: títulos, números e horas em Archivo (só troca a fonte; cores/posições intactas) */
.hdr-title,.dh-time,.dh-cd,.nh-cd .clock,.nh-label,.card-head .dt-tag,.pc-score,.score-final,.rk-tot b,.rk-place,.pod-base,.pod-pts,.stat-box .val,.vs2-pts,.tr-pts,.mm-bx-sc,.mm-iascore,.mm-next-when,.mm-rk-pos,.mm-rk-pts b,.lh-title,.section-badge,.mm-block-h{font-family:var(--font-display);}
/* ── Cabeçalho (barra preta, identidade Copa 26) ── */
/* Cabeçalho em fluxo normal (NÃO sticky): se ficasse fixo no topo (z-index alto), ele cobria a
   parte de cima do conteúdo e ENGOLIA os toques no cabeçalho do chaveamento e nas colunas de fase
   (bug "às vezes não abre"). Sem sticky, nada fica coberto. A navegação fixa é a barra de baixo. */
header{position:relative;z-index:1;background:var(--frame);color:var(--on-dark);padding:15px 14px 13px;border-bottom:1px solid rgba(255,255,255,.07);overflow:hidden;}
.hdr-shapes{position:absolute;top:0;right:0;width:120px;height:100%;pointer-events:none;z-index:0;}
.hsh{position:absolute;display:block;}
.hsh-blue{top:0;right:0;width:96px;height:96px;background:var(--blue);border-radius:0 0 0 100%;opacity:.2;}
.hsh-red{top:0;right:36px;width:52px;height:52px;background:var(--red);border-radius:50% 0 0 0;opacity:.22;}
.hsh-lime{top:31px;right:13px;width:18px;height:18px;background:var(--lime);border-radius:var(--shape-block);opacity:.5;}
.hdr-top{position:relative;z-index:1;display:flex;align-items:center;gap:11px;}
.hdr-logo{height:76px;width:auto;flex-shrink:0;display:block;}
.hdr-titles{flex:1;min-width:0;}
.hdr-title{font-family:var(--font-display);font-weight:900;line-height:.97;letter-spacing:.2px;display:flex;flex-direction:column;}
.hdr-title .ht-1{font-size:17px;color:var(--on-dark);}
.hdr-title .ht-2{font-size:17px;color:var(--lime);}
.hdr-sub{font-size:8px;font-weight:700;letter-spacing:2.4px;color:var(--on-dark-muted);text-transform:uppercase;margin-top:4px;}
.hdr-dev{flex-shrink:0;align-self:flex-start;font-family:var(--font-display);font-weight:800;font-size:10px;letter-spacing:1.5px;color:var(--on-dark);border:1px solid rgba(255,255,255,.5);border-radius:6px;padding:2px 7px;}
.hdr-status{position:relative;z-index:1;font-size:9px;font-weight:600;min-height:11px;margin-top:5px;color:var(--on-dark-muted);}
@media(min-width:680px){
  .hdr-logo{height:86px;}
  .hdr-title .ht-1,.hdr-title .ht-2{font-size:23px;}
  .hdr-sub{font-size:9px;}
}
/* ── Menu inferior (barra preta fixa na base) ── */
nav{position:fixed;left:0;right:0;bottom:0;z-index:300;display:flex;justify-content:center;gap:8px;background:var(--frame);border-top:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow-nav);padding:6px 10px;padding-bottom:calc(6px + env(safe-area-inset-bottom));}
nav button{position:relative;flex:1 1 0;max-width:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px 5px;background:transparent;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;color:#7C7C85;}
nav button .nav-ico{width:23px;height:23px;display:block;}
nav button .nav-ico svg{width:100%;height:100%;display:block;}
nav button .nav-lbl{font-size:10.5px;font-weight:700;line-height:1;white-space:nowrap;color:#9A9AA2;}
nav button.active{color:var(--lime);}
nav button.active .nav-lbl{color:var(--lime);}
nav button.active::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:3px;border-radius:0 0 3px 3px;background:var(--lime);}
main{padding:12px 14px;max-width:920px;margin:0 auto;padding-bottom:calc(80px + env(safe-area-inset-bottom));}
.tab{display:none;}.tab.active{display:block;}

/* Loading / Error */
#loading-screen{position:fixed;inset:0;background:var(--frame);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;color:#fff;gap:12px;}
#loading-screen.hidden{display:none;}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.18);border-top-color:var(--lime);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-screen p{font-size:13px;color:rgba(255,255,255,.7);}
.error-banner{background:#c00;color:#fff;text-align:center;padding:10px 16px;font-size:12px;font-weight:600;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--gl);display:inline-block;margin-right:4px;}
.sync-dot.syncing{background:var(--gold);animation:pulse .8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* Controls bar */
.controls{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.view-toggle{display:flex;background:var(--card);border:1px solid var(--brd);border-radius:8px;overflow:hidden;}
.view-toggle button{flex:1;padding:7px;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--mu);cursor:pointer;}
.view-toggle button.active{background:var(--gd);color:var(--gold);}
.filters{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;}
.filters::-webkit-scrollbar{display:none;}
.pill{padding:6px 14px;border-radius:var(--r-pill);border:1px solid var(--line);background:var(--surface);font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.pill.active{background:var(--ink);color:#fff;border-color:var(--ink);}

/* Section headers */
.section-hdr{display:flex;align-items:center;gap:7px;margin:12px 0 6px;}
.section-badge{background:var(--ink);color:#fff;font-size:10px;font-weight:800;padding:3px 10px;border-radius:var(--r-pill);letter-spacing:.5px;white-space:nowrap;}
.section-line{flex:1;height:1px;background:var(--line);}

/* Games grid — 1 col mobile, 2 cols on larger screens */
.games-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:4px;}
@media(min-width:680px){.games-grid{grid-template-columns:1fr 1fr;}}

/* Game card */
.card{position:relative;background:var(--card);border-radius:16px;border:1px solid var(--brd);overflow:hidden;box-shadow:0 2px 10px rgba(15,68,36,.07);display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s;}
.card:hover{box-shadow:0 8px 22px rgba(15,68,36,.13);transform:translateY(-1px);}
.card.is-finished{border-color:var(--gl);box-shadow:0 2px 12px rgba(45,150,83,.18);}
.card.is-naocons{opacity:.62;}

.card-head{display:flex;justify-content:space-between;align-items:center;padding:11px 10px;background:linear-gradient(135deg,var(--gd),var(--g));gap:3px;flex-wrap:wrap;}
.card-head .grp-tag{font-size:9.5px;font-weight:800;color:var(--gold);letter-spacing:0;display:flex;align-items:center;gap:3px;flex-wrap:nowrap;white-space:nowrap;}
.card-head .dt-tag{font-size:11px;font-weight:800;color:#fff;white-space:nowrap;}
.bl-tag{font-size:6px;font-weight:800;letter-spacing:.2px;padding:1px 3px;border-radius:4px;}
.bl-tag.geral{background:rgba(255,255,255,.14);color:rgba(255,255,255,.5);}
.bl-tag.jxv{background:rgba(255,255,255,.1);color:rgba(255,255,255,.38);}
.bl-tag.nao{background:#e8c44a;color:#5c4708;font-size:8.5px;}
.bl-tag.lock{font-size:7.5px;padding:2px 4px;background:rgba(255,255,255,.16);color:rgba(255,255,255,.7);}
.pc-inputs input:disabled{opacity:.85;cursor:not-allowed;-webkit-text-fill-color:currentColor;}
.bl-tag.turbo{font-size:7.5px;padding:2px 4px;background:linear-gradient(90deg,#ff7a00,#ff3d3d);color:#fff;text-shadow:0 1px 1px rgba(0,0,0,.2);box-shadow:0 0 12px rgba(255,122,0,.7);animation:turboPulse 1.4s ease-in-out infinite;}
@keyframes turboPulse{0%,100%{box-shadow:0 0 8px rgba(255,122,0,.55);}50%{box-shadow:0 0 18px rgba(255,90,0,.95);}}
.card.is-turbo{border-color:#ff7a00;box-shadow:0 0 0 3px rgba(255,122,0,.5),0 6px 22px rgba(255,122,0,.35);}

.matchup{display:flex;align-items:flex-start;justify-content:center;padding:16px 8px 11px;gap:6px;}
.team{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0;}
.team-flag{font-size:44px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.12));}
.team-flag .flag-img{height:34px;width:auto;border-radius:3px;display:block;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.flag-img{vertical-align:-2px;}
.dh-teams .flag-img{height:13px;border-radius:2px;}
.crav-item .flag-img{height:11px;border-radius:2px;}
.team-name{font-size:14.5px;font-weight:800;color:var(--txt);text-align:center;line-height:1.15;}
.mid{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;padding-top:4px;}
.vs-badge{font-size:11px;font-weight:800;color:var(--g);background:var(--bg);border:2px solid var(--brd);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.venue{font-size:9.5px;color:var(--mu);text-align:center;line-height:1.2;max-width:88px;}

.game-actions{display:flex;gap:7px;padding:0 12px 11px;}
.btn-finish{flex:1;padding:7px;border-radius:9px;border:1.5px solid var(--g);background:transparent;color:var(--g);font-size:11px;font-weight:700;cursor:pointer;transition:background .15s;}
.btn-finish.done{background:var(--g);color:#fff;}
.btn-remove{flex:1;padding:7px;border-radius:9px;border:1.5px solid #f0c4c4;background:transparent;color:#c0392b;font-size:11px;font-weight:700;cursor:pointer;transition:background .15s;}
.btn-remove.confirm{background:#c0392b;color:#fff;border-color:#c0392b;}

/* Predictions: humano (2/3) à esquerda em uma linha, IA (1/3) à direita compacto */
.preds-grid{display:grid;grid-template-columns:3fr 2fr;gap:7px;padding:0 12px 13px;align-items:stretch;}
.pred-cell{background:var(--bg);border-radius:11px;border:1.5px solid transparent;min-width:0;}
.pred-cell.ia{padding:7px 7px;display:flex;flex-direction:column;justify-content:center;}
.pred-cell.human{background:#fff;border-color:var(--brd);padding:7px 6px;display:flex;align-items:center;gap:5px;}
.hum-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;}
.hum-name{font-size:14px;font-weight:800;color:var(--txt);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pred-cell.human .pts-badge{font-size:9px;padding:1px 4px;}
.av-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.rk-av,.pod-av,.stat-avatar{position:relative;overflow:hidden;}
.pc-top{display:flex;align-items:center;justify-content:space-between;gap:4px;margin-bottom:5px;min-height:14px;}
.pc-name{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--mu);line-height:1.15;min-width:0;}
.pc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pc-inputs{display:flex;align-items:center;justify-content:center;gap:6px;flex-shrink:0;}
.pred-cell.human .pc-inputs{gap:3px;}
.pred-cell.human .pc-inputs input{width:36px;height:40px;font-size:18px;}
.pred-cell.human .pc-inputs .sep{font-size:11px;}
.pc-inputs input{width:40px;height:36px;text-align:center;border:1.5px solid var(--brd);border-radius:9px;font-size:16px;font-weight:700;background:var(--bg);color:var(--txt);-moz-appearance:textfield;}
.pc-inputs.small{gap:3px;}
.pc-inputs.small input{width:31px;height:31px;font-size:13px;border-radius:7px;}
.pc-inputs input::-webkit-outer-spin-button,.pc-inputs input::-webkit-inner-spin-button{-webkit-appearance:none;}
.pc-inputs input:focus{outline:none;border-color:var(--gl);background:#fff;box-shadow:0 0 0 3px rgba(45,150,83,.13);}
.pc-inputs .sep{font-size:13px;font-weight:700;color:var(--mu);}
.pc-score{text-align:center;font-size:17px;font-weight:800;color:var(--txt);padding:2px 0;letter-spacing:.5px;}
.pc-score.empty{color:#c4d0c4;}

/* Real score full-bleed footer */
.real-row{display:flex;flex-direction:row;align-items:stretch;gap:9px;background:linear-gradient(135deg,var(--gd),var(--g));padding:11px 12px;}
.real-row .rr-line{flex:3;display:flex;align-items:center;justify-content:center;gap:8px;}
.real-row .rr-label{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.5px;}
.rr-finish{flex:0 0 auto;padding:8px 12px;border-radius:9px;border:1.5px solid rgba(255,255,255,.45);background:rgba(255,255,255,.12);color:#fff;font-size:12px;font-weight:800;white-space:nowrap;cursor:pointer;transition:background .15s;}
.rr-finish:active{background:rgba(255,255,255,.22);}
.rr-finish.done{background:var(--gold);color:#5c4708;border-color:var(--gold);}
.rr-finish .chk-off{color:rgba(255,255,255,.55);font-weight:900;}
.real-row input{width:44px;height:36px;text-align:center;border:1.5px solid rgba(255,255,255,.35);border-radius:9px;font-size:17px;font-weight:700;background:rgba(255,255,255,.16);color:#fff;-moz-appearance:textfield;}
.real-row input::-webkit-outer-spin-button,.real-row input::-webkit-inner-spin-button{-webkit-appearance:none;}
.real-row input::placeholder{color:rgba(255,255,255,.5);}
.real-row input:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,.24);}
.real-row .sep{color:rgba(255,255,255,.6);font-weight:700;font-size:15px;}
.real-row.pending{background:repeating-linear-gradient(135deg,var(--gd),var(--gd) 10px,#123d22 10px,#123d22 20px);}

/* Aviso de resultado pendente */
.warn-bar{display:flex;align-items:center;justify-content:center;gap:5px;background:#fff3cd;color:#7a5b00;font-size:11px;font-weight:700;text-align:center;padding:7px 10px;border-top:1px solid #efdd9b;}

/* Points badges */
.pts-10{background:#d4edda;color:#155724;}
.pts-7{background:#d1ecf1;color:#0c5460;}
.pts-4{background:#fff3cd;color:#856404;}
.pts-0{background:#f8d7da;color:#721c24;}
.pts-badge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px;}
.pts-badge.preview{background:#dfe4df;color:#7a857a;}
.hum-avwrap{position:relative;flex-shrink:0;}
.pts-badge.on-av{position:absolute;bottom:-4px;right:-6px;border:1.6px solid #fff;min-width:16px;height:16px;padding:0 3px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:9px;box-shadow:0 1px 2px rgba(0,0,0,.25);}
.prev-tag{font-size:8px;font-weight:800;background:rgba(255,255,255,.22);color:#fff;padding:1px 5px;border-radius:6px;margin-left:5px;letter-spacing:.3px;vertical-align:1px;}

/* ── Fase de Grupos: card no visual Copa 26 (ESCOPO .card; o mata usa .mm-litem e NÃO é afetado) ── */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--shadow-card);}
.card:hover{box-shadow:0 12px 26px -16px rgba(20,20,26,.55);transform:translateY(-1px);}
.card.is-finished{border-color:var(--line);box-shadow:var(--shadow-card);}
/* faixa superior preta */
.card .card-head{background:var(--card-dark);padding:10px 12px;}
.card .card-head .grp-tag{color:var(--on-dark-muted);}
.card .card-head .dt-tag{color:var(--on-dark);}
.card .ch-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0;box-shadow:0 0 0 3px rgba(15,174,98,.22);}
.card .ch-dot.closed{background:var(--faint);box-shadow:none;}
.card .bl-tag.aberto{background:rgba(15,174,98,.22);color:#86efb4;font-weight:800;font-size:8.5px;letter-spacing:.3px;padding:1px 5px;border-radius:5px;}
.card .bl-tag.geral{background:rgba(255,255,255,.12);color:rgba(255,255,255,.55);}
.card .bl-tag.jxv{background:rgba(255,255,255,.08);color:rgba(255,255,255,.42);}
/* times + VS central */
.card .team-name{color:var(--ink);}
.card .vs-badge{background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2);font-family:var(--font-display);font-weight:800;font-size:11px;}
.card .score-final{background:var(--ink);box-shadow:0 2px 7px rgba(20,20,26,.28);}
/* campos de palpite escuros */
.card .pred-cell.human{background:var(--surface);border-color:var(--line);}
.card .pred-cell.ia{background:var(--surface-2);}
.card .pc-inputs input{background:var(--input-dark);color:var(--on-dark);border:1.5px solid transparent;}
.card .pc-inputs input::placeholder{color:var(--on-dark-muted);}
.card .pc-inputs input:focus{background:var(--input-dark);border-color:var(--lime);box-shadow:0 0 0 3px rgba(194,236,0,.25);}
.card .pc-score{color:var(--ink);}
.card .pc-score.empty{color:var(--faint);}
/* rodapé preto + botão verde */
.card .real-row{background:var(--card-dark);}
.card .real-row.pending{background:repeating-linear-gradient(135deg,var(--card-dark),var(--card-dark) 10px,#1d1d24 10px,#1d1d24 20px);}
.card .real-row .rr-label{color:var(--on-dark-muted);}
.card .real-row .sep{color:var(--on-dark-muted);}
.card .real-row input{background:var(--input-dark);color:#fff;border:1.5px solid transparent;}
.card .real-row input::placeholder{color:var(--on-dark-muted);}
.card .real-row input:focus{border-color:var(--lime);background:var(--input-dark);box-shadow:0 0 0 3px rgba(194,236,0,.22);}
.card .rr-finish{background:var(--green);border:1.5px solid var(--green);color:#fff;}
.card .rr-finish.done{background:transparent;border-color:rgba(255,255,255,.4);color:#fff;}
/* variante TURBO: cabeçalho laranja, rodapé claro --turbo-foot */
.card.is-turbo{border-color:var(--orange);box-shadow:0 0 0 2px rgba(255,90,31,.4),var(--shadow-turbo);}
.card.is-turbo .card-head{background:var(--orange);}
.card.is-turbo .card-head .grp-tag{color:rgba(255,255,255,.92);}
.card.is-turbo .card-head .dt-tag{color:#fff;}
.card.is-turbo .ch-dot{background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.3);}
.card.is-turbo .ch-dot.closed{background:rgba(255,255,255,.6);box-shadow:none;}
.card.is-turbo .bl-tag.turbo{background:#fff;color:var(--orange);box-shadow:none;animation:none;}
.card.is-turbo .bl-tag.aberto{background:rgba(255,255,255,.25);color:#fff;}
.card.is-turbo .real-row,.card.is-turbo .real-row.pending{background:var(--turbo-foot);}
.card.is-turbo .real-row .rr-label{color:var(--orange);}
.card.is-turbo .real-row .sep{color:#cf8a60;}
.card.is-turbo .real-row input{background:#fff;color:var(--ink);border:1.5px solid #f3c6ad;}
.card.is-turbo .real-row input::placeholder{color:#c79b82;}
.card.is-turbo .rr-finish{background:var(--orange);border-color:var(--orange);color:#fff;}
.card.is-turbo .rr-finish.done{background:transparent;border-color:#e0a07f;color:var(--orange);}

/* ─── Ranking & Estatísticas ─── */
.section-title{display:flex;align-items:center;justify-content:center;gap:7px;font-family:var(--font-display);font-size:13px;font-weight:900;color:var(--ink);letter-spacing:.4px;margin:26px 4px 12px;}
.section-title::before{content:"";width:11px;height:11px;background:var(--lime);border-radius:var(--shape-block);flex-shrink:0;}
.scoring{font-size:10.5px;color:var(--on-dark-muted);background:var(--note-dark);border:1px solid var(--line);border-radius:var(--r-stat);text-align:center;line-height:1.35;margin:14px 4px 0;padding:10px 12px;}
.scoring b{color:var(--lime);}
.tiebreak{font-size:10px;color:var(--mu);text-align:center;line-height:1.3;margin:8px 8px -2px;}

/* Leaderboard */
.lead-board{background:var(--surface);border-radius:var(--r-card);border:1px solid var(--line);overflow:hidden;box-shadow:var(--shadow-card);}
.lead-head{background:var(--surface-2);padding:13px 16px;text-align:center;border-bottom:1px solid var(--line);}
.lead-head .lh-title{font-family:var(--font-display);font-size:14px;font-weight:900;color:var(--ink);letter-spacing:.3px;}
.lead-head .lh-sub{font-size:11px;color:var(--muted);margin-top:3px;display:flex;align-items:center;justify-content:center;gap:5px;}
.rk-row{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--line);}
.rk-row:last-child{border-bottom:none;}
.rk-row.lead{background:linear-gradient(90deg,rgba(224,168,46,.13),transparent);}
.rk-medal{font-size:19px;width:24px;text-align:center;flex-shrink:0;font-weight:800;color:var(--faint);}
.rk-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0;box-shadow:0 2px 6px rgba(20,20,26,.18);}
.rk-mid{flex:1;min-width:0;}
.rk-nm{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.rk-nm b{font-size:14px;color:var(--ink);}
.rk-sub2{font-size:10.5px;color:var(--muted);margin:3px 0 5px;}
.rk-bar{height:6px;background:var(--surface-3);border-radius:3px;overflow:hidden;}
.rk-bar i{display:block;height:100%;border-radius:3px;transition:width .5s ease;}
.rk-tot{text-align:right;flex-shrink:0;}
.rk-tot b{font-family:var(--font-display);font-size:23px;font-weight:900;color:var(--ink);line-height:1;}
.rk-tot span{display:block;font-size:9px;color:var(--muted);margin-top:1px;}
.tag-ia{font-size:9px;background:rgba(109,59,245,.13);color:var(--violet);border-radius:5px;padding:1px 6px;font-weight:800;}
.tag-human{font-size:9px;background:rgba(15,174,98,.14);color:var(--green-ink);border-radius:5px;padding:1px 6px;font-weight:800;}

/* Versus battle cards */
.vs2{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);padding:13px 15px;box-shadow:var(--shadow-card);}
.vs2+.vs2{margin-top:9px;}
.vs2-title{font-family:var(--font-display);font-size:12px;font-weight:900;color:var(--ink);text-align:center;margin-bottom:11px;}
.vs2-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
.vs2-side{min-width:0;}.vs2-side.r{text-align:right;}
.vs2-nm{font-size:12.5px;font-weight:800;}
.vs2-mem{font-size:9.5px;color:var(--mu);margin-top:1px;}
.vs2-pts{font-size:21px;font-weight:800;line-height:1.3;}
.vs2-bar{display:flex;height:15px;border-radius:8px;overflow:hidden;background:var(--bg);}
.vs2-seg{height:100%;transition:width .5s ease;min-width:2px;}
.vs2-foot{text-align:center;font-size:11.5px;font-weight:800;margin-top:9px;}

/* Player stat cards */
.stat-card{background:var(--surface);border-radius:var(--r-card);border:1px solid var(--line);padding:12px 13px;box-shadow:var(--shadow-card);}
.stat-card+.stat-card{margin-top:9px;}
.stat-phead{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.stat-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;flex-shrink:0;box-shadow:0 2px 5px rgba(0,0,0,.13);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px;}
.stat-box{background:var(--surface-2);border-radius:var(--r-mini);padding:9px 8px;text-align:center;}
.stat-box .val{font-size:21px;font-weight:900;color:var(--ink);line-height:1;}
.stat-box .lbl{font-size:10px;color:var(--mu);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:3px;}
.stat-line-lbl{font-size:11px;color:var(--mu);font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:4px;}
.cons-bar-wrap{display:flex;align-items:center;gap:8px;}
.cons-bar{flex:1;height:7px;background:var(--surface-3);border-radius:4px;overflow:hidden;}
.cons-fill{height:100%;border-radius:4px;transition:width .5s ease;}
.best-game{font-size:11px;background:var(--surface-2);border-radius:var(--r-field);padding:8px 10px;color:var(--muted);margin-top:10px;}
.best-game strong{color:var(--txt);}

/* Tooltip "?" */
.q{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--ink);color:#fff;font-size:10px;font-weight:800;cursor:pointer;flex-shrink:0;line-height:1;-webkit-tap-highlight-color:transparent;}
.lead-head .q{background:var(--faint);color:#fff;}
#floating-tip{position:absolute;display:none;background:#1d1d1f;color:#fff;font-size:11.5px;font-weight:500;line-height:1.5;padding:10px 12px;border-radius:10px;z-index:9999;box-shadow:0 6px 22px rgba(0,0,0,.32);pointer-events:none;}

.empty-state{text-align:center;padding:24px 12px;color:var(--mu);font-size:13px;}

/* ── Próximo jogo (hero) ── */
.next-hero{position:relative;background:linear-gradient(135deg,#0f4424,#1a6b3a 55%,#2d9653);border-radius:18px;padding:14px 16px;margin-bottom:13px;color:#fff;overflow:hidden;cursor:pointer;box-shadow:0 6px 20px rgba(15,68,36,.28);transition:transform .15s;}
.next-hero:active{transform:scale(.99);}
.next-hero::after{content:"⚽";position:absolute;right:-12px;bottom:-20px;font-size:100px;opacity:.08;transform:rotate(-12deg);pointer-events:none;}
.nh-label{font-size:10px;font-weight:800;letter-spacing:1.3px;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.nh-live{width:7px;height:7px;border-radius:50%;background:#ff5252;animation:blink 1.5s infinite;}
@keyframes blink{0%{box-shadow:0 0 0 0 rgba(255,82,82,.6);}70%{box-shadow:0 0 0 7px rgba(255,82,82,0);}100%{box-shadow:0 0 0 0 rgba(255,82,82,0);}}
.nh-match{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:10px;position:relative;z-index:1;}
.nh-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0;}
.nh-team .f{font-size:36px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));}
.nh-team .n{font-size:13px;font-weight:800;text-align:center;line-height:1.1;}
.nh-x{font-size:13px;font-weight:800;color:rgba(255,255,255,.5);flex-shrink:0;}
.nh-meta{text-align:center;font-size:11px;color:rgba(255,255,255,.82);margin-bottom:11px;position:relative;z-index:1;}
.nh-cd{display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
.nh-cd .clock{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);border-radius:11px;padding:7px 16px;font-size:16px;font-weight:800;letter-spacing:.5px;font-variant-numeric:tabular-nums;}
.nh-status{margin-top:11px;text-align:center;font-size:11px;font-weight:700;padding:6px;border-radius:10px;position:relative;z-index:1;}
.nh-status.ok{background:rgba(45,150,83,.4);color:#dcffe9;}
.nh-status.miss{background:rgba(232,196,74,.2);color:var(--gold);}

/* ── Placar final + vencedor ── */
.score-final{align-self:center;flex-shrink:0;display:flex;align-items:center;gap:5px;background:var(--gd);color:#fff;border-radius:11px;padding:5px 12px;font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;box-shadow:0 2px 7px rgba(15,68,36,.28);}
.score-final small{font-size:12px;opacity:.55;font-weight:700;}
.team.win .team-name{color:var(--g);}
.team.win .team-flag{filter:drop-shadow(0 0 7px rgba(45,150,83,.45));}
.team.lose{opacity:.48;}

/* ── Animações & destaques ── */
@keyframes pop{0%{transform:scale(.4);opacity:0;}60%{transform:scale(1.18);}100%{transform:scale(1);opacity:1;}}
.pts-badge{animation:pop .25s ease;}
@keyframes flash{0%,100%{box-shadow:0 2px 10px rgba(15,68,36,.07);}30%{box-shadow:0 0 0 3px var(--gold),0 6px 22px rgba(232,196,74,.45);}}
.card.flash{animation:flash 1.5s ease;}
.pill.warn{border-color:#e8c44a;color:#9a7b16;}
.pill.warn.active{background:#e8c44a;color:#5c4708;border-color:#e8c44a;}

/* ── Sub-abas do ranking (trilho branco; ativa preta) ── */
.rank-toggle{display:flex;gap:4px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-btn);padding:4px;margin-bottom:14px;box-shadow:var(--shadow-card);}
.rank-toggle button{flex:1;padding:9px 6px;border:none;border-radius:8px;background:transparent;font-family:var(--font-display);font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;transition:background .15s,color .15s;}
.rank-toggle button.active{background:var(--ink);color:#fff;}
.hist-toggle{display:flex;gap:7px;justify-content:center;margin:0 4px 10px;}
.hist-toggle button{flex:0 0 auto;padding:6px 16px;border:1px solid var(--line);background:var(--surface);border-radius:999px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;}
.hist-toggle button.active{background:var(--ink);color:#fff;border-color:var(--ink);}
/* Filtro de escopo do Bolão Geral (2 segmentos, largura cheia) */
.scope-toggle{margin:0 4px 14px;}
.scope-toggle button{flex:1 1 0;min-width:0;padding:9px 6px;font-size:11.5px;border-radius:var(--r-btn);}

/* ── Corrida de times (3 times) ── */
.tr-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.tr-avs{position:relative;width:44px;height:30px;flex-shrink:0;}
.tr-av{position:absolute;top:1px;width:28px;height:28px;border-radius:50%;overflow:hidden;border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:10px;box-shadow:0 1px 3px rgba(0,0,0,.18);}
.tr-av.h{left:0;z-index:2;}.tr-av.a{left:15px;z-index:1;}
.tr-info{width:84px;flex-shrink:0;}
.tr-nm{font-size:12px;font-weight:800;line-height:1.1;}
.tr-mem{font-size:8.5px;color:var(--mu);margin-top:1px;line-height:1.1;}
.tr-barwrap{flex:1;height:12px;background:var(--surface-3);border-radius:6px;overflow:hidden;}
.tr-bar{height:100%;border-radius:6px;min-width:3px;transition:width .5s ease;}
.tr-pts{width:26px;text-align:right;font-size:16px;font-weight:800;flex-shrink:0;}

/* ── Chip de time no leaderboard ── */
.team-chip{font-size:9px;font-weight:700;border:1px solid;border-radius:4px;padding:1px 5px;}

/* ── Lista de placares cravados ── */
.crav-list{display:flex;flex-direction:column;gap:5px;}
.crav-item{font-size:11px;background:var(--surface-2);border-radius:8px;padding:6px 9px;color:var(--muted);}
.crav-item strong{color:var(--txt);}
.crav-empty{font-size:11px;color:var(--muted);background:var(--surface-2);border-radius:8px;padding:7px 9px;}

/* ── Hero "Jogos de hoje" (compacto) ── */
.day-hero{background:var(--card-dark);border-radius:var(--r-card);padding:12px 14px;margin-bottom:18px;color:var(--on-dark);box-shadow:var(--shadow-card);}
.dh-head{font-family:var(--font-display);font-size:11px;font-weight:900;letter-spacing:.5px;color:var(--lime);margin-bottom:9px;display:flex;align-items:center;gap:7px;}
.dh-list{display:flex;flex-direction:column;gap:2px;}
.dh-row{display:flex;align-items:center;gap:9px;padding:7px;border-radius:var(--r-field);cursor:pointer;transition:background .15s;}
.dh-row:active{background:rgba(255,255,255,.08);}
.dh-time{font-size:12px;font-weight:800;color:var(--lime);min-width:42px;flex-shrink:0;font-variant-numeric:tabular-nums;}
.dh-teams{flex:1;font-size:12.5px;min-width:0;overflow:hidden;color:var(--on-dark);}
.dh-scroll{display:inline-block;white-space:nowrap;}
.dh-teams.marq .dh-scroll{animation:marq linear infinite;}
@keyframes marq{0%,12%{transform:translateX(0);}48%,62%{transform:translateX(var(--shift));}98%,100%{transform:translateX(0);}}
.dh-teams i{color:var(--on-dark-muted);font-style:normal;font-weight:700;margin:0 2px;}
.dh-miss{color:var(--lime);font-size:10.5px;font-weight:700;}
.dh-row.dh-turbo{border:1.5px solid var(--orange);background:rgba(255,90,31,.14);box-shadow:none;}
.dh-turbobadge{background:var(--orange);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px;white-space:nowrap;}
.dh-cd{font-size:12px;font-weight:800;background:rgba(255,255,255,.12);border-radius:7px;padding:3px 8px;flex-shrink:0;font-variant-numeric:tabular-nums;color:var(--on-dark);}
.dh-soon{font-size:13px;flex-shrink:0;opacity:.6;}

/* ── Barra rolante do ranking (aba Palpites) ── */
.rank-marquee{background:transparent;border-radius:0;padding:2px 0 4px;margin-bottom:18px;color:var(--ink);overflow:hidden;box-shadow:none;}
.rm-head{font-family:var(--font-display);font-size:11px;font-weight:900;letter-spacing:.3px;color:var(--ink);margin:0 2px 9px;display:flex;align-items:center;gap:6px;}
.rm-hint{font-family:var(--font-body);font-weight:600;letter-spacing:0;color:var(--faint);font-size:8.5px;}
.rm-track-wrap{overflow:hidden;width:100%;}
.rm-track{display:flex;width:max-content;animation:rmscroll 38s linear infinite;cursor:pointer;}
.rm-track:hover,.rm-track.paused{animation-play-state:paused;}
@keyframes rmscroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.rm-item{display:flex;align-items:center;gap:7px;padding:8px 12px;margin-right:8px;border-right:none;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-mini);box-shadow:var(--shadow-card);white-space:nowrap;}
.rm-pos{font-family:var(--font-display);font-size:14px;font-weight:900;color:var(--faint);min-width:20px;text-align:center;font-variant-numeric:tabular-nums;}
.rm-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;position:relative;overflow:hidden;flex-shrink:0;}
.rm-nm{font-size:12.5px;font-weight:800;color:var(--ink);}
.rm-pts{font-size:10.5px;color:var(--muted);}
.rm-up{color:var(--green-ink);font-size:11px;font-weight:800;}
.rm-down{color:var(--red);font-size:11px;font-weight:800;}
.rm-flat{color:var(--faint);font-size:11px;font-weight:800;}

/* ── Delta de posição no ranking ── */
.rk-medal{display:flex;flex-direction:column;align-items:center;gap:1px;}
.rk-place{line-height:1;}
.rk-delta{font-size:9px;font-weight:800;line-height:1;letter-spacing:-.3px;}
.rk-delta.up{color:#1aa34a;}
.rk-delta.down{color:#d33;}
.rk-delta.flat{color:var(--mu);opacity:.55;}
.rk-legend{font-size:10px;color:var(--mu);padding:8px 14px;border-bottom:1px solid var(--brd);background:#fafdfa;line-height:1.4;}
.rk-legend b.up{color:#1aa34a;}.rk-legend b.down{color:#d33;}

/* ── Gráfico de evolução da classificação ── */
.hist-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);padding:10px 0 12px;overflow:hidden;}
.hist-scrollhint{font-size:9.5px;color:var(--mu);text-align:center;margin-bottom:4px;opacity:.7;}
.hist-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 6px;}
.hist-svg{display:block;}
.hist-grid{stroke:var(--line);stroke-width:1;}
.hist-ylbl{fill:var(--muted);font-size:9px;font-weight:700;text-anchor:end;}
.hist-x{fill:var(--muted);font-size:8px;font-weight:700;text-anchor:middle;}
.hist-name{font-weight:800;dominant-baseline:middle;}
.hist-svg g[data-pid]{cursor:pointer;transition:opacity .15s;}
.hist-empty{font-size:12px;color:var(--mu);text-align:center;padding:18px 14px;background:var(--card);border:1px solid var(--brd);border-radius:14px;}

/* ── Pódio ── */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:9px;margin-bottom:16px;padding:0 4px;}
.pod{flex:1;max-width:120px;display:flex;flex-direction:column;align-items:center;}
.pod-avwrap{position:relative;}
.pod-av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;border:3px solid var(--surface);box-shadow:0 0 0 3px var(--faint),0 4px 10px rgba(20,20,26,.22);}
.pod-1 .pod-av{width:64px;height:64px;font-size:23px;box-shadow:0 0 0 3px var(--gold),0 5px 14px rgba(224,168,46,.5);}
.pod-2 .pod-av{box-shadow:0 0 0 3px var(--silver),0 4px 10px rgba(20,20,26,.22);}
.pod-3 .pod-av{box-shadow:0 0 0 3px var(--bronze),0 4px 10px rgba(20,20,26,.22);}
.pod-badge{position:absolute;bottom:-4px;right:-6px;font-size:21px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));}
.pod-1 .pod-badge{font-size:27px;bottom:-6px;right:-9px;}
.pod-name{font-size:12px;font-weight:800;margin-top:9px;text-align:center;line-height:1.1;color:var(--ink);}
.pod-pts{font-size:14px;font-weight:800;color:var(--ink-2);}
.pod-pts span{font-size:9px;color:var(--muted);font-weight:600;}
.pod-base{width:100%;margin-top:7px;border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:900;line-height:1;color:#fff;}
.pod-1 .pod-base{height:78px;background:var(--gold);font-size:30px;box-shadow:inset 0 2px 0 rgba(255,255,255,.28);}
.pod-2 .pod-base{height:58px;background:var(--silver);font-size:23px;box-shadow:inset 0 2px 0 rgba(255,255,255,.22);}
.pod-3 .pod-base{height:44px;background:var(--bronze);font-size:18px;box-shadow:inset 0 2px 0 rgba(255,255,255,.2);}

/* ── Mata-Mata ── */
.mm-intro{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:10px 12px;font-size:11.5px;line-height:1.5;color:var(--txt);margin-bottom:12px;}
.mm-newform{background:linear-gradient(135deg,var(--gd),var(--g));border-radius:14px;padding:11px 12px;margin-bottom:14px;display:flex;flex-direction:column;gap:7px;box-shadow:0 4px 14px rgba(15,68,36,.18);}
.mm-nf-title{font-size:11px;font-weight:800;letter-spacing:.8px;color:var(--gold);}
.mm-newform input,.mm-edit input{border:1.5px solid rgba(255,255,255,.3);border-radius:8px;padding:8px 9px;font-size:13px;font-weight:600;background:rgba(255,255,255,.16);color:#fff;width:100%;}
.mm-newform input::placeholder,.mm-edit input::placeholder{color:rgba(255,255,255,.55);}
.mm-newform input:focus,.mm-edit input:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,.24);}
.mm-nf-team{display:flex;gap:7px;}
.mm-flag{flex:0 0 52px;text-align:center;}
.mm-add{background:var(--gold);color:#5c4708;border:none;border-radius:9px;padding:9px;font-size:13px;font-weight:800;cursor:pointer;}
.mm-actions{display:flex;gap:5px;}
.mm-iconbtn{background:rgba(255,255,255,.16);border:none;color:#fff;border-radius:7px;padding:3px 7px;font-size:12px;font-weight:700;cursor:pointer;}
.mm-iconbtn.danger{background:#e8c44a;color:#5c4708;}
.mm-edit{display:flex;flex-direction:column;gap:7px;padding:13px 12px;background:linear-gradient(135deg,#163d27,#1c5235);}
.mm-test{border-color:#e8c44a;box-shadow:0 0 0 2px rgba(232,196,74,.4);}
.mm-cell{display:flex;flex-direction:column;align-items:stretch;gap:6px;}
.mm-cell-top{display:flex;align-items:center;gap:5px;}
.mm-cell-top .hum-name{flex:1;}
.mm-preds{grid-template-columns:1fr;}
.mm-qp{}
.mm-qp-in{display:flex;align-items:center;flex-wrap:wrap;gap:5px;padding-top:3px;border-top:1px dashed var(--brd);}
.mm-qp-lbl{font-size:10px;font-weight:700;color:var(--mu);}
.mm-qpb{background:var(--bg);border:1.5px solid var(--brd);border-radius:8px;padding:5px 8px;font-size:11.5px;font-weight:700;color:var(--txt);cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.mm-qpb.sm{padding:3px 6px;font-size:10.5px;}
.mm-qpb .flag-img{height:13px;width:auto;border-radius:2px;}
.mm-qpb.on{background:var(--g);border-color:var(--g);color:#fff;}
.mm-class{padding:9px 12px;border-top:1px solid var(--brd);background:#fafdfa;display:flex;flex-direction:column;gap:6px;}
.mm-class-lbl{font-size:10px;font-weight:700;color:var(--mu);}
.mm-class-btns{display:flex;gap:7px;flex-wrap:wrap;}
.mm-iascore{background:var(--bg);border:1.5px solid var(--brd);border-radius:9px;padding:6px 10px;font-size:16px;font-weight:800;color:var(--txt);text-align:center;min-width:60px;}
.mm-iascore.empty{color:var(--mu);font-weight:600;}
.mm-qp-static{display:flex;align-items:center;gap:5px;padding-top:4px;border-top:1px dashed var(--brd);font-size:11px;color:var(--mu);font-weight:700;}
.mm-qp-static .flag-img{height:12px;width:auto;border-radius:2px;}
.pred-cell.ia.mm-cell{background:var(--bg);}
/* Chave (bracket) do mata-mata — caixas posicionadas + conectores SVG em colchete */
/* Seção da chave = card único (cabeçalho grudado no topo + chave no mesmo quadro) — 1.2 */
.mm-sec{border:1px solid var(--line);border-radius:var(--r-card);overflow:hidden;margin-bottom:18px;background:var(--surface);box-shadow:var(--shadow-card);}
.mm-bracket-wrap{margin:0;}
.mm-bracket-hint{font-size:10px;color:var(--muted);padding:7px 10px 0;}
.mm-bracket-scroll{overflow-x:auto;overflow-y:hidden;background:var(--surface-2);padding:8px;-webkit-overflow-scrolling:touch;}
.mm-bracket{position:relative;transform-origin:top left;}
.mm-cn-svg{position:absolute;left:0;top:0;pointer-events:none;}
.mm-cn{fill:none;stroke:#6a766a;stroke-width:1.4;stroke-linejoin:round;opacity:.65;}   /* 1.1: fino, cinza escuro suave */
.mm-cn.c3{stroke:#9aa59a;stroke-dasharray:4 4;stroke-width:1.1;opacity:.5;}
.mm-coltitle{position:absolute;top:0;text-align:center;font-family:var(--font-display);font-size:10px;font-weight:800;color:var(--ink);letter-spacing:.5px;text-transform:uppercase;background:var(--lime);padding:5px 0;border-radius:var(--r-btn);box-shadow:0 2px 6px -2px rgba(20,20,26,.3);cursor:pointer;user-select:none;}
.mm-coltitle:hover{filter:brightness(1.08);}
.mm-coltitle.col-collapsed{display:flex;align-items:center;justify-content:center;writing-mode:vertical-rl;text-orientation:mixed;font-size:9px;padding:6px 0;opacity:1;background:var(--surface);color:var(--muted);border:1px solid var(--line);box-shadow:none;}
.mm-bxpos{position:absolute;}
.mm-bx{height:100%;box-sizing:border-box;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-field);padding:5px 9px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;gap:4px;transition:box-shadow .15s,transform .12s;overflow:hidden;box-shadow:var(--shadow-card);}   /* 1.1: contorno cinza fino */
.mm-bx:hover{box-shadow:0 0 0 2px var(--lime);}
.mm-bx:active{transform:scale(.99);}
.mm-bx.nolink{cursor:default;background:var(--surface-2);box-shadow:none;}
.mm-bx.nolink:hover{box-shadow:none;}
.mm-bx-side{position:relative;display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;color:var(--ink);min-width:0;line-height:1.2;min-height:16px;}
.mm-bx-side.win{color:var(--green-ink);}
.mm-bx-nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mm-bx-sc{font-weight:800;font-variant-numeric:tabular-nums;flex-shrink:0;}
.mm-bx-sc small{font-weight:600;color:var(--mu);}
/* Bandeira padronizada: caixa de tamanho fixo, centralizada, sem distorcer */
.flagbx{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.flagbx .flag-img{max-width:100%;max-height:100%;width:auto;height:auto;border-radius:2px;display:block;box-shadow:0 1px 2px rgba(0,0,0,.18);}
.mm-matchup .team-flag .flagbx{width:46px;height:31px;}
.mm-bx-side .flagbx{width:22px;height:15px;}
.mm-qpb .flagbx{width:16px;height:11px;}
.mm-class-btns .flagbx{width:18px;height:12px;}
.mm-qp-static .flagbx{width:16px;height:11px;}
/* Tags de status do cabeçalho */
.bl-tag.abe{background:rgba(255,255,255,.2);color:#fff;font-size:8.5px;}
.bl-tag.fec{background:#e8c44a;color:#5c4708;font-size:8.5px;}
/* Condicionais: badge sem número / "quem passou" sem empate real ficam escondidos */
.mm-pts.empty{display:none;}
.mm-class.hidden{display:none;}
.mm-qp:empty{display:none;}
/* Filtro de fases (3.1) */
/* Filtro: cabe numa linha só, sem rolagem (tabs de largura igual) */
.mm-filters{display:flex;gap:4px;padding:2px 1px 11px;}
.mm-fbtn{flex:1 1 0;min-width:0;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-pill);padding:7px 4px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
.mm-fbtn sup{font-size:.72em;}
.mm-fbtn.active{background:var(--lime);border-color:var(--lime);color:var(--ink);}
/* Cabeçalho da seção do chaveamento (A1) — grudado no topo do card .mm-sec */
.mm-sec-head{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card-dark);padding:15px 16px;cursor:pointer;min-height:62px;-webkit-tap-highlight-color:transparent;}
.mm-sec-head:active{background:#1d1d24;}
.mm-sec-title{font-family:var(--font-display);font-size:17px;font-weight:900;color:var(--lime);letter-spacing:.3px;line-height:1.05;}
.mm-sec-cta{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.mm-sec-cta-lbl{font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--lime);white-space:nowrap;}
.mm-sec-arrow{width:33px;height:33px;border-radius:50%;background:var(--lime);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;line-height:1;flex-shrink:0;box-shadow:0 3px 11px -2px rgba(194,236,0,.7);}
/* Lista de confrontos: 2 colunas no desktop, 1 no celular (2.1); align-items:start = expandir não empurra o vizinho (5.3) */
#mm-list{display:grid;grid-template-columns:1fr;gap:11px;align-items:start;}
@media(min-width:680px){#mm-list{grid-template-columns:repeat(2,minmax(0,1fr));}}
#mm-list .mm-datehdr{grid-column:1/-1;margin:5px 0 1px;}   /* quebra de data ocupa a linha toda (7.1) */
/* Card do confronto: cabeçalho/bandeiras/rodapé sempre visíveis; só os palpites colapsam (3.1) */
.mm-litem{border:1px solid var(--brd);border-radius:14px;overflow:hidden;background:var(--card);box-shadow:0 2px 8px rgba(15,68,36,.06);display:flex;flex-direction:column;}
/* Selo de zebra (C): chip no cabeçalho, junto das tags. Zebrão = dourado. */
/* Pílulas ZEBRA/ZEBRÃO no cabeçalho — mesmo formato/lugar da TURBO (convivem na França×Suécia) */
.bl-tag.zebra{font-size:7.5px;padding:2px 4px;background:var(--red);color:#fff;box-shadow:0 0 0 1px rgba(0,0,0,.06);}
.bl-tag.zebrao{font-size:7.5px;padding:2px 4px;background:var(--pink);color:#fff;box-shadow:0 0 0 1px rgba(0,0,0,.06);}
/* Imagem do azarão (Zebra.png/Zebra_o.png), um pouco menor que a bandeira, ao lado dela (puxada pro centro) */
.mm-matchup .team-flag{position:relative;}
/* Zebra com SELO BRANCO atrás (lê em qualquer fundo) + maior que a bandeira (Tarefa 3) */
.mm-zebra-img{position:absolute;top:50%;transform:translateY(-50%);height:38px;width:auto;box-sizing:border-box;padding:3px;background:#fff;border-radius:8px;box-shadow:0 1px 5px rgba(20,20,26,.32);pointer-events:none;z-index:2;}
.mm-zebra-img.za{left:100%;margin-left:3px;}
.mm-zebra-img.zb{right:100%;margin-right:3px;}
/* Imagem da zebra nos PRÓXIMOS JOGOS (linha compacta) e no CHAVEAMENTO (caixinha) — menor que a bandeira */
.dh-zebra-img{height:19px;width:auto;box-sizing:border-box;padding:2px;background:#fff;border-radius:5px;box-shadow:0 1px 3px rgba(20,20,26,.3);vertical-align:-5px;margin:0 2px;}
/* No chaveamento a célula é estreita: a imagem vira sobreposição na bandeira (absolute), assim
   NÃO rouba largura do nome (legibilidade primeiro). ~tamanho da bandeira (15px). */
/* Chaveamento: selo branco overlay SOBRE a bandeira (não cobre o nome — legibilidade primeiro) */
.mm-bx-zebra{position:absolute;left:6px;bottom:-2px;height:19px;width:auto;box-sizing:border-box;padding:2px;background:#fff;border-radius:5px;box-shadow:0 1px 3px rgba(20,20,26,.32);z-index:3;pointer-events:none;}
/* Balão "de onde vêm os pontos" (B): reaproveita o #floating-tip escuro */
#floating-tip.mm-ptstip{pointer-events:none;}
.mm-ptstip .mm-tip-l1{color:#fff;}
.mm-ptstip .mm-tip-l2{color:#ffd9a8;margin-top:3px;font-weight:700;}
.mm-ptstip .mm-tip-zeb{color:#9be7a0;margin-top:3px;font-weight:800;}
.mm-ptstip .mm-tip-tot{margin-top:5px;font-weight:800;font-size:13px;border-top:1px solid rgba(255,255,255,.2);padding-top:4px;}
.mm-litem .card-head{border-radius:0;}
.mm-litem-summary{display:flex;align-items:center;gap:6px;padding:10px 12px;cursor:pointer;}
.mm-litem-summary .matchup{flex:1;padding:0;}
.mm-matchup{gap:16px;}
.mm-chev{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:var(--bg);border:1.5px solid var(--brd);color:var(--g);font-size:17px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s,background .15s;padding:0;line-height:1;}
.mm-chev:hover{background:#e7f3ea;}
.mm-litem.open .mm-chev{transform:rotate(180deg);}
.mm-litem-body{display:none;}
.mm-litem.open .mm-litem-body{display:block;}
.mm-litem.flash{box-shadow:0 0 0 3px rgba(232,196,74,.7);}
/* Palpites: humanos (1 col mobile / 2 col desktop), IAs em 2×2 */
.mm-preds-wrap{padding:11px 12px;border-top:1px solid var(--brd);}
.mm-humans{display:grid;grid-template-columns:1fr;gap:7px;margin-bottom:9px;}
.mm-ias{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;}
@media(min-width:680px){.mm-humans{grid-template-columns:repeat(2,minmax(0,1fr));}}
/* Célula do humano — CELULAR (1.1): RESPIRO à esquerda + tudo numa LINHA (foto MAIOR + nome ~1/3 · placar+bandeiras ~2/3) */
.mm-hcell{display:flex;flex-direction:row;align-items:center;gap:8px;}
.pred-cell.human.mm-hcell{padding-left:14px;}   /* respiro à esquerda antes da foto (1.1) — seletor forte p/ vencer .pred-cell.human */
.mm-hc-id{flex:0 0 33%;max-width:33%;display:flex;flex-direction:row;align-items:center;gap:7px;min-width:0;}
.mm-hcell .hum-av{width:42px;height:42px;font-size:15px;}
.mm-hc-id .hum-name{font-size:13px;font-weight:800;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left;}
/* grade do palpite: celular = [placarA × placarB] à esquerda (centralizado vertical) · à direita as bandeiras [fa fb] com o RÓTULO colado em cima (3.1/3.2) */
.mm-hc-pred{flex:1;display:grid;align-items:center;gap:0 5px;justify-content:center;grid-template-columns:auto auto auto auto auto;grid-template-areas:"na x nb lbl lbl" "na x nb fa fb";}
.mm-hc-pred .mm-na{grid-area:na;}.mm-hc-pred .mm-nb{grid-area:nb;}.mm-hc-pred .mm-x{grid-area:x;font-weight:700;opacity:.7;}
.mm-hc-pred .fa{grid-area:fa;margin-left:7px;align-self:start;}.mm-hc-pred .fb{grid-area:fb;align-self:start;}
.mm-qplbl{grid-area:lbl;font-size:7.5px;line-height:1;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:0;text-align:center;white-space:nowrap;margin-left:7px;align-self:end;}
.mm-qplbl.pen{color:#c0392b;}
.mm-qplbl.idle{opacity:.55;}
.mm-hc-pred input{width:40px;height:38px;text-align:center;border:1.5px solid var(--brd);border-radius:9px;font-size:18px;font-weight:700;background:var(--bg);color:var(--txt);-moz-appearance:textfield;}
.mm-hc-pred input::-webkit-outer-spin-button,.mm-hc-pred input::-webkit-inner-spin-button{-webkit-appearance:none;}
.mm-hc-pred input:focus{outline:none;border-color:var(--gl);background:#fff;box-shadow:0 0 0 3px rgba(45,150,83,.13);}
/* bandeira do "quem passa" colada no placar */
.mm-qpf{background:var(--card);border:1.5px solid var(--brd);border-radius:6px;padding:2px 4px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;line-height:1;}
.mm-qpf .flagbx{width:24px;height:16px;}
.mm-qpf.ro{cursor:default;}
.mm-qpf.idle{opacity:.45;}
.mm-qpf.on{border-color:var(--g);background:#e7f3ea;box-shadow:inset 0 0 0 1px var(--g);}
.mm-qpf.pen.on{border-color:#c0392b;background:#fdeae8;box-shadow:inset 0 0 0 1px #c0392b;}
/* DESKTOP (card de 2 colunas, estreito) — foto MAIOR empilhada + PALPITE em cima e bandeiras ABAIXO de cada placar (Parte 2) */
@media(min-width:680px){
  .pred-cell.human.mm-hcell{padding-left:6px;}
  .mm-hc-id{flex-direction:column;gap:4px;justify-content:center;text-align:center;}
  .mm-hc-id .hum-name{text-align:center;}
  .mm-hcell .hum-av{width:50px;height:50px;font-size:17px;}
  .mm-hc-pred{grid-template-columns:auto auto auto;grid-template-areas:"na x nb" "lbl lbl lbl" "fa . fb";gap:0 6px;}
  .mm-hc-pred .fa{margin-left:0;justify-self:center;align-self:auto;}.mm-hc-pred .fb{justify-self:center;align-self:auto;}
  /* rótulo no desktop: MAIS espaço acima (separa do placar) e quase colado nas bandeiras abaixo */
  .mm-qplbl{display:block;margin:7px 0 0;align-self:end;line-height:1;}
}
/* Célula da IA (2): nome em cima; placar (1 linha) + seletor na 2ª linha — bem compacta */
.mm-iacell{display:flex;flex-direction:column;gap:3px;padding:6px 8px;}
.mm-iacell-head{display:flex;align-items:center;gap:6px;min-width:0;}
.mm-iacell .hum-name{font-size:12px;font-weight:800;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mm-iacell-row{display:flex;align-items:center;gap:8px;}
.mm-iacell-row .mm-iascore{flex:0 0 auto;white-space:nowrap;padding:3px 8px;font-size:14px;min-width:auto;}
.mm-iacell-row .mm-hc-passa{margin-left:auto;}
/* Seletor "Quem passa / Pênaltis" em 2 linhas */
.mm-passa{display:flex;flex-direction:column;align-items:center;gap:2px;}
.mm-passa-lbl{font-size:8px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.2px;white-space:nowrap;}
.mm-passa.pen .mm-passa-lbl{color:#c0392b;}
.mm-passa.idle{opacity:.6;}
.mm-passa-opts{display:flex;gap:3px;}
.mm-po{background:var(--card);border:1.5px solid var(--brd);border-radius:6px;padding:3px 5px;cursor:pointer;display:inline-flex;align-items:center;line-height:1;}
.mm-po .flagbx{width:20px;height:13px;}
.mm-po.ro{cursor:default;}
.mm-po.on{border-color:var(--g);background:#e7f3ea;box-shadow:inset 0 0 0 1px var(--g);}
.mm-passa.pen .mm-po.on{border-color:#c0392b;background:#fdeae8;box-shadow:inset 0 0 0 1px #c0392b;}
/* Rodapé numa LINHA só (Parte 2): PLACAR FINAL · placar A×B · rótulo + 2 bandeiras menores (quem passou) · Finalizar */
.real-row.mm-footer{display:flex;flex-direction:row;align-items:center;gap:9px;flex-wrap:wrap;}
/* Parte 1: "PLACAR FINAL" + prévia EMPILHADOS (prévia embaixo) — largura fixa do rótulo, não empurra o placar */
.mm-foot-fl{display:inline-flex;flex-direction:column;align-items:flex-start;gap:1px;line-height:1.05;flex-shrink:0;}
.mm-foot-fl .prev-tag{display:none;margin-left:0;align-self:flex-start;}
.mm-foot-fl .prev-tag.show{display:inline-block;}
.real-row.mm-footer .rr-label{font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.3px;}
.mm-foot-scores{display:flex;align-items:center;gap:6px;}
.mm-foot-scores input{width:42px;height:38px;text-align:center;border:1.5px solid var(--brd);border-radius:8px;font-size:17px;font-weight:700;background:var(--bg);color:var(--txt);-moz-appearance:textfield;}
.mm-foot-scores input::-webkit-outer-spin-button,.mm-foot-scores input::-webkit-inner-spin-button{-webkit-appearance:none;}
.mm-foot-scores input:focus{outline:none;border-color:var(--gl);background:#fff;box-shadow:0 0 0 3px rgba(45,150,83,.13);}
.mm-foot-x{font-weight:800;color:#fff;opacity:.85;}
/* "quem passou": rótulo em cima, 2 bandeiras MENORES embaixo, na mesma linha */
.mm-foot-qp{display:flex;flex-direction:column;align-items:center;gap:2px;}
.mm-foot-qplbl{font-size:8px;font-weight:800;color:rgba(255,255,255,.82);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}
.mm-foot-qplbl.pen{color:#ffd9a8;}
.mm-foot-qplbl.idle{opacity:.6;}
.mm-foot-flags{display:flex;gap:4px;}
.mm-cqp{background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.45);border-radius:5px;padding:2px 5px;cursor:pointer;display:inline-flex;align-items:center;line-height:1;}
.mm-cqp .flag-img{height:11px;border-radius:2px;}
.mm-cqp.ro{cursor:default;}
.mm-cqp.idle{opacity:.5;}
.mm-cqp.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 1px var(--gold);}
.rr-finish{margin-left:auto;}   /* Finalizar sempre no fim (2.1) */
/* TURBO (1.1): laranja no cabeçalho e rodapé; texto ESCURO pra contraste (4.1) */
.mm-litem.is-turbo{border-color:#ff7a00;box-shadow:0 0 0 2px rgba(255,122,0,.35),0 4px 14px rgba(255,122,0,.18);}
.mm-litem.is-turbo .card-head{background:linear-gradient(135deg,#ff8c1a,#ff6a00);}
.mm-litem.is-turbo .card-head .grp-tag,.mm-litem.is-turbo .card-head .dt-tag{color:#0f4424;}
.mm-litem.is-turbo .card-head .bl-tag.abe{background:rgba(0,0,0,.16);color:#0f4424;}
.mm-litem.is-turbo .real-row,.mm-litem.is-turbo .real-row.pending{background:repeating-linear-gradient(135deg,#ff8c1a,#ff8c1a 10px,#f06f00 10px,#f06f00 20px);}
.mm-litem.is-turbo .real-row .rr-label,.mm-litem.is-turbo .mm-foot-x,.mm-litem.is-turbo .mm-foot-qplbl{color:#5c2e00;}
.mm-litem.is-turbo .mm-foot-qplbl.pen{color:#7a2e00;}
.mm-litem.is-turbo .mm-cqp{border-color:rgba(0,0,0,.3);background:rgba(255,255,255,.45);}
.mm-litem.is-turbo .mm-cqp.on{background:var(--gold);border-color:var(--gold);}
/* PALPITE FALTANDO (7): borda amarela + célula amarela de quem não palpitou */
.mm-litem.mm-miss{border-color:#e8c44a;box-shadow:0 0 0 2px rgba(232,196,74,.45);}
.mm-litem.is-turbo.mm-miss{border-color:#e8c44a;box-shadow:0 0 0 2px rgba(232,196,74,.6),0 4px 14px rgba(255,122,0,.18);}
.mm-hcell.mm-miss-cell{background:#fff8e1;border-color:#e8c44a;}
/* Card FINALIZADO esmaecido (10.1) */
.mm-litem.mm-fin{filter:saturate(.55);opacity:.82;}
/* Card-fantasma + "?" do time indefinido (Parte 5) */
.mm-ghost{opacity:.95;}

.mm-litem .card-head .dt-tag,.mm-ghost .card-head .dt-tag{font-size:12px;}

.mm-datehdr{cursor:pointer;user-select:none;}
.mm-day-arrow{font-size:11px;color:var(--mu);font-weight:800;flex-shrink:0;}

.mm-bx-side.lost{opacity:.4;}
.mm-bx-side.lost .mm-bx-nm{text-decoration:line-through;}
.mm-bx-pen{font-size:7px;font-weight:800;color:var(--green-ink);background:rgba(15,174,98,.14);border-radius:3px;padding:0 3px;margin-left:4px;vertical-align:1px;}

.mm-block-sub{font-size:10.5px;color:var(--mu);margin:3px 0 6px;}
.mm-next-row{display:flex;flex-direction:column;gap:2px;padding:8px 0;border-top:1px solid var(--brd);cursor:pointer;}
.mm-next .mm-block-h{margin-bottom:4px;}
.mm-next-row:first-of-type{border-top:none;}
.mm-next-when{font-size:11px;font-weight:800;color:var(--g);}
.mm-next-teams{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.mm-next-teams .flagbx{width:22px;height:15px;}
.mm-next-x{color:var(--mu);}
.mm-next-tbd{color:var(--mu);font-weight:600;font-style:italic;}
.mm-next-ven{font-size:10.5px;color:var(--mu);}
.mm-rk-row{display:flex;align-items:center;gap:9px;padding:6px 0;border-top:1px solid var(--brd);}
.mm-rk-row:first-of-type{border-top:none;}
.mm-rk-pos{font-size:13px;font-weight:800;color:var(--mu);min-width:26px;text-align:center;}
.mm-rk-av{width:30px;height:30px;border-radius:50%;overflow:hidden;position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;}
.mm-rk-nm{flex:1;font-size:13px;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mm-rk-pts{font-size:12px;color:var(--mu);}
.mm-rk-pts b{color:var(--g);font-size:14px;}

.mm-litem .ch-dot,.mm-ghost .ch-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0;box-shadow:0 0 0 3px rgba(15,174,98,.22);}

function sortKey(g){
  const day=parseInt(g.dt.split('/')[0]);
  const h=g.tm==='0h'?0:parseInt(g.tm.split('h')[0]);
  const m=g.tm.includes('h30')?30:0;
  return day*10000+h*100+m;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
// CACHE: { game_id → { finished, removed, real_a, real_b,
//                      jessica_a, jessica_b, vinicius_a, vinicius_b } }
let CACHE = {};
let _syncing = 0;
const debouncers = {};
const removeConfirm = {};

function n(v){return (v===null||v===undefined)?'':v;}

function getGame(id){
  const t = GT.find(g=>g.id===id);
  const c = CACHE[id]||{};
  return {
    ...t,
    finished:  !!c.finished,
    removed:   !!c.removed,
    realA: n(c.real_a),
    realB: n(c.real_b),
    predictions:{
      jessica:  {a:n(c.jessica_a),  b:n(c.jessica_b)},
      vinicius: {a:n(c.vinicius_a), b:n(c.vinicius_b)},
      tonius:   {a:n(c.tonius_a),   b:n(c.tonius_b)},
      leo:      {a:n(c.leo_a),      b:n(c.leo_b)},
      chatgpt:  t.g||{a:'',b:''},
      claude:   t.c||{a:'',b:''},
      claudio:  t.d||{a:'',b:''},
      chatgptleo: t.e||{a:'',b:''},
    }
  };
}

// ─── SUPABASE OPS ─────────────────────────────────────────────────────────────
function setSyncing(v){
  _syncing+=v;
  const el=document.getElementById('sync-indicator');
  if(el) el.innerHTML=_syncing>0?'<span class="sync-dot syncing"></span>salvando…':'<span class="sync-dot"></span>salvo';
}

async function upsert(id, fields){
  setSyncing(1);
  const {error}=await sb.from(TABLE).upsert({game_id:id,...fields,updated_at:new Date().toISOString()},{onConflict:'game_id'});
  setSyncing(-1);
  if(error) showErr('Erro ao salvar: '+error.message);
}

async function loadData(){
  const {data,error}=await sb.from(TABLE).select('*');
  if(error){showErr('Erro ao carregar: '+error.message);hideLoading();return;}
  CACHE={};
  if(data) data.forEach(row=>{CACHE[row.game_id]=row;});
  await loadMata();              // mata-mata (tabelas novas; ignora se ainda não existirem)
  hideLoading();
  renderAll();
  subscribeRealtime();
  subscribeMata();
}

// Colunas de dados que importam para detectar mudanças reais (ignora updated_at etc.)
const DATA_COLS=['finished','removed','real_a','real_b','jessica_a','jessica_b','vinicius_a','vinicius_b','tonius_a','tonius_b','leo_a','leo_b'];
function norm(v){return (v===undefined||v===null||v==='')?null:v;}
function sameRow(a,b){
  return DATA_COLS.every(c=>{
    if(c==='finished'||c==='removed')return (!!a[c])===(!!b[c]);
    return norm(a[c])===norm(b[c]);
  });
}
function isTyping(){
  const el=document.activeElement;
  return !!(el&&el.tagName==='INPUT'&&el.closest('#tab-palpites'));
}
let pendingRerender=false;

function subscribeRealtime(){
  sb.channel('bolao_realtime')
    .on('postgres_changes',{event:'*',schema:'public',table:TABLE},payload=>{
      const row=payload.new;
      if(!row||!row.game_id)return;
      const gid=row.game_id;
      const prev=CACHE[gid]||{};
      if(sameRow(prev,row))return;                 // é só o eco da nossa própria escrita — ignora
      const structural=(!!prev.finished!==!!row.finished)||(!!prev.removed!==!!row.removed);
      CACHE[gid]=row;
      if(activeTab!=='palpites'){renderRanking();return;}
      if(structural){                              // muda filtros/seções: re-renderiza (mas nunca enquanto digita)
        if(isTyping())pendingRerender=true; else renderPalpites();
        return;
      }
      applyRemoteScores(gid);                       // mudou só placar: atualiza o card no lugar
    })
    .subscribe();
}

// Atualiza um card específico com dados remotos, sem reconstruir a lista nem roubar o foco
function applyRemoteScores(gid){
  const card=document.querySelector(`#tab-palpites [data-id="${gid}"]`);
  if(!card)return;
  const g=getGame(gid);
  const setInput=(inp,v)=>{if(inp&&document.activeElement!==inp)inp.value=norm(v)===null?'':v;};
  ['jessica','vinicius','tonius','leo'].forEach(pid=>{
    const cell=card.querySelector(`.pred-cell[data-pid="${pid}"]`);
    if(!cell)return;
    const ins=cell.querySelectorAll('input');
    if(!ins.length)return;
    setInput(ins[0],g.predictions[pid].a);
    setInput(ins[1],g.predictions[pid].b);
  });
  const realRow=card.querySelector('.real-row');
  if(realRow){const ins=realRow.querySelectorAll('input');setInput(ins[0],g.realA);setInput(ins[1],g.realB);}
  refreshPoints(gid);
}

// Quando o usuário termina de digitar, aplica re-render estrutural que ficou pendente
document.addEventListener('focusout',e=>{
  if(pendingRerender&&e.target.tagName==='INPUT'&&e.target.closest('#tab-palpites')){
    setTimeout(()=>{if(!isTyping()){pendingRerender=false;renderPalpites();}},150);
  }
});

// ─── SCORING ──────────────────────────────────────────────────────────────────
function calcPts(pred,rA,rB){
  if(pred.a===''||pred.a===null||pred.a===undefined)return null;
  if(rA===''||rA===null||rA===undefined)return null;
  const pa=+pred.a,pb=+pred.b,ra=+rA,rb=+rB;
  if(isNaN(pa)||isNaN(pb)||isNaN(ra)||isNaN(rb))return null;
  let p=0;
  if((pa>pb?'A':pa<pb?'B':'E')===(ra>rb?'A':ra<rb?'B':'E'))p+=5;
  if(pa===ra)p+=1;
  if(pb===rb)p+=1;
  if(pa===ra&&pb===rb)p+=3;
  return p;
}
function ptsClass(p){return p===null?'':p>=10?'pts-10':p>=7?'pts-7':p>=4?'pts-4':'pts-0';}

// ── Jogo TURBO: 1 jogo por dia (a partir de 20/06) vale 2× ──
function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}
function turboIdForDate(dt){
  const elig=GT.filter(t=>{const g=getGame(t.id);return !g.removed&&g.dt===dt&&sortKey(g)>=CUT;}).map(t=>t.id).sort();
  return elig.length?elig[hashStr('turbo-'+dt)%elig.length]:null;
}
function isTurbo(g){return !g.removed&&sortKey(g)>=CUT&&turboIdForDate(g.dt)===g.id;}
function ptsOf(g,pred){const p=calcPts(pred,g.realA,g.realB);return p===null?null:(isTurbo(g)?p*2:p);}

// ─── PRÓXIMO JOGO / CONTAGEM REGRESSIVA ───────────────────────────────────────
function gameDate(g){
  const [dd,mm]=g.dt.split('/').map(Number);
  const parts=g.tm.split('h');
  const hh=parseInt(parts[0])||0, mi=parts[1]?parseInt(parts[1]):0;
  return new Date(2026,mm-1,dd,hh,mi,0);   // horário de Brasília (dispositivo)
}
function emptyVal(x){return x===''||x===null||x===undefined;}
const WD=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
function weekday(g){return WD[gameDate(g).getDay()];}
function missingPred(g){
  const need=[g.predictions.jessica.a, g.predictions.vinicius.a];
  if(sortKey(g)>=CUT){need.push(g.predictions.tonius.a, g.predictions.leo.a);}   // Tonius e Leo a partir de 20/06
  return need.some(emptyVal);
}
function findNextGame(){
  const now=Date.now();
  const up=GT.map(t=>getGame(t.id)).filter(g=>!g.removed&&!g.finished&&gameDate(g).getTime()>now);
  if(!up.length)return null;
  up.sort((a,b)=>gameDate(a)-gameDate(b));
  return up[0];
}
function fmtCountdown(ms){
  if(ms<=0)return 'Começa agora! ⚽';
  let s=Math.floor(ms/1000);
  const d=Math.floor(s/86400);s-=d*86400;
  const h=Math.floor(s/3600);s-=h*3600;
  const m=Math.floor(s/60);s-=m*60;
  const p2=n=>String(n).padStart(2,'0');
  if(d>0)return `${d}d ${p2(h)}h ${p2(m)}m`;
  if(h>0)return `${p2(h)}h ${p2(m)}m ${p2(s)}s`;
  return `${p2(m)}m ${p2(s)}s`;
}
let _cdInterval=null,_cdTarget=0;
function tickCountdown(){
  const els=document.querySelectorAll('.dh-cd[data-t]');
  if(!els.length){if(_cdInterval){clearInterval(_cdInterval);_cdInterval=null;}return;}
  let expired=false;
  els.forEach(el=>{const rem=+el.dataset.t-Date.now(); if(rem<=0)expired=true; else el.textContent=fmtCountdown(rem);});
  if(expired&&!isTyping())renderAll();   // algum jogo começou: atualiza a aba ativa (palpites ou mata)
}
// Jogos do dia: do agora até as 6h da próxima manhã (madrugada conta como o mesmo "dia")
function todaySlate(){
  const now=Date.now();
  const end=new Date(); end.setHours(6,0,0,0);
  if(end.getTime()<=now) end.setDate(end.getDate()+1);
  const endMs=end.getTime();
  return GT.map(t=>getGame(t.id))
    .filter(g=>!g.removed&&!g.finished)
    .map(g=>({g,t:gameDate(g).getTime()}))
    .filter(x=>x.t>now&&x.t<=endMs)
    .sort((a,b)=>a.t-b.t)
    .map(x=>x.g);
}
function dayRow(g){
  const t=gameDate(g).getTime();
  const turbo=isTurbo(g);
  const miss=missingPred(g);
  return `<div class="dh-row${turbo?' dh-turbo':''}" onclick="goToGame('${g.id}')">
    <span class="dh-time">${g.tm}</span>
    ${turbo?'<span class="dh-turbobadge">⚡2×</span>':''}
    <span class="dh-teams"><span class="dh-scroll">${flagImg(g.fA)} <b>${g.tA}</b> <i>×</i> ${flagImg(g.fB)} <b>${g.tB}</b>${miss?' <span class="dh-miss">• falta palpite</span>':''}</span></span>
    <span class="dh-cd" data-t="${t}">${fmtCountdown(t-Date.now())}</span>
  </div>`;
}
// Faz o texto dos jogos do dia "rolar" (vai-e-volta) quando não cabe na largura
function setupMarquees(){
  document.querySelectorAll('.day-hero .dh-teams').forEach(el=>{
    const inner=el.querySelector('.dh-scroll');
    if(!inner)return;
    const over=inner.scrollWidth-el.clientWidth;
    if(over>10){
      el.classList.add('marq');
      inner.style.setProperty('--shift',-over+'px');
      inner.style.animationDuration=Math.max(7,over/12)+'s';

// ─── RENDER PALPITES ──────────────────────────────────────────────────────────
function renderPalpites(){
  const games=GT.map(t=>getGame(t.id));
  const isGeral=g=>!g.removed&&sortKey(g)>=CUT;
  const isJxv=g=>!g.removed&&sortKey(g)<CUT;

  const cAll=games.length;
  const cPend=games.filter(g=>!g.removed&&!g.finished).length;
  const cFin=games.filter(g=>!g.removed&&g.finished).length;
  const cGeral=games.filter(isGeral).length;
  const cJxv=games.filter(isJxv).length;
  const cNao=games.filter(g=>g.removed).length;

  let list;
  if(filterMode==='pending')      list=games.filter(g=>!g.removed&&!g.finished);
  else if(filterMode==='finished')list=games.filter(g=>!g.removed&&g.finished);
  else if(filterMode==='geral')   list=games.filter(isGeral);
  else if(filterMode==='jxv')     list=games.filter(isJxv);
  else if(filterMode==='naocons') list=games.filter(g=>g.removed);
  else list=games;   // Todos (inclui os desconsiderados, com tag)

  const desc=['finished','geral','jxv'].includes(filterMode);   // mais recente primeiro
  const sorted=[...list].sort((a,b)=>desc?sortKey(b)-sortKey(a):sortKey(a)-sortKey(b));
  const pill=(id,label,n,cls)=>`<button class="pill${cls?' '+cls:''}${filterMode===id?' active':''}" onclick="setFilter('${id}')">${label} (${n})</button>`;

  let html=heroHTML();
  html+=rankMarquee();
  // Filtros (Etapa 4): "Todos" (padrão) + Bolão Geral/JxV/Fora. Só "Pendentes" e "Finalizados" ficam de fora.
  html+=`<div class="controls"><div class="filters">
    ${pill('all','Todos',cAll)}
    ${pill('geral','Bolão Geral',cGeral)}
    ${pill('jxv','Bolão JxV',cJxv)}
    ${pill('naocons','Fora',cNao)}
  </div></div>`;

  if(!sorted.length){
    html+=`<div class="empty-state">Nenhum jogo nesta categoria.</div>`;
  }else{
    const dates=[...new Set(sorted.map(g=>g.dt))];
    dates.forEach(dt=>{
      html+=`<div class="section-hdr"><span class="section-badge">${dt}</span><div class="section-line"></div></div>`;
      html+=`<div class="games-grid">`;
      sorted.filter(g=>g.dt===dt).forEach(g=>{html+=renderCard(g);});
      html+=`</div>`;
    });
  }

  document.getElementById('tab-palpites').innerHTML=html;
  setupMarquees();
  if(_cdInterval){clearInterval(_cdInterval);_cdInterval=null;}
  if(document.querySelector('.dh-cd'))_cdInterval=setInterval(tickCountdown,1000);
}

function winCls(hasReal,g,side){
  if(!hasReal)return 'team';
  const a=+g.realA,b=+g.realB;
  if(a===b)return 'team';
  const aWin=a>b;
  if(side==='A')return aWin?'team win':'team lose';
  return aWin?'team lose':'team win';
}
function renderCard(g){
  const hasReal=g.finished&&g.realA!==''&&g.realA!==null&&g.realA!==undefined;
  const hasScore=!emptyVal(g.realA)&&!emptyVal(g.realB);   // placar do jogo preenchido (mesmo sem finalizar)
  const started=gameDate(g).getTime()<=Date.now();   // jogo já começou → palpites travados
  const turbo=isTurbo(g);
  const cls=['card'];
  if(g.finished)cls.push('is-finished');
  if(g.removed)cls.push('is-naocons');
  if(turbo)cls.push('is-turbo');
  const tag=g.removed?`<span class="bl-tag nao">NÃO CONSIDERADO</span>`
    :sortKey(g)>=CUT?`<span class="bl-tag geral">BOLÃO GERAL</span>`
    :`<span class="bl-tag jxv">BOLÃO JxV</span>`;
  const turboTag=turbo?`<span class="bl-tag turbo">⚡ TURBO 2×</span>`:'';
  const lockTag=(started&&!g.finished)?`<span class="bl-tag lock">🔒 PALPITES FECHADOS</span>`:'';
  const abertoTag=(!started&&!g.finished&&!g.removed)?`<span class="bl-tag aberto">ABERTO</span>`:'';

  let html=`<div class="${cls.join(' ')}" data-id="${g.id}">
    <div class="card-head">
      <span class="grp-tag"><span class="ch-dot${(started||g.finished)?' closed':''}"></span>GRUPO ${g.grp} · RODADA ${g.r}${abertoTag}${tag}${turboTag}${lockTag}</span>
      <span class="dt-tag">${weekday(g)}, ${g.dt} · ${g.tm}</span>
    </div>
    <div class="matchup">
      <div class="${winCls(hasReal,g,'A')}"><span class="team-flag">${flagImg(g.fA)}</span><span class="team-name">${g.tA}</span></div>
      <div class="mid">
        ${hasReal?`<div class="score-final">${g.realA}<small>×</small>${g.realB}</div>`:`<div class="vs-badge">VS</div>`}
        <div class="venue">📍 ${g.ven}</div>
      </div>
      <div class="${winCls(hasReal,g,'B')}"><span class="team-flag">${flagImg(g.fB)}</span><span class="team-name">${g.tB}</span></div>
    </div>
    <div class="preds-grid">`;

  PARTICIPANTS.forEach(p=>{
    const pred=g.predictions[p.id];
    const hasPred=!emptyVal(pred.a);
    const pts=hasScore&&hasPred?ptsOf(g,pred):null;
    const badge=pts!==null?`<span class="pts-badge ${g.finished?ptsClass(pts):'preview'}">${pts}</span>`:'';
    const inp=side=>`<input type="number" min="0" max="99" inputmode="numeric" value="${hasPred?pred[side]:''}" placeholder="–"${started?' disabled':''} oninput="updPred('${g.id}','${p.id}','${side}',this.value)">`;
    if(p.type==='human'){
      const hbadge=pts!==null?`<span class="pts-badge on-av ${g.finished?ptsClass(pts):'preview'}">${pts}</span>`:'';
      html+=`<div class="pred-cell human" data-pid="${p.id}">
        <div class="hum-avwrap"><div class="hum-av" style="background:${p.color}">${avInner(p)}</div>${hbadge}</div>
        <span class="hum-name">${p.name}</span>
        <div class="pc-inputs">${inp('a')}<span class="sep">×</span>${inp('b')}</div>
      </div>`;
    }else{
      html+=`<div class="pred-cell ia" data-pid="${p.id}">
        <div class="pc-top"><span class="pc-name"><span class="pc-dot" style="background:${p.color}"></span>${p.name}</span>${badge}</div>`;
      html+=p.editable
        ? `<div class="pc-inputs small">${inp('a')}<span class="sep">×</span>${inp('b')}</div>`
        : `<div class="pc-score${hasPred?'':' empty'}">${hasPred?`${pred.a} × ${pred.b}`:'– × –'}</div>`;
      html+=`</div>`;
    }
  });

  html+=`</div>`;

  if(g.finished&&!hasReal){
    html+=`<div class="warn-bar">⚠️ Falta o placar final — preencha para contar no bolão</div>`;
  }
  html+=`<div class="real-row${g.finished?'':' pending'}">
      <div class="rr-line">
        <span class="rr-label">PLACAR DO JOGO${(!g.finished&&hasScore)?' <span class="prev-tag">prévia</span>':''}</span>
        <input type="number" min="0" max="99" inputmode="numeric" value="${g.realA!==''?g.realA:''}" placeholder="–" oninput="updReal('${g.id}','a',this.value)">
        <span class="sep">×</span>
        <input type="number" min="0" max="99" inputmode="numeric" value="${g.realB!==''?g.realB:''}" placeholder="–" oninput="updReal('${g.id}','b',this.value)">
      </div>
      <button class="rr-finish${g.finished?' done':''}" onclick="toggleFinish('${g.id}')">${g.finished?'Finalizado':'Finalizar'} ${g.finished?'✅':'<span class="chk-off">✓</span>'}</button>
    </div>`;
  html+=`</div>`;
  return html;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function toggleFinish(id){
  const cur=CACHE[id]||{};
  const finished=!cur.finished;
  CACHE[id]={...cur,finished};
  renderPalpites();
  upsert(id,{finished});
}

function toggleRemove(id){
  const cur=CACHE[id]||{};
  if(cur.removed){
    CACHE[id]={...cur,removed:false};
    delete removeConfirm[id];
    renderPalpites();
    upsert(id,{removed:false});
    return;
  }
  if(!removeConfirm[id]){
    removeConfirm[id]=true;
    renderPalpites();
    setTimeout(()=>{delete removeConfirm[id];renderPalpites();},3000);
    return;
  }
  delete removeConfirm[id];
  CACHE[id]={...cur,removed:true};
  renderPalpites();
  upsert(id,{removed:true});
}

// Atualiza só os selos de pontos e o aviso de placar pendente — sem tocar nos inputs (foco preservado)
function refreshPoints(gameId){
  const card=document.querySelector(`#tab-palpites [data-id="${gameId}"]`);
  if(!card)return;
  const g=getGame(gameId);
  const hasReal=g.finished&&g.realA!==''&&g.realA!==null&&g.realA!==undefined;
  const hasScore=!emptyVal(g.realA)&&!emptyVal(g.realB);
  PARTICIPANTS.forEach(p=>{
    const cell=card.querySelector(`.pred-cell[data-pid="${p.id}"]`);
    if(!cell)return;
    const pred=g.predictions[p.id];
    const hasPred=!emptyVal(pred.a);
    const pts=(hasScore&&hasPred)?ptsOf(g,pred):null;
    let badge=cell.querySelector('.pts-badge');
    if(pts===null){if(badge)badge.remove();}
    else{
      const wrap=cell.querySelector('.hum-avwrap'), top=cell.querySelector('.pc-top');
      if(!badge){
        badge=document.createElement('span');
        if(wrap)wrap.appendChild(badge);            // humano: no canto do avatar
        else if(top)top.appendChild(badge);         // IA
        else cell.appendChild(badge);
      }
      badge.className=(wrap?'pts-badge on-av ':'pts-badge ')+(g.finished?ptsClass(pts):'preview');
      badge.textContent=pts;
    }
  });
  // rótulo "prévia" ao vivo
  const lbl=card.querySelector('.rr-label');
  if(lbl)lbl.innerHTML='PLACAR DO JOGO'+((!g.finished&&hasScore)?' <span class="prev-tag">prévia</span>':'');
  const needWarn=g.finished&&!hasReal;
  let warn=card.querySelector('.warn-bar');
  if(needWarn&&!warn){
    warn=document.createElement('div');warn.className='warn-bar';

    card.insertBefore(warn,card.querySelector('.real-row'));
  }else if(!needWarn&&warn){warn.remove();}
}

function updPred(gameId,pid,side,val){
  if(gameDate(getGame(gameId)).getTime()<=Date.now())return;   // jogo começou: palpite travado
  const cur=CACHE[gameId]||{};
  const col=`${pid}_${side}`;
  const num=val===''?null:parseInt(val);
  CACHE[gameId]={...cur,[col]:num};
  refreshPoints(gameId);
  clearTimeout(debouncers[gameId+pid+side]);
  debouncers[gameId+pid+side]=setTimeout(()=>upsert(gameId,{[col]:num}),700);
}

function updReal(gameId,side,val){
  const cur=CACHE[gameId]||{};
  const col=`real_${side}`;
  const num=val===''?null:parseInt(val);
  CACHE[gameId]={...cur,[col]:num};
  refreshPoints(gameId);
  clearTimeout(debouncers[gameId+'real'+side]);
  debouncers[gameId+'real'+side]=setTimeout(()=>upsert(gameId,{[col]:num}),700);
}

// ─── RANKING ──────────────────────────────────────────────────────────────────
function getStats(pid,filterFn){
  const scored=GT.map(t=>getGame(t.id)).filter(g=>!g.removed&&g.finished&&g.realA!==''&&(!filterFn||filterFn(g)));
  let total=0,rHits=0,eHits=0,ptsList=[],bestG=null,bestP=-1,diffs=[],cravadas=[];
  scored.forEach(g=>{
    const pred=g.predictions[pid];
    if(emptyVal(pred.a))return;
    const p=ptsOf(g,pred);
    if(p===null)return;
    total+=p;ptsList.push(p);
    const ra=+g.realA,rb=+g.realB,pa=+pred.a,pb=+pred.b;
    if((pa>pb?'A':pa<pb?'B':'E')===(ra>rb?'A':ra<rb?'B':'E'))rHits++;
    if(pa===ra&&pb===rb){eHits++;cravadas.push(g);}
    if(p>bestP){bestP=p;bestG=g;}
    diffs.push(pa-ra,pb-rb);
  });
  const avg=ptsList.length?total/ptsList.length:0;
  const sd=ptsList.length>1?Math.sqrt(ptsList.reduce((s,p)=>s+Math.pow(p-avg,2),0)/ptsList.length):0;
  const bias=diffs.length?diffs.reduce((a,b)=>a+b,0)/diffs.length:0;
  const aprov=ptsList.length?total/(ptsList.length*10):0;
  return{total,rHits,eHits,avg,sd,bestG,bestP,played:ptsList.length,bias,cravadas,aprov};
}

  if(!el){el=document.createElement('div');el.id='floating-tip';document.body.appendChild(el);}
