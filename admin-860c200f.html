<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Placares — Bolão do Ratazana00</title>
<style>
  /* Página ADMIN (não linkada no site). A ÚNICA via de escrita do placar final é a
     Edge Function ratazana-cobranca (?tipo=fechar_placar), que roda com service role
     e exige a senha (?token=). A anon key (usada pra LER a lista abaixo) não consegue
     mais gravar real_a/real_b/classificado/finished — ver supabase_placar_lock.sql. */
  :root{
    --bg:#101410;--card:#1a221a;--brd:#2c372c;--ink:#eef3ee;--mu:#9fb09f;--lime:#AFEA00;
    --verde:#004D3F;--gold:#e8c44a;--red:#ff6b5e;
    /* tokens só do componente de pills (portado do index.html; nomes prefixados
       pra não colidir com os tokens do tema escuro acima) */
    --pill-surface:#FFFFFF;--pill-line:rgba(20,20,26,.10);--pill-muted:#6E6E77;
    --pill-ink:#16161B;--pill-frame:#0C0C0E;--pill-faint:#A2A2AA;--r-q-sm:3px 12px 3px 3px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font:15px/1.45 -apple-system,'Segoe UI',Roboto,'Noto Sans',sans-serif;padding:14px;max-width:920px;margin:0 auto;}
  h1{font-size:19px;margin:6px 0 2px;letter-spacing:.3px;}
  .sub{color:var(--mu);font-size:12px;margin-bottom:10px;}
  .badge{display:inline-block;background:var(--verde);color:var(--lime);font-size:11px;font-weight:800;padding:2px 8px;border-radius:4px 12px 4px 4px;margin-left:6px;vertical-align:2px;}
  .badge.dev{background:#5a1414;color:#ffd9a8;}
  .toprow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--mu);margin-bottom:6px;}
  label.chk{display:flex;align-items:center;gap:6px;}
  #recarregar{background:none;border:1px solid var(--brd);color:var(--mu);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;}
  .linklike{background:none;border:none;color:var(--mu);font-size:11px;text-decoration:underline;cursor:pointer;padding:0;}

  /* aviso de troca de fase (v1.19) — consumido do bot_config no boot */
  #fase-aviso{border-radius:4px 16px 4px 4px;padding:12px 40px 12px 14px;margin:10px 0;font-size:13.5px;line-height:1.5;position:relative;}
  #fase-aviso.ok{background:var(--verde);color:var(--lime);border:1px solid var(--lime);}
  #fase-aviso.warn{background:#3a2e00;color:var(--gold);border:1px solid var(--gold);}
  #fase-aviso .fa-close{position:absolute;top:8px;right:10px;background:none;border:none;color:inherit;font-size:18px;line-height:1;cursor:pointer;opacity:.75;padding:2px 4px;}


  /* filtro de status + busca */
  .controls-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:14px 0 6px;}
  .status-toggle{display:flex;gap:4px;}
  .stbtn{background:var(--card);border:1px solid var(--brd);color:var(--mu);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;}
  .stbtn.active{background:var(--lime);border-color:var(--lime);color:#12250f;}
  #busca{flex:1 1 220px;padding:9px 12px;background:#0c100c;border:1.5px solid var(--brd);border-radius:8px;color:var(--ink);font-size:14px;}
  #busca:focus{outline:none;border-color:var(--lime);}
  #busca::placeholder{color:var(--mu);}

  /* pills de fase (portadas de index.html: .mm-filters/.mm-fbtn/.mm-mult-seal) */
  .mm-filters{display:flex;gap:4px;padding:8px 1px 10px;flex-wrap:wrap;}
  .mm-fbtn{flex:1 1 0;min-width:0;position:relative;background:var(--pill-surface);border:1px solid var(--pill-line);border-radius:var(--r-q-sm);padding:7px 4px;font-size:11px;font-weight:700;color:var(--pill-muted);cursor:pointer;text-align:center;line-height:1.2;}
  .mm-fbtn .fb-lbl{display:block;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mm-fbtn sup{font-size:.72em;}
  .mm-fbtn.active{background:var(--lime);border-color:var(--lime);color:var(--pill-ink);}
  .mm-mult-seal{position:absolute;top:-8px;right:-3px;transform:rotate(-6deg);background:var(--pill-frame);color:var(--lime);font-size:9px;font-weight:800;line-height:1;padding:3px 6px;border-radius:6px;pointer-events:none;z-index:2;letter-spacing:.2px;box-shadow:0 2px 6px -2px rgba(0,0,0,.55);white-space:nowrap;}
  .mm-mult-seal.m1{color:var(--pill-faint);}
  .mm-mult-seal.mfin{color:var(--lime);}

  .vazio{color:var(--mu);font-size:13px;padding:16px 4px;}

  /* grade de cards: 1 coluna no mobile, 2 no desktop (mesma largura de container
     da tela de palpites: 920px) */
  #lista{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:24px;}
  @media(min-width:680px){#lista{grid-template-columns:1fr 1fr;}}

  .jogo{background:var(--card);border:1px solid var(--brd);border-radius:4px 16px 4px 4px;padding:12px;}
  .jg-top{display:flex;justify-content:space-between;gap:8px;font-size:11px;color:var(--mu);margin-bottom:6px;flex-wrap:wrap;}
  .jg-fase{font-weight:800;color:var(--gold);}
  .zebra-badge{background:#5a3d0a;color:#ffd9a8;font-weight:800;padding:2px 6px;border-radius:4px;font-size:10px;}
  .zebra-badge.zebrao{background:#5a1414;color:#ffb3b3;}
  .jg-id{opacity:.6;}
  .jg-times{display:flex;align-items:center;justify-content:center;gap:7px;font-size:16px;font-weight:800;margin-bottom:10px;flex-wrap:wrap;text-align:center;}
  .jg-times img.flag-img{width:22px;height:16px;object-fit:cover;border-radius:1px 4px 1px 1px;box-shadow:0 1px 2px rgba(0,0,0,.3);}
  .jg-x{color:var(--mu);font-weight:700;}

  .placar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
  .placar input{width:56px;height:44px;text-align:center;font-size:20px;font-weight:800;background:#0c100c;color:var(--ink);border:1.5px solid var(--brd);border-radius:8px;-moz-appearance:textfield;}
  .placar input::-webkit-outer-spin-button,.placar input::-webkit-inner-spin-button{-webkit-appearance:none;}
  .placar input:focus{outline:none;border-color:var(--lime);}
  .placar .x{color:var(--mu);font-weight:800;}
  .pen{display:none;margin-bottom:10px;text-align:center;}
  .pen.show{display:block;}
  .pen .lbl{font-size:11px;color:var(--gold);font-weight:700;margin-bottom:5px;}
  .pen button{background:#0c100c;color:var(--ink);border:1.5px solid var(--brd);border-radius:8px;padding:8px 12px;margin:0 4px;font-size:13px;font-weight:700;cursor:pointer;}
  .pen button.on{border-color:var(--lime);color:var(--lime);}
  .fechar{width:100%;background:var(--lime);color:#12250f;border:none;border-radius:4px 14px 4px 4px;padding:11px;font-size:15px;font-weight:900;cursor:pointer;}
  .fechar:disabled{opacity:.45;cursor:default;}

  /* card FECHADO: placar somente leitura + quem avança, centralizados */
  .final-row{display:flex;flex-direction:column;align-items:center;gap:5px;background:linear-gradient(135deg,#0f2e18,#163d20);border-radius:4px 14px 4px 4px;padding:12px;margin-bottom:10px;}
  .final-row .rr-label{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.5px;}
  .score-final{font-size:26px;font-weight:900;color:var(--ink);}
  .score-final .x{color:var(--mu);font-size:18px;margin:0 6px;}
  .avanca-row{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--mu);font-weight:700;}
  .avanca-row img.flag-img{width:18px;height:13px;object-fit:cover;border-radius:1px 3px 1px 1px;}
  .pen-tag{color:var(--gold);}
  .closed-actions{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
  .lock-badge{background:var(--gold);color:#3a2e00;font-weight:900;font-size:13px;padding:8px 14px;border-radius:4px 14px 4px 4px;}
  .reabrir{background:none;border:1.5px solid var(--brd);color:var(--ink);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;}
  .reabrir:active{background:var(--brd);}

  .status{font-size:12px;margin-top:8px;color:var(--mu);white-space:pre-line;text-align:center;}
  .status.ok{color:var(--lime);}
  .status.err{color:var(--red);}

  /* "Acordar o Ratazana" (só em jogo fechado): direcionamento + preview + envio */
  .ac-box{margin-top:10px;border-top:1px dashed var(--brd);padding-top:10px;display:flex;flex-direction:column;gap:8px;}
  .ac-fields{display:flex;gap:6px;flex-wrap:wrap;}
  .ac-fields select,.ac-fields input{background:#0c100c;color:var(--ink);border:1.5px solid var(--brd);border-radius:8px;padding:8px;font-size:13px;}
  .ac-fields select{flex:0 1 44%;min-width:150px;}
  .ac-fields input{flex:1 1 50%;min-width:170px;}
  .ac-fields input:focus,.ac-fields select:focus{outline:none;border-color:var(--lime);}
  .acordar{background:none;border:1.5px solid var(--lime);color:var(--lime);border-radius:4px 14px 4px 4px;padding:9px 12px;font-size:13.5px;font-weight:800;cursor:pointer;}
  .acordar:active{background:rgba(175,234,0,.12);}
  .preview-box{background:#0c100c;border:1px solid var(--brd);border-radius:4px 14px 4px 4px;padding:10px;display:flex;flex-direction:column;gap:8px;}
  .pv-label{font-size:10.5px;font-weight:800;letter-spacing:.5px;color:var(--gold);}
  .pv-text{white-space:pre-wrap;font-family:inherit;font-size:13px;line-height:1.5;color:var(--ink);margin:0;}
  .pv-note{font-size:11px;color:var(--mu);}
  .pv-dest{display:flex;gap:14px;font-size:12.5px;color:var(--mu);flex-wrap:wrap;}
  .pv-dest label{display:flex;align-items:center;gap:5px;cursor:pointer;}
  .pv-dest input{accent-color:var(--lime);}
  .pv-dest .of{color:var(--gold);font-weight:700;}
  .pv-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .pv-send{flex:1;background:var(--lime);color:#12250f;border:none;border-radius:4px 12px 4px 4px;padding:9px;font-weight:900;font-size:13.5px;cursor:pointer;}
  /* campo de mensagem livre (envio manual) — font 16px evita o zoom automático do iOS */
  .livre-txt{width:100%;box-sizing:border-box;min-height:130px;resize:vertical;background:#0c100c;color:var(--ink);border:1.5px solid var(--brd);border-radius:8px;padding:10px;font-family:inherit;font-size:16px;line-height:1.45;}
  .livre-txt:focus{outline:none;border-color:var(--lime);}
  .livre-prev{font-size:12px;color:var(--mu);}
  .livre-prev summary{cursor:pointer;user-select:none;}
  .livre-prev-box{white-space:pre-wrap;word-break:break-word;font-size:14px;line-height:1.5;color:var(--ink);background:#0c100c;border:1px solid var(--brd);border-radius:8px;padding:9px;margin-top:6px;}
  .livre-prev-empty{color:var(--mu);}
  .acordar:disabled{opacity:.5;cursor:default;}

  /* utilitários do topo: listar grupos + enviar mensagem livre */
  .utilbtn{background:var(--card);border:1px solid var(--brd);color:var(--mu);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;}
  .util-box{background:var(--card);border:1px solid var(--brd);border-radius:4px 16px 4px 4px;padding:12px;margin:10px 0;}
  .util-tit{font-size:12.5px;color:var(--mu);margin-bottom:8px;}
  .gr-table{width:100%;border-collapse:collapse;font-size:13px;}
  .gr-table td{padding:6px 8px;border-top:1px solid var(--brd);vertical-align:top;}
  .gr-table td.gr-id{color:var(--mu);font-size:11.5px;word-break:break-all;}
</style>
</head>
<body>
<h1>🐀 Lançar placares <span id="env-badge" class="badge"></span></h1>
<div class="sub">Fechar jogo grava o placar final pela função (o token protege a escrita no backend) e <b>não envia mensagem nenhuma</b>: o Ratazana só fala quando você acordar ele no card do jogo fechado. Jogo fechado pode ser reaberto pra corrigir.</div>

<div id="fase-aviso" hidden></div>

<div class="toprow">
  <button id="recarregar" onclick="carregar()">↻ Recarregar</button>
  <button class="utilbtn" onclick="toggleUtil('grupos')">📡 Listar grupos</button>
  <button class="utilbtn" onclick="toggleUtil('livre')">✍️ Enviar mensagem como Ratazana</button>
</div>
<div id="util-grupos" class="util-box" hidden></div>
<div id="util-livre" class="util-box" hidden></div>

<div class="controls-row">
  <div class="status-toggle" id="status-wrap">
    <button class="stbtn active" data-v="todos" onclick="setStatus('todos')">Todos</button>
    <button class="stbtn" data-v="abertos" onclick="setStatus('abertos')">Abertos</button>
    <button class="stbtn" data-v="fechados" onclick="setStatus('fechados')">Fechados</button>
  </div>
  <input id="busca" type="text" placeholder="🔎 Buscar time (todas as fases)…" oninput="onBusca(this.value)">
</div>
<div id="pills-wrap"></div>

<div id="lista">Carregando…</div>

<script>
// ─── CONFIG (mesmo projeto/chave pública do app; a leitura continua liberada) ─
const SUPABASE_URL='https://jgnmenwtxybaqshvxyer.supabase.co';
const SUPABASE_KEY='sb_publishable_-4B34BzFkro0ve-J-OMBKQ_9xO3C5tr';
const FN_URL=SUPABASE_URL+'/functions/v1/ratazana-cobranca';
// Detecção de ambiente IGUAL à do app (index.html): dev./ratazana. = DEV → tabelas dev_
function isDevEnv(h){h=h||location.hostname;return h.startsWith('dev.')||h.startsWith('ratazana.');}
const IS_DEV=isDevEnv();
const MM_TCONF=IS_DEV?'dev_mata_confrontos':'mata_confrontos';
const TOKEN_KEY='ratz_admin_code';

// ─── Bandeiras (cópia fiel de flagImg/TAGFLAGS do index.html) ────────────────
const TAGFLAGS={'🏴󠁧󠁢󠁳󠁣󠁴󠁿':'gb-sct','🏴󠁧󠁢󠁥󠁮󠁧󠁿':'gb-eng'};
function flagImg(em){
  if(!em)return '';
  if(TAGFLAGS[em])return `<img class="flag-img" src="https://flagcdn.com/h40/${TAGFLAGS[em]}.png" alt="" loading="lazy">`;
  const cp=[...em].map(c=>c.codePointAt(0));
  if(cp.length===2&&cp[0]>=0x1F1E6&&cp[0]<=0x1F1FF){
    const code=String.fromCharCode(97+cp[0]-0x1F1E6)+String.fromCharCode(97+cp[1]-0x1F1E6);
    return `<img class="flag-img" src="https://flagcdn.com/h40/${code}.png" alt="" loading="lazy">`;
  }
  return '';
}

// ─── Agenda + chave + fases (cópias do app, pra ordenar/resolver/organizar) ──
const MM_AGENDA={
  r32_1:{dt:'28/06',tm:'16h'},r32_2:{dt:'29/06',tm:'14h'},r32_3:{dt:'29/06',tm:'17h30'},
  r32_4:{dt:'29/06',tm:'22h'},r32_5:{dt:'30/06',tm:'14h'},r32_6:{dt:'30/06',tm:'18h'},
  r32_7:{dt:'30/06',tm:'22h'},r32_8:{dt:'01/07',tm:'13h'},r32_9:{dt:'01/07',tm:'17h'},
  r32_10:{dt:'01/07',tm:'21h'},r32_11:{dt:'02/07',tm:'16h'},r32_12:{dt:'02/07',tm:'20h'},
  r32_13:{dt:'03/07',tm:'00h'},r32_14:{dt:'03/07',tm:'15h'},r32_15:{dt:'03/07',tm:'19h'},
  r32_16:{dt:'03/07',tm:'22h30'},r16_1:{dt:'04/07',tm:'14h'},r16_2:{dt:'04/07',tm:'18h'},
  r16_3:{dt:'05/07',tm:'17h'},r16_4:{dt:'05/07',tm:'21h'},r16_5:{dt:'06/07',tm:'16h'},
  r16_6:{dt:'06/07',tm:'21h'},r16_7:{dt:'07/07',tm:'13h'},r16_8:{dt:'07/07',tm:'17h'},
  qf_1:{dt:'09/07',tm:'17h'},qf_2:{dt:'10/07',tm:'16h'},qf_3:{dt:'11/07',tm:'18h'},
  qf_4:{dt:'11/07',tm:'22h'},sf_1:{dt:'14/07',tm:'16h'},sf_2:{dt:'15/07',tm:'16h'},
  tp_1:{dt:'18/07',tm:'18h'},fin_1:{dt:'19/07',tm:'16h'},
};
const MM_BRACKET=(()=>{
  const b={},W=g=>({g,take:'win'}),L=g=>({g,take:'lose'});
  for(let i=1;i<=16;i++)b['r32_'+i]={};
  b.r16_1={feeders:{A:W('r32_1'),B:W('r32_4')}};b.r16_2={feeders:{A:W('r32_3'),B:W('r32_6')}};
  b.r16_3={feeders:{A:W('r32_2'),B:W('r32_5')}};b.r16_4={feeders:{A:W('r32_7'),B:W('r32_8')}};
  b.r16_5={feeders:{A:W('r32_12'),B:W('r32_11')}};b.r16_6={feeders:{A:W('r32_10'),B:W('r32_9')}};
  b.r16_7={feeders:{A:W('r32_15'),B:W('r32_14')}};b.r16_8={feeders:{A:W('r32_13'),B:W('r32_16')}};
  b.qf_1={feeders:{A:W('r16_1'),B:W('r16_2')}};b.qf_2={feeders:{A:W('r16_5'),B:W('r16_6')}};
  b.qf_3={feeders:{A:W('r16_3'),B:W('r16_4')}};b.qf_4={feeders:{A:W('r16_7'),B:W('r16_8')}};
  b.sf_1={feeders:{A:W('qf_1'),B:W('qf_2')}};b.sf_2={feeders:{A:W('qf_3'),B:W('qf_4')}};
  b.tp_1={feeders:{A:L('sf_1'),B:L('sf_2')}};b.fin_1={feeders:{A:W('sf_1'),B:W('sf_2')}};
  return b;
})();
const MM_COLS=[
  {key:'32avos', label:'16 avos', short:'16<sup>av</sup>', ids:['r32_3','r32_6','r32_1','r32_4','r32_12','r32_11','r32_10','r32_9','r32_2','r32_5','r32_7','r32_8','r32_15','r32_14','r32_13','r32_16']},
  {key:'oitavas',label:'Oitavas', short:'8<sup>as</sup>',  ids:['r16_2','r16_1','r16_5','r16_6','r16_3','r16_4','r16_7','r16_8']},
  {key:'quartas',label:'Quartas', short:'4<sup>as</sup>',  ids:['qf_1','qf_2','qf_3','qf_4']},
  {key:'semis',  label:'Semis',   short:'Semis',           ids:['sf_1','sf_2']},
  {key:'3lugar', label:'3º lugar', short:'3º lugar',       ids:['tp_1']},
  {key:'final',  label:'Final',   short:'Final 🏆',        ids:['fin_1']},
];
const MM_PHASE_MULT={'32avos':1,oitavas:1.25,quartas:1.5,semis:1.75,'3lugar':1.75,final:4};
function mmPhaseKeyOf(id){const col=MM_COLS.find(c=>c.ids.includes(id));return col?col.key:'32avos';}
function multSeal(key){const m=MM_PHASE_MULT[key]||1,cls=m===1?' m1':(m===4?' mfin':'');return `<span class="mm-mult-seal${cls}">×${String(m).replace('.',',')}</span>`;}

function gameDate(c){
  const a=MM_AGENDA[c.id]||{};const dt=c.dt||a.dt,tm=c.tm||a.tm;
  if(!dt)return null;
  const p=dt.split('/').map(Number);
  const h=tm?parseInt(tm)||0:0,mi=(tm&&tm.split('h')[1])?parseInt(tm.split('h')[1]):0;
  return new Date(2026,p[1]-1,p[0],h,mi);   // hora local, igual ao app
}
function realWinner(c){
  if(!c||c.real_a==null||c.real_b==null)return null;
  if(c.real_a>c.real_b)return 'A';
  if(c.real_b>c.real_a)return 'B';
  return (c.classificado==='A'||c.classificado==='B')?c.classificado:null;
}
// Zebras (cópia de MM_ZEBRA do index.html/edge function; azarao = lado A ou B)
const MM_ZEBRA={
  r32_3:{tipo:'zebra',azarao:'B'},r32_6:{tipo:'zebra',azarao:'B'},r32_8:{tipo:'zebrao',azarao:'B'},
  r32_11:{tipo:'zebra',azarao:'B'},r32_15:{tipo:'zebrao',azarao:'B'},
  r16_2:{tipo:'zebrao',azarao:'A'},   // Paraguai × França → azarão: Paraguai (lado A)
  r16_7:{tipo:'zebra',azarao:'B'},    // Argentina × Egito → azarão: Egito (lado B)
  // QUARTAS (decisão do admin 08/07: só a Suíça vira zebra; os outros 3 jogos SEM bônus)
  qf_4:{tipo:'zebra',azarao:'B'},     // Argentina × Suíça → azarão: Suíça (odd 5.46, ~18,1%)
};
function mmZebra(c){return MM_ZEBRA[c&&c.id]||null;}
let CONFRONTOS=[];const byId=id=>CONFRONTOS.find(c=>c.id===id);
// Resolve {name,flag} de um lado (recursivo pela chave) — igual ao mmResolveSide do app.
function resolveSide(slotId,side){
  const slot=MM_BRACKET[slotId];
  if(slot&&slot.feeders){const f=slot.feeders[side];const w=realWinner(byId(f.g));if(w==null)return null;
    return resolveSide(f.g,f.take==='win'?w:(w==='A'?'B':'A'));}
  const c=byId(slotId);if(!c)return null;
  const nm=side==='A'?c.team_a:c.team_b, fl=side==='A'?c.flag_a:c.flag_b;
  return nm?{name:nm,flag:fl}:null;
}
function teams(c){return {a:resolveSide(c.id,'A'),b:resolveSide(c.id,'B')};}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function normaliza(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}

// ─── Token de disparo (= BOT_TRIGGER_TOKEN) ──────────────────────────────────
// SEM TELA DE SENHA: o admin abre direto. O token é o mesmo BOT_TRIGGER_TOKEN
// que a Edge Function valida em toda chamada (?token=); ele mora SÓ no
// localStorage deste navegador — NUNCA no código (o repo é público). No celular
// do Vini ele já está salvo, então tudo funciona sem digitar nada.
// Pra (re)definir o token sem nenhum campo na tela — ex.: num aparelho novo ou
// se o localStorage se perder — abra a URL do admin UMA vez com ?token=SEU_TOKEN:
// ele é salvo no localStorage e removido da barra de endereço na mesma hora.
(function(){
  try{
    const u=new URL(location.href);
    const t=u.searchParams.get('token');
    if(t&&t.trim()){
      localStorage.setItem(TOKEN_KEY,t.trim());
      u.searchParams.delete('token');
      history.replaceState(null,'',u.pathname+u.search+u.hash);
    }
  }catch(e){/* URL exótica: ignora, segue com o token do localStorage */}
})();
// 401 = a função recusou o token. NÃO apaga o token salvo (um 401 transitório —
// ex.: verify_jwt religado após redeploy, armadilha 6 — não deve te trancar
// fora); só mostra como recuperar. O token continua no localStorage.
function avisaToken401(st){
  if(st){st.className='status err';st.textContent='A função recusou o token (401). Confira o BOT_TRIGGER_TOKEN (e se o "Verify JWT" da função não religou). Pra atualizar o token, reabra a URL do admin uma vez com ?token=SEU_TOKEN no fim.';}
}

// ─── Estado dos filtros/busca ────────────────────────────────────────────────
let faseFiltro=null;       // null = ainda não escolhido (primeiro load define um padrão)
let statusFiltro='todos';  // 'todos' | 'abertos' | 'fechados'
let buscaTexto='';
const penEscolha={};

function pickSmartDefaultPhase(){
  const now=Date.now();
  // 1ª prioridade: fase com jogo já começado e ainda sem placar (ação pendente)
  for(const col of MM_COLS){
    if(col.ids.some(id=>{const c=byId(id);if(!c||c.finished)return false;const d=gameDate(c);return !d||d.getTime()<=now;}))return col.key;
  }
  // 2ª: primeira fase com QUALQUER jogo em aberto
  for(const col of MM_COLS){if(col.ids.some(id=>{const c=byId(id);return c&&!c.finished;}))return col.key;}
  return 'final';   // tudo fechado (Copa encerrada) → abre na Final, foto de encerramento
}
function setStatus(v){
  statusFiltro=v;
  document.querySelectorAll('.stbtn').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  render();
}
function setFase(key){faseFiltro=key;render();}
function onBusca(v){buscaTexto=v;render();}
function pillsHTML(){
  return `<div class="mm-filters">${MM_COLS.map(col=>`<button class="mm-fbtn${col.key===faseFiltro?' active':''}" onclick="setFase('${col.key}')">${multSeal(col.key)}<span class="fb-lbl">${col.short}</span></button>`).join('')}</div>`;
}

// ─── Dados ───────────────────────────────────────────────────────────────────
async function carregar(){
  const el=document.getElementById('lista');el.textContent='Carregando…';
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${MM_TCONF}?select=*&order=created_at`,{headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    CONFRONTOS=await r.json();
    if(faseFiltro===null)faseFiltro=pickSmartDefaultPhase();   // só no 1º load
    render();
  }catch(e){el.innerHTML='<div class="status err">Erro ao carregar: '+esc(e.message)+'</div>';}
}
function render(){
  const buscando=buscaTexto.trim().length>0;
  document.getElementById('status-wrap').style.display=buscando?'none':'';
  document.getElementById('pills-wrap').innerHTML=buscando?'':pillsHTML();

  let lista;
  if(buscando){
    const q=normaliza(buscaTexto);
    lista=CONFRONTOS.filter(c=>{
      const t=teams(c);
      return (t.a&&normaliza(t.a.name).includes(q))||(t.b&&normaliza(t.b.name).includes(q));
    });
  }else{
    const col=MM_COLS.find(c=>c.key===faseFiltro)||MM_COLS[0];
    lista=col.ids.map(id=>byId(id)).filter(Boolean);
    if(statusFiltro==='abertos')lista=lista.filter(c=>!c.finished);
    else if(statusFiltro==='fechados')lista=lista.filter(c=>c.finished);
  }
  const now=Date.now();
  const prioridade=c=>{if(c.finished)return 2;const d=gameDate(c);return(!d||d.getTime()<=now)?0:1;};
  lista=lista.slice().sort((x,y)=>prioridade(x)-prioridade(y)||((gameDate(x)?.getTime()??Infinity)-(gameDate(y)?.getTime()??Infinity)));

  document.getElementById('lista').innerHTML=lista.length?lista.map(cardJogo).join(''):'<p class="vazio">Nenhum jogo encontrado.</p>';
}

function cardJogo(c){
  const t=teams(c), a=MM_AGENDA[c.id]||{};
  const nomeA=t.a?t.a.name:'A definir', nomeB=t.b?t.b.name:'A definir';
  const flagA=t.a?flagImg(t.a.flag):'', flagB=t.b?flagImg(t.b.flag):'';
  const quando=(c.dt||a.dt?`${c.dt||a.dt} às ${c.tm||a.tm||''}`:'')+(c.id.startsWith('mm_teste')?' · TESTE':'');
  const fase=c.phase||MM_COLS.find(col=>col.key===mmPhaseKeyOf(c.id))?.label||'';
  const z=mmZebra(c);
  const zebraBadge=z?`<span class="zebra-badge${z.tipo==='zebrao'?' zebrao':''}">🦓 ${z.tipo==='zebrao'?'ZEBRÃO +5':'ZEBRA +3'}</span>`:'';
  const top=`<div class="jg-top"><span class="jg-fase">${esc(fase)}</span>${zebraBadge}<span>${esc(quando)}</span><span class="jg-id">${esc(c.id)}</span></div>`;

  if(c.finished){
    const vSide=realWinner(c), vTeam=vSide==='A'?t.a:(vSide==='B'?t.b:null);
    const pen=(c.real_a===c.real_b&&c.classificado);
    const avanca=vTeam?`<div class="avanca-row">${flagImg(vTeam.flag)}<span>${esc(vTeam.name)} avança</span>${pen?' <span class="pen-tag">(pênaltis)</span>':''}</div>`:'';
    return `<div class="jogo" id="jg-${esc(c.id)}">
      ${top}${timesRow}
      <div class="final-row">
        <span class="rr-label">PLACAR FINAL</span>
        <div class="score-final">${c.real_a}<span class="x">×</span>${c.real_b}</div>
        ${avanca}
      </div>
      <div class="closed-actions">
        <span class="lock-badge">🔒 Finalizado</span>
        <button class="reabrir" onclick="reabrirJogo('${esc(c.id)}')">✏️ Reabrir para corrigir</button>
      </div>
      <div class="ac-box">
        <div class="ac-fields">
          <select id="acp-${esc(c.id)}" title="Direcionar pra alguém (opcional)">${pessoaOptions()}</select>
          <input id="acd-${esc(c.id)}" type="text" maxlength="300" placeholder="Direcionamento (opcional): ex. provoca o Leo pelos palpites">
        </div>
        <div class="pv-dest">
          <label><input type="radio" name="acdest-${esc(c.id)}" value="teste" checked> Grupo de TESTE</label>
          <label><input type="radio" name="acdest-${esc(c.id)}" value="oficial"> <span class="of">Grupo OFICIAL</span></label>
        </div>
        <button class="acordar" id="acbtn-${esc(c.id)}" onclick="acordarRatazana('${esc(c.id)}')">🐀 Acordar o Ratazana</button>
        <div class="status" id="acst-${esc(c.id)}"></div>
      </div>
      <div class="status" id="st-${esc(c.id)}"></div>
    </div>`;
  }

  const empateAtual=c.real_a!=null&&c.real_b!=null&&c.real_a===c.real_b;
  if(empateAtual&&c.classificado)penEscolha[c.id]=c.classificado;
  const on=side=>penEscolha[c.id]===side?' on':'';
  return `<div class="jogo" id="jg-${esc(c.id)}">
    ${top}${timesRow}
    <div class="placar">
      <input type="number" min="0" max="99" inputmode="numeric" id="ra-${esc(c.id)}" placeholder="–" value="${c.real_a!=null?c.real_a:''}" oninput="mudouPlacar('${esc(c.id)}')">
      <span class="x">×</span>
      <input type="number" min="0" max="99" inputmode="numeric" id="rb-${esc(c.id)}" placeholder="–" value="${c.real_b!=null?c.real_b:''}" oninput="mudouPlacar('${esc(c.id)}')">
    </div>
    <div class="pen${empateAtual?' show':''}" id="pen-${esc(c.id)}">
      <div class="lbl">Empate: quem passou nos pênaltis?</div>
      <button type="button" id="pa-${esc(c.id)}" class="${on('A').trim()}" onclick="escolhePen('${esc(c.id)}','A')">${esc(nomeA)}</button>
      <button type="button" id="pb-${esc(c.id)}" class="${on('B').trim()}" onclick="escolhePen('${esc(c.id)}','B')">${esc(nomeB)}</button>
    </div>
    <button class="fechar" onclick="fecharJogo('${esc(c.id)}')">Fechar jogo</button>
    <div class="status" id="st-${esc(c.id)}"></div>
  </div>`;
}
function mudouPlacar(cid){
  const ra=document.getElementById('ra-'+cid).value,rb=document.getElementById('rb-'+cid).value;
  const empate=ra!==''&&rb!==''&&parseInt(ra)===parseInt(rb);
  document.getElementById('pen-'+cid).classList.toggle('show',empate);
  if(!empate){delete penEscolha[cid];pintaPen(cid);}
}
function escolhePen(cid,side){
  penEscolha[cid]=penEscolha[cid]===side?null:side;
  pintaPen(cid);
}
function pintaPen(cid){
  const pa=document.getElementById('pa-'+cid),pb=document.getElementById('pb-'+cid);
  if(pa)pa.classList.toggle('on',penEscolha[cid]==='A');
  if(pb)pb.classList.toggle('on',penEscolha[cid]==='B');
}

// ─── Fechar / Reabrir — SEMPRE via Edge Function (service role); a anon key não
// consegue mais gravar essas colunas (ver supabase_placar_lock.sql). A senha do
// admin (?token=) é a única chave que autoriza a escrita, em qualquer ambiente.
async function fecharJogo(cid){
  const st=document.getElementById('st-'+cid);
  const ra=document.getElementById('ra-'+cid).value,rb=document.getElementById('rb-'+cid).value;
  if(ra===''||rb===''){st.className='status err';st.textContent='Preencha o placar final dos dois lados.';return;}
  const A=parseInt(ra),B=parseInt(rb);
  const empate=A===B;const passa=penEscolha[cid]||null;
  if(empate&&!passa){st.className='status err';st.textContent='Empate: escolha quem passou nos pênaltis.';return;}
  const t=teams(byId(cid)||{id:cid});
  const nomeA=t.a?t.a.name:'A definir', nomeB=t.b?t.b.name:'A definir';
  const resumo=`${nomeA} ${A}×${B} ${nomeB}`+(empate?` (${passa==='A'?nomeA:nomeB} passa nos pênaltis)`:'');
  if(!confirm(`Fechar jogo?\n\n${resumo}\n\nIsso grava o placar FINAL e trava a pontuação${IS_DEV?' (ambiente DEV)':' (PRODUÇÃO)'}.`))return;
  const token=localStorage.getItem(TOKEN_KEY)||'';
  st.className='status';st.textContent='Fechando…';
  const qs=new URLSearchParams({token,tipo:'fechar_placar',jogo:cid,finished:'1',real_a:String(A),real_b:String(B),env:IS_DEV?'dev':'prod'});
  if(empate)qs.set('classificado',passa);
  let r,d;
  try{ r=await fetch(`${FN_URL}?${qs.toString()}`); d=await r.json().catch(()=>({})); }
  catch(e){ st.className='status err';st.textContent='ERRO de rede ao fechar: '+e.message; return; }
  if(r.status===401){ avisaToken401(st); return; }
  if(!r.ok||!d.ok){ st.className='status err'; st.textContent='ERRO ao fechar: '+(d.erro||('HTTP '+r.status)); return; }
  // Fechar NUNCA envia mensagem: o comentário do Ratazana é ação separada,
  // pelo botão "🐀 Acordar o Ratazana" do card fechado (com preview antes).
  st.className='status ok';st.textContent='✅ Jogo fechado. Nenhuma mensagem enviada.';
  setTimeout(carregar,1600);
}

// ─── Acordar o Ratazana (gera → preview → só envia com confirmação) ──────────
// bot_telefones é SEMPRE a tabela de produção (a mesma que o robô consulta).
let TELEFONES=[];
async function carregarTelefones(){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/bot_telefones?select=participante_id,nome_exibicao&order=nome_exibicao`,{headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY}});
    if(r.ok)TELEFONES=await r.json();
  }catch(_){/* tabela vazia/erro: o seletor fica só com a opção "sem pessoa" */}
}
function pessoaOptions(){
  return '<option value="">— sem pessoa específica —</option>'+
    TELEFONES.map(t=>`<option value="${esc(t.participante_id)}">${esc(t.nome_exibicao||t.participante_id)}</option>`).join('');
}
// Ação única do "Acordar o Ratazana": gera a mensagem (considerando pessoa/
// direcionamento se preenchidos) E JÁ ENVIA direto pro grupo escolhido, sem
// etapa de preview intermediária — um clique, um resultado inline no botão.
async function acordarRatazana(cid){
  const btn=document.getElementById('acbtn-'+cid);
  const st=document.getElementById('acst-'+cid);
  const pessoa=(document.getElementById('acp-'+cid)||{}).value||'';
  const direcao=((document.getElementById('acd-'+cid)||{}).value||'').trim();
  const sel=document.querySelector(`input[name="acdest-${cid}"]:checked`);
  const dest=sel?sel.value:'';
  if(!dest){ st.className='status err'; st.textContent='Escolha o destino (teste ou oficial).'; return; }
  const textoOriginal=btn.textContent;
  btn.disabled=true; btn.textContent='🐀 Gerando e enviando…';
  st.className='status'; st.textContent='';
  const token=localStorage.getItem(TOKEN_KEY)||'';
  const qs=new URLSearchParams({token,tipo:'fim_de_jogo',jogo:cid,env:IS_DEV?'dev':'prod',destino:dest});
  if(pessoa)qs.set('pessoa',pessoa);
  if(direcao)qs.set('direcao',direcao);
  let r,d;
  try{ r=await fetch(`${FN_URL}?${qs.toString()}`); d=await r.json().catch(()=>({})); }
  catch(e){
    console.error('Erro de rede ao acordar o Ratazana:',e);
    st.className='status err'; st.textContent='Erro de rede ao gerar/enviar.';
    btn.disabled=false; btn.textContent=textoOriginal; return;
  }
  if(r.status===401){
    avisaToken401(st);
    btn.disabled=false; btn.textContent=textoOriginal; return;
  }
  if(!r.ok||!d.ok){
    console.error('Erro ao acordar o Ratazana:',d);
    st.className='status err'; st.textContent='Erro: '+(d.erro||('HTTP '+r.status));
    btn.disabled=false; btn.textContent=textoOriginal; return;
  }
  st.className='status ok';
  st.textContent=`✅ Enviado ao grupo ${dest==='oficial'?'OFICIAL':'de teste'} (${d.n_mensagens||1} mensagem${(d.n_mensagens||1)>1?'s':''}).`;
  btn.disabled=false; btn.textContent=textoOriginal;
}
// Envio de texto pronto via função (tipo=enviar_texto): usado hoje só pela
// mensagem inaugural (o Acordar virou geração+envio direto, sem passar por
// texto pré-pronto). Escreve o resultado no elemento de status recebido.
async function postEnviarTexto(dest,texto,st){
  const token=localStorage.getItem(TOKEN_KEY)||'';
  st.className='status';st.textContent='Enviando…';
  let r,res;
  try{
    r=await fetch(`${FN_URL}?token=${encodeURIComponent(token)}&tipo=enviar_texto&destino=${encodeURIComponent(dest)}`,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({texto})});
    res=await r.json().catch(()=>({}));
  }catch(e){ st.className='status err'; st.textContent='Erro de rede ao enviar: '+e.message; return false; }
  if(r.status===401){ avisaToken401(st); return false; }
  if(!r.ok||!res.ok){ st.className='status err'; st.textContent='Erro ao enviar: '+(res.erro||('HTTP '+r.status)); return false; }
  st.className='status ok'; st.textContent=`✅ Enviado ao grupo ${dest==='oficial'?'OFICIAL':'de teste'} (${res.n_mensagens||1} mensagem${(res.n_mensagens||1)>1?'s':''}).`;
  return true;
}

// ─── Enviar mensagem LIVRE como Ratazana (texto puro, sem IA) ────────────────
// Campo coringa: o que eu digitar/colar vai EXATAMENTE como está pro grupo, pelo

function livrePreview(){
  const box=document.getElementById('livre-prev-box'); if(!box)return;

  if(!raw.trim()){ box.innerHTML='<span class="livre-prev-empty">(vazio)</span>'; return; }

  box.innerHTML=esc(raw).replace(/\*([^*\n]+)\*/g,'<b>$1</b>').replace(/\n/g,'<br>');

async function enviarLivre(){
  const st=document.getElementById('pvst-livre');
  const txt=((document.getElementById('livre-txt')||{}).value||'');
  if(!txt.trim()){ st.className='status err'; st.textContent='Escreva a mensagem primeiro.'; return; }
  const sel=document.querySelector('input[name="dest-livre"]:checked');
  const dest=sel?sel.value:'';
  if(!dest){ st.className='status err'; st.textContent='Escolha o destino.'; return; }

    ? '⚠️ Enviar esta mensagem pro grupo OFICIAL (a família toda)?'
    : 'Enviar esta mensagem pro grupo de TESTE?';
  if(!confirm(aviso))return;
  await postEnviarTexto(dest,txt,st);   // envia LITERAL, sem IA
}
async function reabrirJogo(cid){
  const t=teams(byId(cid)||{id:cid});
  const nomeA=t.a?t.a.name:'A definir', nomeB=t.b?t.b.name:'A definir';
  if(!confirm(`Reabrir "${nomeA} × ${nomeB}" pra corrigir o placar?`))return;
  const token=localStorage.getItem(TOKEN_KEY)||'';
  const qs=new URLSearchParams({token,tipo:'fechar_placar',jogo:cid,finished:'0',env:IS_DEV?'dev':'prod'});
  let r,d;
  try{ r=await fetch(`${FN_URL}?${qs.toString()}`); d=await r.json().catch(()=>({})); }
  catch(e){ alert('Erro de rede ao reabrir: '+e.message); return; }
  if(r.status===401){ alert('A função recusou o token (401). Reabra a URL do admin uma vez com ?token=SEU_TOKEN no fim pra atualizar.'); return; }
  if(!r.ok||!d.ok){ alert('Erro ao reabrir: '+(d.erro||('HTTP '+r.status))); return; }
  carregar();
}

// ─── Aviso de troca de fase (v1.19) ───────────────────────────────────────────
// bot_config.admin_aviso_fase é gravado pela Edge Function (fechar_placar →
// verificaEAvancaFaseAtiva) quando fechar um jogo completa a fase ativa: OU
// já trocou sozinha pra próxima fase (tipo:'trocou'), OU não trocou por não
// conseguir decidir com segurança e precisa de confirmação manual
// (tipo:'ambiguo'). Lido e CONSUMIDO (apagado) no boot — é sempre tabela de
// PRODUÇÃO (fase_ativa não tem variante dev), igual bot_telefones.
async function checkFaseAviso(){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/bot_config?select=value&key=eq.admin_aviso_fase`,{headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY}});
    if(!r.ok)return;
    const rows=await r.json();
    if(!Array.isArray(rows)||!rows.length||!rows[0].value)return;
    let aviso;
    try{ aviso=JSON.parse(rows[0].value); }catch(_){ return; }
    const lbl=k=>(MM_COLS.find(c=>c.key===k)||{}).label||k;
    const el=document.getElementById('fase-aviso');
    if(aviso.tipo==='trocou'){
      el.className='ok';
      el.innerHTML=`<button class="fa-close" onclick="this.parentElement.hidden=true">×</button>🔄 <b>Fase mudou automaticamente de ${esc(lbl(aviso.de))} para ${esc(lbl(aviso.para))}.</b> Todos os jogos de ${esc(lbl(aviso.de))} já estavam fechados — nada a fazer, é só um aviso.`;
    }else if(aviso.tipo==='ambiguo'){
      el.className='warn';
      el.innerHTML=`<button class="fa-close" onclick="this.parentElement.hidden=true">×</button>⚠️ <b>Fase ativa pode precisar de ajuste manual.</b> ${esc(aviso.motivo||'')}`;
    }else{
      return;
    }
    el.hidden=false;
    fetch(`${SUPABASE_URL}/rest/v1/bot_config?key=eq.admin_aviso_fase`,{method:'DELETE',headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY}}).catch(()=>{});
  }catch(_){/* aviso é só conveniência — nunca trava o admin */}
}

// ─── Boot ────────────────────────────────────────────────────────────────────
document.getElementById('env-badge').textContent=IS_DEV?'DEV (tabelas dev_)':'PRODUÇÃO';
document.getElementById('env-badge').className='badge'+(IS_DEV?' dev':'');
if(IS_DEV)document.title='TESTES - '+document.title;
checkFaseAviso();
carregarTelefones().finally(carregar);
</script>
